name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ansible:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: k3s-lab-bootstrap
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Install ansible tooling
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user ansible ansible-lint yamllint
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814  # v4.2.0
      - name: Install collections
        run: |
          ansible-galaxy collection install -r requirements.yml -r ee/requirements.yml
      - name: yamllint
        run: yamllint .
      - name: ansible-lint
        run: ansible-lint playbooks/ -p
      - name: ansible syntax-check
        run: |
          shopt -s nullglob
          for pb in playbooks/*.yml; do
            echo "=== syntax-check: $pb ==="
            ansible-playbook "$pb" --syntax-check
          done
      - name: helm-lint charts/
        run: |
          set -eu
          shopt -s nullglob
          charts=(charts/*/)
          if [ ${#charts[@]} -eq 0 ]; then
            echo "SKIP: no charts found"
            exit 0
          fi
          for chart_dir in "${charts[@]}"; do
            echo "=== helm-lint: $chart_dir ==="
            helm lint "$chart_dir"
          done

  working-model:
    # Working-model block sync (umbrella issue dmfdeploy/dmfdeploy#32): the
    # agent-context block in CLAUDE.md/AGENTS.md/QWEN.md must stay byte-identical
    # to the umbrella template; --strict fails on a missing or drifted block.
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2 — umbrella: canonical template + checker
        with:
          repository: dmfdeploy/dmfdeploy
          path: .umbrella
          persist-credentials: false
      - name: Working-model block sync (strict)
        run: .umbrella/bin/check-working-model-sync.sh --repo . --strict --template .umbrella/docs/templates/working-model-block.md
