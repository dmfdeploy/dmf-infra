---
# Rotate the ESO AppRole secret_id and persist the new value back to the
# operator-local break-glass JSON used by 100-eso.yml.
#
# This playbook is intended to run as part of lifecycle-provision after the
# initial ESO deployment, so each rerun refreshes the AppRole credential that
# ESO consumes.

- name: Rotate ESO AppRole secret_id
  hosts: k3s_control[0]
  become: true
  gather_facts: false

  vars:
    eso_rotation_openbao_namespace: "{{ openbao_namespace | default('openbao') }}"
    eso_rotation_openbao_role_name: "{{ openbao_eso_role_name | default('external-secrets') }}"
    eso_rotation_approle_secret_name: "{{ eso_approle_secret_name | default('openbao-approle') }}"
    eso_rotation_breakglass_file: "{{ eso_openbao_breakglass_file | default('') }}"
    eso_rotation_external_secrets_namespace: "{{ eso_namespace | default('external-secrets') }}"

  roles:
    - base/cluster-ready

  tasks:
    - name: Assert rotation inputs exist
      ansible.builtin.assert:
        that:
          - eso_rotation_breakglass_file | length > 0
        fail_msg: >-
          eso_openbao_breakglass_file must be set so the rotated secret_id can be
          written back for future lifecycle runs.

    - name: Load OpenBao break-glass JSON from operator host
      ansible.builtin.set_fact:
        _eso_rotation_breakglass: "{{ lookup('file', eso_rotation_breakglass_file) | from_json }}"
      delegate_to: localhost
      become: false
      no_log: true

    - name: Extract OpenBao operator credentials
      ansible.builtin.set_fact:
        _eso_rotation_openbao_username: "{{ _eso_rotation_breakglass.ops_admin_username | default('') }}"
        _eso_rotation_openbao_password: "{{ _eso_rotation_breakglass.ops_admin_password | default('') }}"
      no_log: true

    - name: Assert OpenBao operator credentials exist
      ansible.builtin.assert:
        that:
          - _eso_rotation_openbao_username | length > 0
          - _eso_rotation_openbao_password | length > 0
        fail_msg: >-
          No operator credentials found in {{ eso_rotation_breakglass_file }}.
      no_log: true

    - name: Discover OpenBao pod
      kubernetes.core.k8s_info:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        api_version: v1
        kind: Pod
        namespace: "{{ eso_rotation_openbao_namespace }}"
        label_selectors:
          - "app.kubernetes.io/name=openbao"
      register: _eso_rotation_openbao_pod_info

    - name: Set OpenBao pod fact
      ansible.builtin.set_fact:
        _eso_rotation_openbao_pod: "{{ _eso_rotation_openbao_pod_info.resources[0].metadata.name }}"

    - name: Log into OpenBao with operator userpass
      ansible.builtin.shell:
        cmd: >-
          printf '%s\n' "$OPENBAO_PASSWORD" |
          kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
          -n {{ eso_rotation_openbao_namespace }}
          exec -i {{ _eso_rotation_openbao_pod }}
          -- sh -c '
          IFS= read -r P;
          bao write -format=json auth/userpass/login/{{ _eso_rotation_openbao_username | quote }} password="$P"'
      register: _eso_rotation_openbao_login_raw
      changed_when: false
      environment:
        OPENBAO_PASSWORD: "{{ _eso_rotation_openbao_password }}"
      no_log: true

    - name: Extract OpenBao client token
      ansible.builtin.set_fact:
        _eso_rotation_openbao_client_token: "{{ (_eso_rotation_openbao_login_raw.stdout | from_json).auth.client_token }}"
      no_log: true

    - name: Read current ESO AppRole secret_id secret from Kubernetes
      kubernetes.core.k8s_info:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        api_version: v1
        kind: Secret
        name: "{{ eso_rotation_approle_secret_name }}"
        namespace: "{{ eso_rotation_external_secrets_namespace }}"
      register: _eso_rotation_approle_secret

    - name: Assert ESO AppRole secret exists
      ansible.builtin.assert:
        that:
          - _eso_rotation_approle_secret.resources | length > 0
        fail_msg: >-
          Could not find Secret {{ eso_rotation_approle_secret_name }} in namespace {{ eso_rotation_external_secrets_namespace }}.

    - name: Generate new ESO AppRole secret_id
      ansible.builtin.shell:
        cmd: >-
          printf %s "$ESO_ROTATION_BAO_TOKEN" |
          kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
          -n {{ eso_rotation_openbao_namespace }}
          exec -i {{ _eso_rotation_openbao_pod }}
          --
          sh -c 'IFS= read -r BAO_TOKEN;
          export BAO_ADDR=https://127.0.0.1:8200;
          export BAO_TOKEN;
          bao write -format=json -force auth/approle/role/{{ eso_rotation_openbao_role_name }}/secret-id'
      register: _eso_rotation_secret_id_raw
      changed_when: false
      environment:
        ESO_ROTATION_BAO_TOKEN: "{{ _eso_rotation_openbao_client_token }}"
      no_log: true

    - name: Parse new ESO AppRole secret_id
      ansible.builtin.set_fact:
        _eso_rotation_secret_id: "{{ (_eso_rotation_secret_id_raw.stdout | from_json).data.secret_id }}"
      no_log: true

    - name: Update ESO AppRole secret_id in Kubernetes Secret
      kubernetes.core.k8s:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ eso_rotation_approle_secret_name }}"
            namespace: "{{ eso_rotation_external_secrets_namespace }}"
          stringData:
            id: "{{ _eso_rotation_secret_id }}"
      no_log: true

    - name: Persist rotated secret_id to operator break-glass file
      ansible.builtin.copy:
        dest: "{{ eso_rotation_breakglass_file }}"
        mode: "0600"
        content: >-
          {{
            _eso_rotation_breakglass
            | combine({'eso_secret_id': _eso_rotation_secret_id}, recursive=True)
            | to_nice_json
          }}
      delegate_to: localhost
      become: false
      no_log: true

    - name: Restart ESO after rotation
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - /etc/rancher/k3s/k3s.yaml
          - -n
          - "{{ eso_rotation_external_secrets_namespace }}"
          - rollout
          - restart
          - deploy/external-secrets
      changed_when: true

    - name: Wait for ESO deployment to become ready
      kubernetes.core.k8s_info:
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        api_version: apps/v1
        kind: Deployment
        name: external-secrets
        namespace: "{{ eso_rotation_external_secrets_namespace }}"
      register: _eso_rotation_deploy
      until:
        - _eso_rotation_deploy.resources | length > 0
        - _eso_rotation_deploy.resources[0].status.readyReplicas | default(0) | int >= 1
      retries: 30
      delay: 5

    - name: Report ESO rotation summary
      ansible.builtin.debug:
        msg: >-
          ESO AppRole secret_id rotated for role {{ eso_rotation_openbao_role_name }}
          and persisted to {{ eso_rotation_breakglass_file }}.
