---
# Mint the awx-autoscale /ensure-awake bearer token and wire it into the DMF
# Console runtime Secret. This is the secrets half of on-demand scale-to-zero
# (#97): it makes dmf-cms and the awx-autoscale helper share ONE bearer value.
#
# Single source of truth: OpenBao secret/apps/awx-autoscale/runtime:bearer_token.
# Two consumers read the SAME value:
#   - the awx-autoscale helper validates inbound POST /ensure-awake against it,
#     delivered by the role's ESO ExternalSecret (key bearerToken) — see
#     roles/stack/operator/awx-autoscale/{defaults,tasks}/main.yml.
#   - dmf-cms sends it as `Authorization: Bearer <token>`, delivered via the
#     dmf-cms-runtime K8s Secret key awxAutoscaleBearerToken (patched here, then
#     read by the a59fded chart's DMF_CONSOLE_AWX_AUTOSCALE_BEARER_TOKEN env).
#
# Idempotency: the OpenBao path is authoritative. If bearer_token already exists
# there it is REUSED (never regenerated, so a rerun never breaks a live helper);
# only the cms-runtime key is reconciled to match. The OpenBao path is dedicated
# to awx-autoscale, so a first-write `bao kv put` cannot clobber a sibling
# (contrast the shared secret/apps/awx/runtime 69x-class merge requirement).
#
# Order in bootstrap-sandbox-configure: AWX-awake window, AFTER 697 (the
# dmf-cms-runtime Secret exists by then) and BEFORE awx-autoscale-deploy.yml
# (whose ExternalSecret needs the OpenBao value present, or its rollout hangs).
#
# Opt-in: no-op unless dmf_awx_autoscale_enabled. Cloud/lab lanes never run this.
#
# Design authority: umbrella
#   docs/plans/DMF AWX On-Demand Scale-to-Zero Plan 2026-06-18.md §B / §D.
- name: Mint awx-autoscale bearer and wire it into the DMF Console runtime Secret
  hosts: k3s_control[0]
  become: true
  gather_facts: false

  vars:
    # OpenBao source of truth (must match roles/stack/operator/awx-autoscale
    # defaults: awx_autoscale_eso_bearer_token_remote_{key,property}).
    awx_autoscale_bearer_remote_path: secret/apps/awx-autoscale/runtime
    awx_autoscale_bearer_remote_property: bearer_token
    # dmf-cms-runtime Secret key the a59fded chart reads (charts/dmf-cms
    # values.yaml awxAutoscale.bearerToken.key).
    cms_runtime_bearer_key: awxAutoscaleBearerToken
    awx_autoscale_bearer_length: 48

  tasks:
    - name: Skip awx-autoscale bearer wiring when disabled
      ansible.builtin.debug:
        msg: >-
          awx-autoscale disabled (dmf_awx_autoscale_enabled=false) — no bearer
          minted or wired. Cloud/lab lane.
      when: not dmf_awx_autoscale_enabled | default(false) | bool

    - name: Mint and wire the awx-autoscale bearer
      when: dmf_awx_autoscale_enabled | default(false) | bool
      block:
        # cluster-ready is INSIDE the gate so the disabled (cloud/lab) lane does
        # no node/CoreDNS/Traefik/Longhorn readiness waits — true zero-behaviour
        # change. (697 runs it play-level because it is never opt-in.)
        - name: Ensure the cluster is ready
          ansible.builtin.include_role:
            name: base/cluster-ready

        - name: Establish OpenBao operator session
          ansible.builtin.include_role:
            name: common/openbao-session
          vars:
            openbao_session_breakglass_file: "{{ eso_openbao_breakglass_file | default((openbao_key_path | default('')) ~ '.json', true) }}"
            openbao_session_namespace: "{{ cms_openbao_namespace | default('openbao') }}"

        # ── Source of truth: read (or mint) the bearer in OpenBao ───────────
        - name: Read existing awx-autoscale bearer from OpenBao
          ansible.builtin.shell:
            cmd: >-
              printf '%s\n' "$OPENBAO_TOKEN" |
              kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
              -n {{ cms_openbao_namespace | default('openbao') }}
              exec -i {{ _openbao_session_pod }}
              -- sh -c '
              IFS= read -r BAO_TOKEN;
              export BAO_TOKEN;
              bao kv get -format=json {{ awx_autoscale_bearer_remote_path }}'
          register: _aab_get
          changed_when: false
          failed_when: false
          environment:
            OPENBAO_TOKEN: "{{ _openbao_session_client_token }}"
          no_log: true

        # Classify the read into found / absent / error. Critical: a TRANSIENT
        # read failure (Bao API/exec/network blip — likely on a constrained Pi)
        # must NOT be mistaken for "absent", or the put below would mint a NEW
        # bearer and rotate it out from under a live helper. Only a clean rc==0
        # (found) or an explicit "No value found" missing-path (absent) may
        # proceed; everything else fails closed.
        - name: Classify the OpenBao read (found / absent / error)
          ansible.builtin.set_fact:
            _aab_read_ok: "{{ (_aab_get.rc | default(1)) == 0 }}"
            _aab_read_absent: >-
              {{ (_aab_get.rc | default(1)) == 2
                 and ('no value found' in (_aab_get.stderr | default('') | lower)) }}
          no_log: true

        - name: Fail closed on an indeterminate OpenBao read
          ansible.builtin.assert:
            that:
              - _aab_read_ok | bool or _aab_read_absent | bool
            fail_msg: >-
              OpenBao read of {{ awx_autoscale_bearer_remote_path }} was
              indeterminate (rc={{ _aab_get.rc | default('?') }}); refusing to
              proceed so a transient failure cannot rotate a live helper's
              bearer. Retry once OpenBao is reachable.

        - name: Parse existing bearer (only on a successful read)
          ansible.builtin.set_fact:
            _aab_existing: >-
              {{ (_aab_get.stdout | from_json).data.data[awx_autoscale_bearer_remote_property] | default('') }}
          when: _aab_read_ok | bool
          no_log: true

        - name: Treat an explicitly-absent path as no existing bearer
          ansible.builtin.set_fact:
            _aab_existing: ''
          when: not (_aab_read_ok | bool)
          no_log: true

        - name: Derive the bearer value (reuse persisted, else generate fresh)
          ansible.builtin.set_fact:
            _aab_value: >-
              {{
                _aab_existing
                if (_aab_existing | length > 0)
                else lookup('community.general.random_string',
                            length=awx_autoscale_bearer_length, special=false)
              }}
          no_log: true

        - name: Assert a non-empty bearer was resolved
          ansible.builtin.assert:
            that:
              - _aab_value | length > 0
            fail_msg: "Could not resolve an awx-autoscale bearer token."
          no_log: true

        # Dedicated path → first-write `put` is safe (no siblings to wipe).
        # Only writes when absent, so a live helper's token is never rotated
        # out from under it by a rerun.
        - name: Persist the minted bearer to OpenBao (only when absent)
          ansible.builtin.shell:
            cmd: >-
              printf '%s\n%s\n' "$OPENBAO_TOKEN" "$BEARER" |
              kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
              -n {{ cms_openbao_namespace | default('openbao') }}
              exec -i {{ _openbao_session_pod }}
              -- sh -c '
              IFS= read -r BAO_TOKEN;
              IFS= read -r VAL;
              export BAO_TOKEN;
              bao kv put {{ awx_autoscale_bearer_remote_path }} {{ awx_autoscale_bearer_remote_property }}="$VAL"'
          register: _aab_put
          changed_when: true
          when: _aab_existing | length == 0
          environment:
            OPENBAO_TOKEN: "{{ _openbao_session_client_token }}"
            BEARER: "{{ _aab_value }}"
          no_log: true

        - name: Verify the bearer reads back from OpenBao
          ansible.builtin.shell:
            cmd: >-
              printf '%s\n' "$OPENBAO_TOKEN" |
              kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
              -n {{ cms_openbao_namespace | default('openbao') }}
              exec -i {{ _openbao_session_pod }}
              -- sh -c '
              IFS= read -r BAO_TOKEN;
              export BAO_TOKEN;
              bao kv get -format=json {{ awx_autoscale_bearer_remote_path }}'
          register: _aab_verify
          changed_when: false
          failed_when: >-
            _aab_verify.rc != 0
            or ((_aab_verify.stdout | from_json).data.data[awx_autoscale_bearer_remote_property] | default('')) != _aab_value
          environment:
            OPENBAO_TOKEN: "{{ _openbao_session_client_token }}"
          no_log: true

        # ── Reconcile the dmf-cms-runtime Secret key ────────────────────────
        - name: Read the DMF Console runtime Secret
          kubernetes.core.k8s_info:
            kubeconfig: /etc/rancher/k3s/k3s.yaml
            api_version: v1
            kind: Secret
            name: "{{ cms_runtime_secret_name | default('dmf-cms-runtime') }}"
            namespace: "{{ cms_namespace | default('dmf-cms') }}"
          register: _aab_cms_secret
          no_log: true

        - name: Assert the DMF Console runtime Secret exists
          ansible.builtin.assert:
            that:
              - _aab_cms_secret.resources | length > 0
            fail_msg: >-
              dmf-cms-runtime Secret not found in namespace
              '{{ cms_namespace | default('dmf-cms') }}'. Deploy dmf-cms
              (playbook 650) before wiring the awx-autoscale bearer.

        - name: Determine whether the runtime Secret already carries the bearer
          ansible.builtin.set_fact:
            _aab_cms_current: >-
              {{ _aab_cms_secret.resources[0].data[cms_runtime_bearer_key] | default('') | b64decode }}
          no_log: true

        # Partial stringData patch is a strategic merge — it adds/updates ONLY
        # this key and preserves every other key (secretKey, clientSecret,
        # awxApiToken, netbox/forgejo tokens). Same pattern as 697.
        - name: Compute runtime Secret checksum including the bearer
          ansible.builtin.set_fact:
            _aab_cms_checksum: >-
              {{
                (_aab_cms_secret.resources[0].data | default({})
                 | combine({cms_runtime_bearer_key: (_aab_value | b64encode)})
                 | to_nice_json | hash('sha256'))
              }}
          when: _aab_cms_current != _aab_value
          no_log: true

        # Build the stringData via a Jinja dict-literal so the KEY is templated.
        # A YAML `"{{ var }}": value` key is NOT templated by Ansible (stays the
        # literal string "{{ var }}"); `{{ {var: value} }}` evaluates the key.
        - name: Build the bearer stringData patch
          ansible.builtin.set_fact:
            _aab_string_data: "{{ {cms_runtime_bearer_key: _aab_value} }}"
          when: _aab_cms_current != _aab_value
          no_log: true

        - name: Patch the bearer into the DMF Console runtime Secret
          kubernetes.core.k8s:
            kubeconfig: /etc/rancher/k3s/k3s.yaml
            state: present
            definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: "{{ cms_runtime_secret_name | default('dmf-cms-runtime') }}"
                namespace: "{{ cms_namespace | default('dmf-cms') }}"
              type: Opaque
              stringData: "{{ _aab_string_data }}"
          when: _aab_cms_current != _aab_value
          no_log: true

        - name: Roll the DMF Console Deployment to pick up the bearer
          kubernetes.core.k8s:
            kubeconfig: /etc/rancher/k3s/k3s.yaml
            state: present
            definition:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: "{{ cms_release_name | default('dmf-cms') }}"
                namespace: "{{ cms_namespace | default('dmf-cms') }}"
              spec:
                template:
                  metadata:
                    annotations:
                      checksum/awx-autoscale-bearer: "{{ _aab_cms_checksum }}"
          when: _aab_cms_current != _aab_value

        - name: Wait for the DMF Console Deployment to be ready
          kubernetes.core.k8s_info:
            kubeconfig: /etc/rancher/k3s/k3s.yaml
            api_version: apps/v1
            kind: Deployment
            name: "{{ cms_release_name | default('dmf-cms') }}"
            namespace: "{{ cms_namespace | default('dmf-cms') }}"
          register: _aab_cms_ready
          until:
            - _aab_cms_ready.resources | length > 0
            - _aab_cms_ready.resources[0].status.readyReplicas | default(0) | int >= 1
          retries: 60
          delay: 5
          when: _aab_cms_current != _aab_value

        - name: Report awx-autoscale bearer wiring result
          ansible.builtin.debug:
            msg: >-
              awx-autoscale bearer reconciled: OpenBao
              {{ 'reused existing' if _aab_existing | length > 0 else 'minted new' }};
              dmf-cms-runtime key {{ cms_runtime_bearer_key }}
              {{ 'already current' if _aab_cms_current == _aab_value else 'patched + rolled' }}.
