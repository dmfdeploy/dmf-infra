---
# --- Env schema (consumed by dmf-born-inventory → NetBox) ---
# dmf_env_id is the only path-shaped identifier — auto-generated by
# init-wizard.sh as an opaque "xxxx-xxxx" slug. Provider, architecture,
# and label are tracked as separate orthogonal fields. Legacy envs that
# predate this schema (hetzner-arm, aliyun-123) may leave these empty;
# the born-inventory role falls back to topology.environment_name in
# that case and skips the NetBox custom-field patches.
dmf_env_id: "<auto-from-init-wizard>"
dmf_env_label: ""                 # optional human label, e.g. "production-lab"
dmf_provider: "<hetzner|aliyun|aws>"
dmf_architecture: "<arm64|amd64>"

# Cluster basics
# Name of the host that bootstraps the cluster (must match a host in [k3s_control])
k3s_control_node: k3s-node-01

# K3s networking
# Set the private interface explicitly for multi-NIC or cloud-networked hosts.
# For Hetzner private networks this is usually `enp7s0`; for simpler labs it may be `eth0`.
k3s_private_interface: "<private-interface>"
k3s_flannel_iface: "{{ k3s_private_interface }}"
k3s_advertise_address: "{{ k3s_node_ip }}"
k3s_node_external_ip: "{{ ansible_host }}"
k3s_server_disable_cloud_controller: false
k3s_kubelet_args: []

# Ingress / north-south exposure
# Select the provider path per environment:
#   cloud-native | metallb-bgp | metallb-l2 | nodeport-only
cluster_ingress_mode: metallb-l2
# In cloud-native mode, point this at an env-supplied task file that installs
# the provider's CCM/LB integration. Leave empty for non-cloud modes.
# Example: "{{ inventory_dir }}/../../tasks/hetzner/ccm.yml"
cluster_ingress_provider_tasks: ""
cluster_ingress_service_annotations: {}
cluster_ingress_external_traffic_policy: Cluster

# MetalLB settings for non-cloud profiles.
metallb_pool_cidr: "<metallb-pool-cidr>"
metallb_vip: "<metallb-vip>"

# Base URL for external access. Treat this as the stable application contract and
# use it only for legacy path-based roles during migration. Prefer explicit
# per-app *_host vars for the long-term routing model.
external_base_url: "http://<external-entrypoint>"

# Public hostnames
authentik_host: "auth.<cluster-domain>"
forgejo_host: "forgejo.<cluster-domain>"
grafana_host: "grafana.<cluster-domain>"
netbox_host: "netbox.<cluster-domain>"
awx_host: "awx.<cluster-domain>"
librenms_host: "librenms.<cluster-domain>"
registry_host: "registry.<cluster-domain>"

# TLS / cert-manager
cert_manager_cluster_domain: "<cluster-domain>"
cert_manager_cluster_issuer: letsencrypt-http
cert_manager_dns_names:
  - "{{ cert_manager_cluster_domain }}"
  - "{{ authentik_host }}"

# Storage
# Replica count for Longhorn volumes. 2 is minimum for redundancy on a 3-node cluster.
longhorn_default_replica_count: "2"

# Postgres sizing (1Gi is sufficient for a small lab; increase for production use)
postgres_storage_size: "1Gi"
postgres_image: "postgres:16"
postgres_pgdata: "/var/lib/postgresql/data/pgdata"

# Monitoring stack
monitoring_namespace: monitoring

# Prometheus — operator-debug retention only (not a compliance trail).
# See docs/processes/audit-log-retention-policy.md and
# roles/base/prometheus/defaults/main.yml. 40GB blocks + 1GB WAL + 9GB
# headroom fits inside a 50Gi PVC.
prometheus_storage_size: "50Gi"
prometheus_retention: "30d"
prometheus_retention_size: "40GB"

# Loki — see roles/stack/operator/loki/defaults/main.yml for the full
# contract. loki_retention is the default-stream floor (operator activity,
# 30 days); security streams (k3s-audit, authentik-audit, *-security) get
# 6 months via per-stream retention rules in values.yml.j2.
loki_storage_size: "50Gi"
loki_retention: "720h"
# Override per env if you want different security-stream retention;
# defaults to 4380h (~6 months) in the role.
# loki_security_retention: "4380h"

# Grafana
grafana_storage_size: "1Gi"
