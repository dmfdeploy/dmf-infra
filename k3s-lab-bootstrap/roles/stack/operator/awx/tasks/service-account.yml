---
# AWX execution environment pod service account + RBAC (ADR-0014, Phase 8)
#
# HISTORICAL (2026-05-06): not currently load-bearing. This was the
# abandoned pre-ADR-0025 SA-mount attempt for media catalog launchers. The
# companion `ee_pod_spec_override` template fragment in awx-instance.yml.j2
# was silently dropped by the AWX CRD, so this SA was never wired into EE pods.
#
# Do not re-enable this for media launchers. ADR-0025 Lane B uses
# awx-integration's Container Group plus target-namespace Role/RoleBinding.
# 693-class infrastructure plays continue to use ADR-0016 Path A.
#
# See:
#   docs/plans/Move 1 Gate 2 - Pivot to Path A for Catalog Launchers 2026-05-06.md
#   docs/decisions/0012-configure-stage-distinct-from-provision.md (impl note)
#
# This file is kept as historical context. The include in tasks/main.yml is
# commented out so the SA + RBAC are NOT created.

# AWX execution environment pod service account + RBAC (historical)
# Former pre-ADR-0025 attempt for catalog job launchers
# (media-launch-nmos-cpp, media-finalise-nmos-cpp).

- name: Create awx-runner service account
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: awx-runner-sa
        namespace: "{{ awx_namespace }}"
        labels:
          app.kubernetes.io/name: awx
          app.kubernetes.io/component: runner

- name: Create cluster role for awx-runner (catalog job execution)
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: awx-runner-catalog
        labels:
          app.kubernetes.io/name: awx
          app.kubernetes.io/component: runner
      rules:
        # Permissions for catalog entry lifecycle (Provision/Configure/Finalise)
        - apiGroups: [""]
          resources: ["namespaces", "configmaps", "persistentvolumeclaims"]
          verbs: ["create", "get", "list", "watch", "patch", "update"]
        - apiGroups: ["apps"]
          resources: ["deployments", "statefulsets"]
          verbs: ["create", "get", "list", "watch", "patch", "update", "delete"]
        - apiGroups: [""]
          resources: ["services"]
          verbs: ["create", "get", "list", "watch", "patch", "update", "delete"]
        # Permissions for pod exec (for OpenBao reads, NetBox API via pod proxies)
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["pods/exec"]
          verbs: ["create"]

- name: Bind awx-runner to catalog role
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: awx-runner-catalog
        labels:
          app.kubernetes.io/name: awx
          app.kubernetes.io/component: runner
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: awx-runner-catalog
      subjects:
        - kind: ServiceAccount
          name: awx-runner-sa
          namespace: "{{ awx_namespace }}"
