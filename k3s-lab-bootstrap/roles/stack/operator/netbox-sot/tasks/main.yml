- name: Set NetBox LibreNMS object permission command
  ansible.builtin.set_fact:
    netbox_sot_librenms_permission_cmd: |-
      cat > /tmp/nbs-perm-librenms.py << 'PY'
      import json
      from django.contrib.contenttypes.models import ContentType
      from users.models import ObjectPermission, Group

      view_name = "{{ netbox_sot_librenms_view_permission_name | replace('\"', '\\\"') }}"
      view_desc = "{{ netbox_sot_librenms_view_permission_description | replace('\"', '\\\"') }}"
      view_actions = {{ netbox_sot_librenms_view_actions | to_json }}
      view_object_types = {{ netbox_sot_librenms_view_object_types | to_json }}

      write_name = "{{ netbox_sot_librenms_write_permission_name | replace('\"', '\\\"') }}"
      write_desc = "{{ netbox_sot_librenms_write_permission_description | replace('\"', '\\\"') }}"
      write_actions = {{ netbox_sot_librenms_write_actions | to_json }}
      write_object_types = {{ netbox_sot_librenms_write_object_types | to_json }}

      group_name = "{{ netbox_sot_librenms_group | replace('\"', '\\\"') }}"

      def resolve_object_types(object_types):
          cts = []
          missing = []
          for entry in object_types:
              app, model = entry.split('.', 1)
              ct = ContentType.objects.filter(app_label=app, model=model).first()
              if ct:
                  cts.append(ct)
              else:
                  missing.append(entry)
          return cts, missing

      view_cts, view_missing = resolve_object_types(view_object_types)
      write_cts, write_missing = resolve_object_types(write_object_types)
      missing = view_missing + write_missing
      if missing:
          raise SystemExit("Missing content types: " + ", ".join(sorted(set(missing))))

      view_perm = ObjectPermission.objects.filter(name=view_name).first()
      if not view_perm:
          view_perm = ObjectPermission.objects.create(
              name=view_name,
              description=view_desc,
              actions=view_actions,
          )
      else:
          view_perm.description = view_desc
          view_perm.actions = view_actions
          view_perm.save()
      view_perm.object_types.set(view_cts)

      write_perm = ObjectPermission.objects.filter(name=write_name).first()
      if not write_perm:
          write_perm = ObjectPermission.objects.create(
              name=write_name,
              description=write_desc,
              actions=write_actions,
          )
      else:
          write_perm.description = write_desc
          write_perm.actions = write_actions
          write_perm.save()
      write_perm.object_types.set(write_cts)

      group = Group.objects.get(name=group_name)
      view_perm.groups.set([group])
      write_perm.groups.set([group])
      print(view_perm.id, write_perm.id)
      PY
      /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < /tmp/nbs-perm-librenms.py
  when: netbox_sot_librenms_enabled | bool

