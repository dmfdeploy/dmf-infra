          from users.models import Token, User
          try:
              user = User.objects.get(username="{{ netbox_sot_librenms_user | replace('"', '\\"') }}")
              exists = Token.objects.filter(user=user, description="LibreNMS discovery sync").exists()
          except User.DoesNotExist:
              exists = False
          print("1" if exists else "0")
          PY
          /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < /tmp/nbs-token-librenms-check.py | tail -n 1
      when:
        - netbox_sot_manage_tokens | bool
        - netbox_sot_persist_to_openbao | bool
        - netbox_sot_librenms_token_effective | length == 0
        - (_netbox_sot_persisted_tokens.netbox_librenms_token | default('')) | length > 0

    - name: Check NetBox for an existing LibreNMS token (ORM)
      ansible.builtin.command:
        argv: "{{ netbox_sot_kubectl_cmd + ['-n', netbox_sot_namespace, 'exec', netbox_sot_kubectl_exec_target, '--', '/bin/sh', '-c', netbox_sot_librenms_token_check_cmd] }}"
      register: _netbox_sot_librenms_nb_token_check
      changed_when: false
      when:
        - netbox_sot_manage_tokens | bool
        - netbox_sot_persist_to_openbao | bool
        - netbox_sot_librenms_token_effective | length == 0
        - (_netbox_sot_persisted_tokens.netbox_librenms_token | default('')) | length > 0

    - name: Reuse existing LibreNMS token from OpenBao (no rotation)
      ansible.builtin.set_fact:
        netbox_sot_librenms_token_effective: "{{ _netbox_sot_persisted_tokens.netbox_librenms_token }}"
        _netbox_sot_librenms_token_reused: true
      no_log: true
      when:
        - netbox_sot_manage_tokens | bool
        - netbox_sot_persist_to_openbao | bool
        - netbox_sot_librenms_token_effective | length == 0
        - (_netbox_sot_persisted_tokens.netbox_librenms_token | default('')) | length > 0
        - (_netbox_sot_librenms_nb_token_check.stdout | default('0') | trim) == "1"

    - name: Create LibreNMS token via NetBox pod
      ansible.builtin.command:
        argv: "{{ netbox_sot_kubectl_cmd + ['-n', netbox_sot_namespace, 'exec', netbox_sot_kubectl_exec_target, '--', '/bin/sh', '-c', netbox_sot_librenms_token_cmd] }}"
      register: netbox_sot_librenms_token_created
      changed_when: false
      when:
        - netbox_sot_manage_tokens | bool
        - netbox_sot_librenms_token_effective | length == 0
      no_log: true

    - name: Set LibreNMS token from pod output
      ansible.builtin.set_fact:
        netbox_sot_librenms_token_effective: "{{ netbox_sot_librenms_token_created.stdout | default('') | trim }}"
      when:
        - netbox_sot_manage_tokens | bool
        - netbox_sot_librenms_token_effective | length == 0
      no_log: true

# ── Catalog writer token idempotency gate (ADR-0032 follow-up) ──────────────
# Mint-if-absent, mirroring 698-cms-netbox-forgejo-tokens.yml. A standalone
# 691 re-run must NOT rotate a valid catalog token: the old mint command
# delete+recreated it on every run, silently invalidating the value already
# persisted in OpenBao + wired into the AWX catalog JT (forcing a 693 re-run).
#
# NetBox only returns the full token at CREATION (the DB stores only the key),
# so an existing token's value cannot be re-derived from NetBox — reuse MUST
# come from OpenBao. We reuse (and skip the delete+recreate) iff BOTH hold:
#   * OpenBao secret/apps/netbox/runtime already has a non-empty
#     netbox_catalog_token, AND
#   * NetBox still has a "DMF catalog writer" token for the catalog user (ORM).
# Otherwise we fall through to mint + persist as before (first run, lost
# OpenBao value, or a deleted NetBox token — recovery path).
#
# This only pre-populates netbox_sot_catalog_token_effective so the existing
# "length == 0" mint gate below skips. The downstream catalog `kv patch` still
# runs to write/re-assert netbox_catalog_token (the admin/awx/librenms persist
# does not include it) — but with the unchanged reused value, so it is a no-op
# in content, not a rotation. (The admin/awx/librenms persist is now a `kv patch`
# on re-runs too, so it no longer drops sibling keys like netbox_catalog_token
# or cms_api_token.)
- name: Read existing catalog writer token from OpenBao
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ netbox_sot_openbao_namespace }}
      exec -i {{ _netbox_sot_openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao kv get -format=json {{ netbox_sot_runtime_secret_path | quote }}'
  register: _netbox_sot_catalog_openbao_raw
  changed_when: false
  failed_when: false
  environment:
    OPENBAO_TOKEN: "{{ _netbox_sot_openbao_client_token }}"
  no_log: true
  when:
    - netbox_sot_catalog_writer_enabled | bool
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_manage_tokens | bool
    - netbox_sot_catalog_token_effective | length == 0

- name: Parse existing catalog writer token from OpenBao
  ansible.builtin.set_fact:
    _netbox_sot_catalog_openbao_token: >-
      {{
        (_netbox_sot_catalog_openbao_raw.stdout | from_json).data.data.netbox_catalog_token | default('')
        if (_netbox_sot_catalog_openbao_raw.rc | default(1)) == 0
        and (_netbox_sot_catalog_openbao_raw.stdout | default('') | length) > 0
        else ''
      }}
  no_log: true
  when:
    - netbox_sot_catalog_writer_enabled | bool
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_manage_tokens | bool
    - netbox_sot_catalog_token_effective | length == 0

- name: Build NetBox catalog writer token existence-check command
  ansible.builtin.set_fact:
    netbox_sot_catalog_token_check_cmd: |-
      cat > /tmp/nbs-token-catalog-check.py << 'PY'
      from users.models import Token, User
      try:
          user = User.objects.get(username="{{ netbox_sot_catalog_username | replace('"', '\\"') }}")
          exists = Token.objects.filter(user=user, description="DMF catalog writer").exists()
      except User.DoesNotExist:
          exists = False
      print("1" if exists else "0")
      PY
      /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < /tmp/nbs-token-catalog-check.py | tail -n 1
  when:
    - netbox_sot_catalog_writer_enabled | bool
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_manage_tokens | bool
    - netbox_sot_catalog_token_effective | length == 0
    - _netbox_sot_catalog_openbao_token | default('') | length > 0

- name: Check NetBox for an existing catalog writer token (ORM)
  ansible.builtin.command:
    argv: "{{ netbox_sot_kubectl_cmd + ['-n', netbox_sot_namespace, 'exec', netbox_sot_kubectl_exec_target, '--', '/bin/sh', '-c', netbox_sot_catalog_token_check_cmd] }}"
  register: _netbox_sot_catalog_nb_token_check
  changed_when: false
  when:
    - netbox_sot_catalog_writer_enabled | bool
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_manage_tokens | bool
    - netbox_sot_catalog_token_effective | length == 0
    - _netbox_sot_catalog_openbao_token | default('') | length > 0

- name: Reuse existing catalog writer token from OpenBao (no rotation)
  ansible.builtin.set_fact:
    netbox_sot_catalog_token_effective: "{{ _netbox_sot_catalog_openbao_token }}"
    _netbox_sot_catalog_token_reused: true
  no_log: true
  when:
    - netbox_sot_catalog_writer_enabled | bool
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_manage_tokens | bool
    - netbox_sot_catalog_token_effective | length == 0
    - _netbox_sot_catalog_openbao_token | default('') | length > 0
    - (_netbox_sot_catalog_nb_token_check.stdout | default('0') | trim) == "1"

- name: Report catalog writer token decision
  ansible.builtin.debug:
    msg: >-
      DMF catalog writer token:
      {{ 'REUSED from OpenBao (no rotation)'
         if _netbox_sot_catalog_token_reused | default(false) | bool
         else 'will be minted (no valid existing token found)' }}
  when:
    - netbox_sot_catalog_writer_enabled | bool
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_manage_tokens | bool

- name: Ensure catalog writer service token exists when enabled
  when: netbox_sot_catalog_writer_enabled | bool
  block:
    - name: Create catalog writer token via NetBox pod
      ansible.builtin.command:
        argv: "{{ netbox_sot_kubectl_cmd + ['-n', netbox_sot_namespace, 'exec', netbox_sot_kubectl_exec_target, '--', '/bin/sh', '-c', netbox_sot_catalog_token_cmd] }}"
      register: netbox_sot_catalog_token_created
      changed_when: false
      when:
        - netbox_sot_manage_tokens | bool
        - netbox_sot_catalog_token_effective | length == 0
      no_log: true

    - name: Set catalog writer token from pod output
      ansible.builtin.set_fact:
        netbox_sot_catalog_token_effective: "{{ netbox_sot_catalog_token_created.stdout | default('') | trim }}"
      when:
        - netbox_sot_manage_tokens | bool
        - netbox_sot_catalog_token_effective | length == 0
      no_log: true

- name: Build NetBox PromSD token existence-check command
  ansible.builtin.set_fact:
    netbox_sot_promsd_token_check_cmd: |-
      cat > /tmp/nbs-token-promsd-check.py << 'PY'
      from users.models import Token, User
      try:
          user = User.objects.get(username="{{ netbox_sot_promsd_username | replace('"', '\\"') }}")
          exists = Token.objects.filter(user=user, description="{{ netbox_sot_promsd_token_name | replace('"', '\\"') }}").exists()
      except User.DoesNotExist:
          exists = False
      print("1" if exists else "0")
      PY
      /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < /tmp/nbs-token-promsd-check.py | tail -n 1
  when:
    - netbox_sot_promsd_enabled | bool
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_manage_tokens | bool
    - netbox_sot_promsd_token_effective | length == 0
    - (_netbox_sot_persisted_tokens.promsd_api_token | default('')) | length > 0

- name: Check NetBox for an existing PromSD token (ORM)
  ansible.builtin.command:
    argv: "{{ netbox_sot_kubectl_cmd + ['-n', netbox_sot_namespace, 'exec', netbox_sot_kubectl_exec_target, '--', '/bin/sh', '-c', netbox_sot_promsd_token_check_cmd] }}"
  register: _netbox_sot_promsd_nb_token_check
  changed_when: false
  when:
    - netbox_sot_promsd_enabled | bool
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_manage_tokens | bool
    - netbox_sot_promsd_token_effective | length == 0
    - (_netbox_sot_persisted_tokens.promsd_api_token | default('')) | length > 0

- name: Reuse existing PromSD token from OpenBao (no rotation)
  ansible.builtin.set_fact:
    netbox_sot_promsd_token_effective: "{{ _netbox_sot_persisted_tokens.promsd_api_token }}"
    _netbox_sot_promsd_token_reused: true
  no_log: true
  when:
    - netbox_sot_promsd_enabled | bool
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_manage_tokens | bool
    - netbox_sot_promsd_token_effective | length == 0
    - (_netbox_sot_persisted_tokens.promsd_api_token | default('')) | length > 0
    - (_netbox_sot_promsd_nb_token_check.stdout | default('0') | trim) == "1"

- name: Create PromSD token via NetBox pod
  ansible.builtin.command:
    argv: "{{ netbox_sot_kubectl_cmd + ['-n', netbox_sot_namespace, 'exec', netbox_sot_kubectl_exec_target, '--', '/bin/sh', '-c', netbox_sot_promsd_token_cmd] }}"
  register: netbox_sot_promsd_token_created
  changed_when: false
  when:
    - netbox_sot_promsd_enabled | bool
    - netbox_sot_manage_tokens | bool
    - netbox_sot_promsd_token_effective | length == 0
  no_log: true

- name: Set PromSD token from pod output
  ansible.builtin.set_fact:
    netbox_sot_promsd_token_effective: "{{ netbox_sot_promsd_token_created.stdout | default('') | trim }}"
  when:
    - netbox_sot_promsd_enabled | bool
    - netbox_sot_manage_tokens | bool
    - netbox_sot_promsd_token_effective | length == 0
  no_log: true

- name: Set NetBox vault token items
  ansible.builtin.set_fact:
    netbox_sot_vault_token_items:
      - key: vault_netbox_admin_token
        value: "{{ netbox_sot_admin_token_effective }}"
      - key: vault_netbox_awx_token
        value: "{{ netbox_sot_awx_token_effective }}"
  no_log: true

- name: Add LibreNMS token to NetBox vault token items
  ansible.builtin.set_fact:
    netbox_sot_vault_token_items: >-
      {{ netbox_sot_vault_token_items
         + [{'key': 'vault_netbox_librenms_token',
             'value': netbox_sot_librenms_token_effective}] }}
  when: netbox_sot_librenms_enabled | bool
  no_log: true

- name: Add catalog writer token to NetBox vault token items
  ansible.builtin.set_fact:
    netbox_sot_vault_token_items: >-
      {{ netbox_sot_vault_token_items
         + [{'key': 'vault_netbox_catalog_token',
             'value': netbox_sot_catalog_token_effective}] }}
  when: netbox_sot_catalog_writer_enabled | bool
  no_log: true

- name: Add PromSD token to NetBox vault token items
  ansible.builtin.set_fact:
    netbox_sot_vault_token_items: >-
      {{ netbox_sot_vault_token_items
         + [{'key': 'vault_netbox_promsd_token',
             'value': netbox_sot_promsd_token_effective}] }}
  when: netbox_sot_promsd_enabled | bool
  no_log: true

- name: Set NetBox OpenBao secret patch
  ansible.builtin.set_fact:
    netbox_sot_openbao_secret_patch:
      netbox_admin_token: "{{ netbox_sot_admin_token_effective }}"
      netbox_awx_token: "{{ netbox_sot_awx_token_effective }}"
  no_log: true

- name: Add PromSD token to NetBox OpenBao secret patch
  ansible.builtin.set_fact:
    netbox_sot_openbao_secret_patch: >-
      {{ netbox_sot_openbao_secret_patch
         | combine({'promsd_api_token': netbox_sot_promsd_token_effective}) }}
  when: netbox_sot_promsd_enabled | bool
  no_log: true

- name: Add LibreNMS token to NetBox OpenBao secret patch
  ansible.builtin.set_fact:
    netbox_sot_openbao_secret_patch: >-
      {{ netbox_sot_openbao_secret_patch
         | combine({'netbox_librenms_token': netbox_sot_librenms_token_effective}) }}
  when: netbox_sot_librenms_enabled | bool
  no_log: true

- name: Create temp file for NetBox vault edits
  ansible.builtin.tempfile:
    state: file
    suffix: .yml
  register: netbox_sot_vault_tmp
  run_once: true
  delegate_to: localhost
  become: false
  when: not netbox_sot_persist_to_openbao | bool

- name: Read vault.yml header
  ansible.builtin.slurp:
    path: "{{ netbox_sot_vault_path }}"
  register: netbox_sot_vault_slurp
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true
  when: not netbox_sot_persist_to_openbao | bool

- name: Set vault encrypted flag
  ansible.builtin.set_fact:
    netbox_sot_vault_encrypted: "{{ (netbox_sot_vault_slurp.content | b64decode).startswith('$ANSIBLE_VAULT') }}"
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true
  when: not netbox_sot_persist_to_openbao | bool

- name: Decrypt vault.yml to temp file
  ansible.builtin.command: >
    ansible-vault decrypt --vault-password-file {{ netbox_sot_vault_password_file_effective }}
    --output {{ netbox_sot_vault_tmp.path }} {{ netbox_sot_vault_path }}
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true
  when:
    - not netbox_sot_persist_to_openbao | bool
    - netbox_sot_vault_encrypted

- name: Copy vault.yml to temp file
  ansible.builtin.copy:
    src: "{{ netbox_sot_vault_path }}"
    dest: "{{ netbox_sot_vault_tmp.path }}"
    mode: "0600"
  run_once: true
  delegate_to: localhost
  become: false
  when:
    - not netbox_sot_persist_to_openbao | bool
    - not netbox_sot_vault_encrypted
  no_log: true

- name: Update NetBox tokens in vault
  ansible.builtin.lineinfile:
    path: "{{ netbox_sot_vault_tmp.path }}"
    regexp: "^{{ item.key }}:"
    line: "{{ item.key }}: \"{{ item.value }}\""
    create: true
  loop: "{{ netbox_sot_vault_token_items }}"
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true
  when: not netbox_sot_persist_to_openbao | bool

- name: Encrypt updated vault.yml
  ansible.builtin.command: >
    ansible-vault encrypt --vault-password-file {{ netbox_sot_vault_password_file_effective }} {{ netbox_sot_vault_tmp.path }}
  run_once: true
  delegate_to: localhost
  become: false
  when:
    - not netbox_sot_persist_to_openbao | bool
    - netbox_sot_vault_encrypted
  no_log: true

- name: Replace vault.yml with updated version
  ansible.builtin.command: >
    cp -f {{ netbox_sot_vault_tmp.path }} {{ netbox_sot_vault_path }}
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true
  when: not netbox_sot_persist_to_openbao | bool

- name: Cleanup temp vault file
  ansible.builtin.file:
    path: "{{ netbox_sot_vault_tmp.path }}"
    state: absent
  run_once: true
  delegate_to: localhost
  become: false
  when: not netbox_sot_persist_to_openbao | bool

- name: Read current NetBox integration secret from OpenBao
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ netbox_sot_openbao_namespace }}
      exec -i {{ _netbox_sot_openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao kv get -format=json {{ netbox_sot_runtime_secret_path | quote }}'
  register: _netbox_sot_runtime_secret_raw
  changed_when: false
  failed_when: false
  no_log: true
  when: netbox_sot_persist_to_openbao | bool
  environment:
    OPENBAO_TOKEN: "{{ _netbox_sot_openbao_client_token }}"

- name: Parse current NetBox integration secret from OpenBao
  ansible.builtin.set_fact:
    _netbox_sot_runtime_secret_data: >-
      {{
        (
          _netbox_sot_runtime_secret_raw.stdout | default('{}') | from_json
        ).data.data | default({})
      }}
  when:
    - netbox_sot_persist_to_openbao | bool
    - _netbox_sot_runtime_secret_raw.rc == 0
    - _netbox_sot_runtime_secret_raw.stdout | default('') | length > 0
  no_log: true

- name: Default NetBox integration secret from OpenBao
  ansible.builtin.set_fact:
    _netbox_sot_runtime_secret_data: {}
  when:
    - netbox_sot_persist_to_openbao | bool
    - _netbox_sot_runtime_secret_data is not defined
  no_log: true

# `bao kv patch` merges (preserves sibling keys like cms_api_token written by
# 698 and netbox_catalog_token patched below) but requires the secret to already
# exist. On a true first run the runtime secret is absent, so fall back to
# `bao kv put` to create it; every subsequent run patches.
- name: Determine NetBox runtime secret existence (put vs patch)
  ansible.builtin.set_fact:
    _netbox_sot_runtime_secret_exists: >-
      {{ (_netbox_sot_runtime_secret_raw.rc | default(1)) == 0
         and (_netbox_sot_runtime_secret_raw.stdout | default('') | length) > 0 }}
  when: netbox_sot_persist_to_openbao | bool

- name: Persist NetBox integration secrets to in-cluster OpenBao
  ansible.builtin.shell:
    cmd: >-
      {% if netbox_sot_librenms_enabled | bool %}
      printf '%s\n%s\n%s\n%s\n%s\n'
      "$OPENBAO_TOKEN"
      "$NETBOX_ADMIN_TOKEN"
      "$NETBOX_AWX_TOKEN"
      "$NETBOX_PROMSD_TOKEN"
      "$NETBOX_LIBRENMS_TOKEN"
      {% else %}
      printf '%s\n%s\n%s\n%s\n'
      "$OPENBAO_TOKEN"
      "$NETBOX_ADMIN_TOKEN"
      "$NETBOX_AWX_TOKEN"
      "$NETBOX_PROMSD_TOKEN"
      {% endif %} |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ netbox_sot_openbao_namespace }}
      exec -i {{ _netbox_sot_openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      IFS= read -r ADMIN_TOKEN;
      IFS= read -r AWX_TOKEN;
      IFS= read -r PROMSD_TOKEN;
      {% if netbox_sot_librenms_enabled | bool %}
      IFS= read -r LIBRENMS_TOKEN;
      {% endif %}
      export BAO_TOKEN;
      {% set _bao_kv_verb = 'patch' if _netbox_sot_runtime_secret_exists | bool else 'put' %}
      {% if netbox_sot_librenms_enabled | bool %}
      bao kv {{ _bao_kv_verb }} {{ netbox_sot_runtime_secret_path | quote }}
      netbox_admin_token="$ADMIN_TOKEN"
      netbox_awx_token="$AWX_TOKEN"
      promsd_api_token="$PROMSD_TOKEN"
      netbox_librenms_token="$LIBRENMS_TOKEN"
      {% else %}
      bao kv {{ _bao_kv_verb }} {{ netbox_sot_runtime_secret_path | quote }}
      netbox_admin_token="$ADMIN_TOKEN"
      netbox_awx_token="$AWX_TOKEN"
      promsd_api_token="$PROMSD_TOKEN"
      {% endif %}'
  run_once: true
  environment:
    OPENBAO_TOKEN: "{{ _netbox_sot_openbao_client_token }}"
    NETBOX_ADMIN_TOKEN: "{{ netbox_sot_admin_token_effective }}"
    NETBOX_AWX_TOKEN: "{{ netbox_sot_awx_token_effective }}"
    NETBOX_PROMSD_TOKEN: "{{ netbox_sot_promsd_token_effective }}"
    NETBOX_LIBRENMS_TOKEN: "{{ netbox_sot_librenms_token_effective | default('') }}"
  no_log: true
  when: netbox_sot_persist_to_openbao | bool

# Merge the scoped catalog writer token into the same runtime secret (ADR-0032).
# kv patch (not put) so the admin/awx/librenms fields written above survive —
# mirrors how 698 patches cms_api_token into secret/apps/netbox/runtime.
- name: Persist NetBox catalog writer token to in-cluster OpenBao
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n%s\n'
      "$OPENBAO_TOKEN"
      "$NETBOX_CATALOG_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ netbox_sot_openbao_namespace }}
      exec -i {{ _netbox_sot_openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      IFS= read -r CATALOG_TOKEN;
      export BAO_TOKEN;
      bao kv patch {{ netbox_sot_runtime_secret_path | quote }}
      netbox_catalog_token="$CATALOG_TOKEN"'
  run_once: true
  environment:
    OPENBAO_TOKEN: "{{ _netbox_sot_openbao_client_token }}"
    NETBOX_CATALOG_TOKEN: "{{ netbox_sot_catalog_token_effective }}"
  changed_when: false
  no_log: true
  when:
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_catalog_writer_enabled | bool

# ── NetBox external datasource (git-backed from Forgejo) ────────────────────
# Uses the core Data Sources model to sync files from a private Forgejo repo
# into NetBox as DataFile objects. Supports config contexts, Jinja2 templates,
# export templates, policy data, and machine-generated inputs.
# https://docs.netbox.dev/en/stable/models/core/datasource/
# ---------------------------------------------------------------------------

# ── Token resolution (OpenBao primary, ansible-vault fallback) ─────────────

- name: Read Forgejo datasource token from OpenBao
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ netbox_sot_openbao_namespace }}
      exec -i {{ _netbox_sot_openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao kv get -format=json secret/apps/forgejo/runtime'
  register: _netbox_sot_ds_forgejo_token_raw
  changed_when: false
  failed_when: false
  environment:
    OPENBAO_TOKEN: "{{ _netbox_sot_openbao_client_token | default('') }}"
  no_log: true
  when:
    - netbox_sot_datasource_enabled | bool
    - netbox_sot_persist_to_openbao | bool

- name: Parse Forgejo datasource token from OpenBao
  ansible.builtin.set_fact:
    netbox_sot_forgejo_datasource_token: >-
      {{
        (_netbox_sot_ds_forgejo_token_raw.stdout | from_json).data.data.forgejo_svc_token
        | default(netbox_sot_forgejo_datasource_token, true)
      }}
  when:
    - netbox_sot_datasource_enabled | bool
    - netbox_sot_persist_to_openbao | bool
    - _netbox_sot_ds_forgejo_token_raw is defined
    - _netbox_sot_ds_forgejo_token_raw.rc == 0
    - (_netbox_sot_ds_forgejo_token_raw.stdout | default('') | trim | length) > 0
  no_log: true

# Issue 2 fix: fallback to ansible-vault when not using OpenBao
- name: Fall back to ansible-vault for Forgejo datasource token
  ansible.builtin.set_fact:
    netbox_sot_forgejo_datasource_token: "{{ vault_forgejo_svc_token | default('') }}"
  when:
    - netbox_sot_datasource_enabled | bool
    - not netbox_sot_persist_to_openbao | bool
    - netbox_sot_forgejo_datasource_token | length == 0
  no_log: true

- name: Assert Forgejo datasource token is available
  ansible.builtin.assert:
    that:
      - netbox_sot_forgejo_datasource_token | length > 0
    fail_msg: >-
      NetBox datasource requires a Forgejo token (netbox_sot_forgejo_datasource_token)
      but none was found in OpenBao or vault. Run 692-forgejo-bootstrap.yml first
      to create the forgejo-svc user and token.
  when: netbox_sot_datasource_enabled | bool
  no_log: true

# ── Data Source create (idempotent) ─────────────────────────────────────────
# Issue 1 fix: credentials go in parameters.username/password, NOT in
# source_url. This keeps the token out of the NetBox DB and UI.
# A separate PATCH task below handles token rotation.

- name: Assemble NetBox datasource URL (internal cluster access)
  ansible.builtin.set_fact:
    netbox_sot_datasource_url: >-
      {{
        'http://' ~
        (forgejo_internal_host | default('forgejo-http.forgejo.svc.cluster.local:3000', true)) ~
        '/' ~ netbox_sot_forgejo_svc_user ~ '/netbox-data.git'
      }}
  when:
    - netbox_sot_datasource_enabled | bool
  no_log: false

- name: Fetch existing NetBox data sources
  ansible.builtin.uri:
    url: "{{ netbox_sot_api_base }}/core/data-sources/?limit=200"
    method: GET
    headers:
      Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
    return_content: true
    status_code: 200
  register: netbox_sot_existing_datasources
  when: netbox_sot_datasource_enabled | bool
  no_log: true

- name: Compute existing data source names
  ansible.builtin.set_fact:
    netbox_sot_existing_datasource_names: >-
      {{ netbox_sot_existing_datasources.json.results | default([]) | map(attribute='name') | list }}
  when: netbox_sot_datasource_enabled | bool
  no_log: true

- name: Create NetBox data source for Forgejo git repo
  ansible.builtin.uri:
    url: "{{ netbox_sot_api_base }}/core/data-sources/"
    method: POST
    headers:
      Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
    body_format: json
    body:
      name: "{{ netbox_sot_datasource_name }}"
      type: "{{ netbox_sot_datasource_type }}"
      source_url: "{{ netbox_sot_datasource_url }}"
      enabled: true
      parameters:
        branch: "{{ netbox_sot_datasource_branch }}"
        ignore_rules: "{{ netbox_sot_datasource_ignore_rules }}"
        username: "{{ netbox_sot_forgejo_svc_user }}"
        password: "{{ netbox_sot_forgejo_datasource_token }}"
      sync_interval: "{{ netbox_sot_datasource_sync_interval }}"
    status_code: 201
  register: netbox_sot_datasource_created
  when:
    - netbox_sot_datasource_enabled | bool
    - netbox_sot_datasource_name not in netbox_sot_existing_datasource_names | default([])
  no_log: true

- name: Set data source ID from create response
  ansible.builtin.set_fact:
    netbox_sot_datasource_id: "{{ netbox_sot_datasource_created.json.id }}"
  when:
    - netbox_sot_datasource_enabled | bool
    - netbox_sot_datasource_created is changed
  no_log: true

- name: Lookup existing data source ID by name
  ansible.builtin.uri:
    url: "{{ netbox_sot_api_base }}/core/data-sources/?name={{ netbox_sot_datasource_name | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
    return_content: true
    status_code: 200
  register: netbox_sot_datasource_lookup
  when:
    - netbox_sot_datasource_enabled | bool
    - netbox_sot_datasource_id is not defined
  no_log: true

- name: Set data source ID from lookup
  ansible.builtin.set_fact:
    netbox_sot_datasource_id: >-
      {{ (netbox_sot_datasource_lookup.json.results | default([]) | first | default({})).id }}
  when:
    - netbox_sot_datasource_enabled | bool
    - netbox_sot_datasource_id is not defined
    - netbox_sot_datasource_lookup.json.count | default(0) | int > 0
  no_log: true

- name: Assert data source ID was resolved
  ansible.builtin.assert:
    that:
      - netbox_sot_datasource_id is defined
      - netbox_sot_datasource_id | int > 0
    fail_msg: >-
      Could not resolve NetBox data source ID for '{{ netbox_sot_datasource_name }}'.
      Check that the data source was created successfully.
  when: netbox_sot_datasource_enabled | bool
  no_log: true

# ── PATCH parameters on every run (token rotation path) ─────────────────────
# Issue 1 fix: this runs unconditionally so that when forgejo_svc_token is
# rotated (e.g. by re-running 692-forgejo-bootstrap.yml), the Data Source
# parameters are updated before the next sync.

- name: PATCH NetBox data source parameters with current Forgejo token
  ansible.builtin.uri:
    url: "{{ netbox_sot_api_base }}/core/data-sources/{{ netbox_sot_datasource_id }}/"
    method: PATCH
    headers:
      Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
    body_format: json
    body:
      source_url: "{{ netbox_sot_datasource_url }}"
      parameters:
        branch: "{{ netbox_sot_datasource_branch }}"
        ignore_rules: "{{ netbox_sot_datasource_ignore_rules }}"
        username: "{{ netbox_sot_forgejo_svc_user }}"
        password: "{{ netbox_sot_forgejo_datasource_token }}"
    status_code: [200]
  register: netbox_sot_datasource_patched
  when:
    - netbox_sot_datasource_enabled | bool
    - netbox_sot_datasource_id is defined
  no_log: true

# ── Sync ────────────────────────────────────────────────────────────────────

- name: Trigger initial sync of NetBox data source
  ansible.builtin.uri:
    url: "{{ netbox_sot_api_base }}/core/data-sources/{{ netbox_sot_datasource_id }}/sync/"
    method: POST
    headers:
      Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
    status_code: [200, 202]
  register: netbox_sot_datasource_sync
  when: netbox_sot_datasource_enabled | bool
  no_log: true

# ── Wait for sync (with block/rescue for sanitized diagnostics) ─────────────

- block:
    - name: Wait for data source sync to complete (poll)
      ansible.builtin.uri:
        url: "{{ netbox_sot_api_base }}/core/data-sources/{{ netbox_sot_datasource_id }}/"
        method: GET
        headers:
          Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
        return_content: true
        status_code: 200
        timeout: 30
      register: netbox_sot_datasource_status
      until: >-
        netbox_sot_datasource_status.json.status.value | default('') in ['completed', 'failed']
      retries: 30
      delay: 10
      no_log: true

    - name: Assert data source sync succeeded
      ansible.builtin.assert:
        that:
          - netbox_sot_datasource_status.json.status.value | default('') == 'completed'
        fail_msg: >-
          NetBox data source sync failed. Status: {{ netbox_sot_datasource_status.json.status.value | default('unknown') }}
          Check NetBox admin UI -> Core -> Data Sources -> {{ netbox_sot_datasource_name }} -> Last Sync.
      no_log: true

  rescue:
    - name: Capture sanitized sync diagnostic (on failure)
      ansible.builtin.uri:
        url: "{{ netbox_sot_api_base }}/core/data-sources/{{ netbox_sot_datasource_id }}/"
        method: GET
        headers:
          Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
        return_content: true
        status_code: 200
        timeout: 30
      register: netbox_sot_sync_debug
      no_log: true

    - name: Print sanitized sync failure summary
      ansible.builtin.debug:
        msg:
          - "FAILED: NetBox data source sync did not reach a terminal state."
          - "  DS ID: {{ netbox_sot_datasource_id | default('unknown') }}"
          - "  DS Name: {{ netbox_sot_datasource_name | default('unknown') }}"
          - "  Source URL: {{ netbox_sot_datasource_url | default('unknown') }}"
          - "  Status: {{ netbox_sot_sync_debug.json.status.value | default('(not captured)') }}"
          - "  Last synced: {{ netbox_sot_sync_debug.json.last_synced | default('never') }}"
          - "  Last sync error: {{ netbox_sot_sync_debug.json.last_sync_error | default('(none reported)') }}"
          - "  DataFile count: {{ netbox_sot_sync_debug.json.datafile_count | default('unknown') }}"
          - "  (parameters/credentials redacted)"
          - "  Action: Check NetBox admin UI → Core → Data Sources → {{ netbox_sot_datasource_name }} → Last Sync"
      no_log: false

    - name: Fail after printing diagnostic
      ansible.builtin.fail:
        msg: >-
          NetBox data source sync failed (see sanitized summary above).
          Status was {{ netbox_sot_sync_debug.json.status.value | default('unknown') }},
          last_sync_error = {{ netbox_sot_sync_debug.json.last_sync_error | default('none') }}.

  when: netbox_sot_datasource_enabled | bool

- name: Count synced DataFiles
  ansible.builtin.debug:
    msg: >-
      Data source '{{ netbox_sot_datasource_name }}' synced successfully.
      {{ netbox_sot_datasource_status.json.total_files | default('unknown') }} files imported.
  when: netbox_sot_datasource_enabled | bool
