# ── AWX token idempotency gate ──────────────────────────────────────────────
# Reuse the OpenBao-persisted AWX inventory-source token when NetBox still has
# the matching "AWX inventory source" token (ORM). A standalone 691 re-run that
# rotated this token previously went stale on the AWX NetBox inventory-source
# credential, 401'd the inventory sync, and cascaded to the catalog teardown.
- name: Build NetBox AWX token existence-check command
  ansible.builtin.set_fact:
    netbox_sot_awx_token_check_cmd: |-
      cat > /tmp/nbs-token-awx-check.py << 'PY'
      from users.models import Token, User
      try:
          user = User.objects.get(username="{{ netbox_sot_awx_user | replace('"', '\\"') }}")
          exists = Token.objects.filter(user=user, description="AWX inventory source").exists()
      except User.DoesNotExist:
          exists = False
      print("1" if exists else "0")
      PY
      /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < /tmp/nbs-token-awx-check.py | tail -n 1
  when:
    - netbox_sot_manage_tokens | bool
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_awx_token_effective | length == 0
    - (_netbox_sot_persisted_tokens.netbox_awx_token | default('')) | length > 0

- name: Check NetBox for an existing AWX token (ORM)
  ansible.builtin.command:
    argv: "{{ netbox_sot_kubectl_cmd + ['-n', netbox_sot_namespace, 'exec', netbox_sot_kubectl_exec_target, '--', '/bin/sh', '-c', netbox_sot_awx_token_check_cmd] }}"
  register: _netbox_sot_awx_nb_token_check
  changed_when: false
  when:
    - netbox_sot_manage_tokens | bool
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_awx_token_effective | length == 0
    - (_netbox_sot_persisted_tokens.netbox_awx_token | default('')) | length > 0

- name: Reuse existing AWX token from OpenBao (no rotation)
  ansible.builtin.set_fact:
    netbox_sot_awx_token_effective: "{{ _netbox_sot_persisted_tokens.netbox_awx_token }}"
    _netbox_sot_awx_token_reused: true
  no_log: true
  when:
    - netbox_sot_manage_tokens | bool
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_awx_token_effective | length == 0
    - (_netbox_sot_persisted_tokens.netbox_awx_token | default('')) | length > 0
    - (_netbox_sot_awx_nb_token_check.stdout | default('0') | trim) == "1"

- name: Create AWX token via NetBox pod
  ansible.builtin.command:
    argv: "{{ netbox_sot_kubectl_cmd + ['-n', netbox_sot_namespace, 'exec', netbox_sot_kubectl_exec_target, '--', '/bin/sh', '-c', netbox_sot_awx_token_cmd] }}"
  register: netbox_sot_awx_token_created
  changed_when: false
  when:
    - netbox_sot_manage_tokens | bool
    - netbox_sot_awx_token_effective | length == 0
  no_log: true

- name: Set AWX token from pod output
  ansible.builtin.set_fact:
    netbox_sot_awx_token_effective: "{{ netbox_sot_awx_token_created.stdout | default('') | trim }}"
  when:
    - netbox_sot_manage_tokens | bool
    - netbox_sot_awx_token_effective | length == 0
  no_log: true

- name: Ensure LibreNMS service token exists when enabled
  when: netbox_sot_librenms_enabled | bool
  block:
    # ── LibreNMS token idempotency gate ─────────────────────────────────────
    # Reuse the OpenBao-persisted LibreNMS token when NetBox still has the
    # matching "LibreNMS discovery sync" token (ORM); otherwise mint below.
    - name: Build NetBox LibreNMS token existence-check command
