    # ── ObjectPermissions (one per cms_netbox_permissions entry) ──
    - name: Set CMS object permission commands
      ansible.builtin.set_fact:
        netbox_sot_cms_permission_cmds: >-
          {{ netbox_sot_cms_permission_cmds | default({})
             | combine({ item.name: cmd }) }}
      loop: "{{ cms_netbox_permissions }}"
      loop_control:
        loop_var: item
        label: "{{ item.name }}"
      vars:
        perm_name: "{{ item.name }}"
        perm_desc: "DMF CMS {{ item.name }} access"
        cmd: |-
          cat > /tmp/nbs-perm-cms-{{ item.name | replace('-', '_') }}.py << 'PY'
          import json
          from django.contrib.contenttypes.models import ContentType
          from users.models import ObjectPermission, Group

          perm_name = "{{ perm_name | replace('\"', '\\\"') }}"
          perm_desc = "{{ perm_desc | replace('\"', '\\\"') }}"
          actions = {{ item.actions | to_json }}
          object_types = {{ item.object_types | to_json }}
          group_name = "{{ cms_netbox_group | replace('\"', '\\\"') }}"

          cts = []
          missing = []
          for entry in object_types:
              app, model = entry.split('.', 1)
              ct = ContentType.objects.filter(app_label=app, model=model).first()
              if ct:
                  cts.append(ct)
              else:
                  missing.append(entry)
          if missing:
              raise SystemExit("Missing content types: " + ", ".join(missing))

          perm = ObjectPermission.objects.filter(name=perm_name).first()
          if not perm:
              perm = ObjectPermission.objects.create(
                  name=perm_name,
                  description=perm_desc,
                  actions=actions,
              )
          else:
              perm.description = perm_desc
              perm.actions = actions
              perm.save()
          perm.object_types.set(cts)

          group = Group.objects.get(name=group_name)
          perm.groups.set([group])
          print(perm.id)
          PY
          /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < /tmp/nbs-perm-cms-{{ item.name | replace('-', '_') }}.py

    - name: Apply CMS object permissions via NetBox pod
      ansible.builtin.command:
        argv: "{{ netbox_sot_kubectl_cmd + ['-n', netbox_sot_namespace, 'exec', netbox_sot_kubectl_exec_target, '--', '/bin/sh', '-c', netbox_sot_cms_permission_cmds[item.name]] }}"
      loop: "{{ cms_netbox_permissions }}"
      loop_control:
        loop_var: item
        label: "{{ item.name }}"
      register: netbox_sot_cms_permissions_applied
      changed_when: false

    # ── User lookup/create + group assignment ──
    - name: Lookup CMS service user
      ansible.builtin.uri:
        url: "{{ netbox_sot_api_base }}/users/users/?username={{ cms_netbox_username | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
        return_content: true
        status_code: 200
      register: netbox_sot_cms_user_lookup

    - name: Create CMS service user
      ansible.builtin.uri:
        url: "{{ netbox_sot_api_base }}/users/users/"
        method: POST
        headers:
          Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
        body_format: json
        body:
          username: "{{ cms_netbox_username }}"
          is_active: true
          password: "{{ lookup('community.general.random_string', length=24, special=false) }}"
          groups:
            - "{{ netbox_sot_cms_group_id }}"
        status_code: 201
      when: netbox_sot_cms_user_lookup.json.count | int == 0
      no_log: true
      register: netbox_sot_cms_user_created

    - name: Set CMS user id
      ansible.builtin.set_fact:
        netbox_sot_cms_user_id: >-
          {{ (netbox_sot_cms_user_lookup.json.results | default([]) | first | default({})).id
             | default(netbox_sot_cms_user_created.json.id) }}

    - name: Fetch CMS service user details
      ansible.builtin.uri:
        url: "{{ netbox_sot_api_base }}/users/users/{{ netbox_sot_cms_user_id }}/"
        method: GET
        headers:
          Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
        return_content: true
        status_code: 200
      register: netbox_sot_cms_user_detail

    - name: Set CMS user group ids
      ansible.builtin.set_fact:
        netbox_sot_cms_user_group_ids: "{{ group_ids | unique | list }}"
      vars:
        groups: "{{ netbox_sot_cms_user_detail.json.groups | default([]) }}"
        group_ids: >-
          {{ (groups | select('mapping') | map(attribute='id') | list)
             + (groups | select('number') | list) }}

    - name: Ensure CMS user is in CMS group
      ansible.builtin.uri:
        url: "{{ netbox_sot_api_base }}/users/users/{{ netbox_sot_cms_user_id }}/"
        method: PATCH
        headers:
          Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
        body_format: json
        body:
          groups: "{{ netbox_sot_cms_user_group_ids | union([netbox_sot_cms_group_id | int]) }}"
        status_code: 200
      when: netbox_sot_cms_group_id | int not in (netbox_sot_cms_user_group_ids | list)

