---
- name: Set effective NetBox admin token
  ansible.builtin.set_fact:
    netbox_sot_admin_token_effective: "{{ netbox_sot_admin_token }}"
  no_log: true

- name: Reset NetBox admin token if not v2 formatted
  ansible.builtin.set_fact:
    netbox_sot_admin_token_effective: ""
  when:
    - netbox_sot_admin_token_effective | length > 0
    - (netbox_sot_admin_token_effective | regex_search('\\.')) is none
  no_log: true

- name: Set NetBox admin token command
  ansible.builtin.set_fact:
    netbox_sot_admin_token_cmd: |-
      cat > /tmp/nbs-token-admin.py << 'PY'
      from users.models import Token, User
      from users.constants import TOKEN_PREFIX
      user = User.objects.get(username="{{ netbox_sot_admin_username | replace('"', '\\"') }}")
      token = Token.objects.filter(user=user, description="netbox-sot-admin").first()
      if token:
          token.delete()
          token = None
      if not token:
          token = Token.objects.create(user=user, description="netbox-sot-admin")
      print("ADMIN_TOKEN=" + TOKEN_PREFIX + token.key + "." + token.token)
      PY
      /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < /tmp/nbs-token-admin.py | grep '^ADMIN_TOKEN=' | tail -n 1 | cut -d'=' -f2-

- name: Set NetBox AWX token command
  ansible.builtin.set_fact:
    netbox_sot_awx_token_cmd: |-
      cat > /tmp/nbs-token-awx.py << 'PY'
      from users.models import Token, User
      from users.constants import TOKEN_PREFIX
      user = User.objects.get(username="{{ netbox_sot_awx_user | replace('"', '\\"') }}")
      token = Token.objects.filter(user=user, description="AWX inventory source").first()
      if token:
          token.delete()
          token = None
      if not token:
          token = Token.objects.create(user=user, description="AWX inventory source", write_enabled=False)
      print("AWX_TOKEN=" + TOKEN_PREFIX + token.key + "." + token.token)
      PY
      /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < /tmp/nbs-token-awx.py | grep '^AWX_TOKEN=' | tail -n 1 | cut -d'=' -f2-

- name: Set NetBox LibreNMS token command
  ansible.builtin.set_fact:
    netbox_sot_librenms_token_cmd: |-
      cat > /tmp/nbs-token-librenms.py << 'PY'
      from users.models import Token, User
      from users.constants import TOKEN_PREFIX
      user = User.objects.get(username="{{ netbox_sot_librenms_user | replace('"', '\\"') }}")
      token = Token.objects.filter(user=user, description="LibreNMS discovery sync").first()
      if token:
          token.delete()
          token = None
      if not token:
          token = Token.objects.create(user=user, description="LibreNMS discovery sync", write_enabled=True)
      print("LIBRENMS_TOKEN=" + TOKEN_PREFIX + token.key + "." + token.token)
      PY
      /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < /tmp/nbs-token-librenms.py | grep '^LIBRENMS_TOKEN=' | tail -n 1 | cut -d'=' -f2-
  when: netbox_sot_librenms_enabled | bool

- name: Set NetBox catalog writer token command
  ansible.builtin.set_fact:
    netbox_sot_catalog_token_cmd: |-
      cat > /tmp/nbs-token-catalog.py << 'PY'
      from users.models import Token, User
      from users.constants import TOKEN_PREFIX
      user = User.objects.get(username="{{ netbox_sot_catalog_username | replace('"', '\\"') }}")
      token = Token.objects.filter(user=user, description="DMF catalog writer").first()
      if token:
          token.delete()
          token = None
      if not token:
          token = Token.objects.create(user=user, description="DMF catalog writer", write_enabled=True)
      print("CATALOG_TOKEN=" + TOKEN_PREFIX + token.key + "." + token.token)
      PY
      /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < /tmp/nbs-token-catalog.py | grep '^CATALOG_TOKEN=' | tail -n 1 | cut -d'=' -f2-
  when: netbox_sot_catalog_writer_enabled | bool

- name: Set PromSD token command
  ansible.builtin.set_fact:
    netbox_sot_promsd_token_cmd: |-
      cat > /tmp/nbs-token-promsd.py << 'PY'
      import secrets
      from django.contrib.auth import authenticate
      from users.models import Token, User
      from users.constants import TOKEN_PREFIX

      username = "{{ netbox_sot_promsd_username | replace('\"', '\\"') }}"
      token_name = "{{ netbox_sot_promsd_token_name | replace('\"', '\\"') }}"

      user, created = User.objects.get_or_create(
          username=username,
          defaults={'email': f'{username}@dmf.example.com'},
      )
      new_password = secrets.token_urlsafe(24)
      user.set_password(new_password)
      user.save(update_fields=['password'])

      authed_user = authenticate(username=username, password=new_password)
      if authed_user is None:
          raise SystemExit("Failed to authenticate as PromSD service user")

      Token.objects.filter(user=authed_user, description=token_name).delete()
      token = Token.objects.create(
          user=authed_user,
          description=token_name,
          write_enabled=False,
      )
      print("PROMSD_TOKEN=" + TOKEN_PREFIX + token.key + "." + token.token)
      PY
      /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < /tmp/nbs-token-promsd.py | grep '^PROMSD_TOKEN=' | tail -n 1 | cut -d'=' -f2-
  when: netbox_sot_promsd_enabled | bool

- name: Set NetBox secret persistence mode
  ansible.builtin.set_fact:
    netbox_sot_persist_to_openbao: "{{ netbox_sot_openbao_breakglass_file | default('', true) | length > 0 }}"

- name: Set effective vault password file
  ansible.builtin.set_fact:
    netbox_sot_vault_password_file_effective: "{{ netbox_sot_vault_password_file | expanduser }}"
  run_once: true
  delegate_to: localhost
  become: false
  when: not netbox_sot_persist_to_openbao | bool

- name: Assert vault password file exists
  ansible.builtin.stat:
    path: "{{ netbox_sot_vault_password_file_effective }}"
  register: netbox_sot_vault_passfile
  run_once: true
  delegate_to: localhost
  become: false
  when: not netbox_sot_persist_to_openbao | bool

- name: Fail if vault password file is missing
  ansible.builtin.assert:
    that:
      - netbox_sot_vault_passfile.stat.exists
    fail_msg: >-
      Vault password file not found at {{ netbox_sot_vault_password_file_effective }}.
      Create it (e.g. ~/.vault_pass) before running this playbook.
  run_once: true
  delegate_to: localhost
  become: false
  when: not netbox_sot_persist_to_openbao | bool

- name: Set effective NetBox AWX integration token
  ansible.builtin.set_fact:
    netbox_sot_awx_token_effective: "{{ netbox_sot_awx_token }}"
  no_log: true

- name: Set effective NetBox LibreNMS integration token
  ansible.builtin.set_fact:
    netbox_sot_librenms_token_effective: "{{ netbox_sot_librenms_token }}"
  when: netbox_sot_librenms_enabled | bool
  no_log: true

- name: Set effective NetBox catalog writer token
  ansible.builtin.set_fact:
    netbox_sot_catalog_token_effective: "{{ netbox_sot_catalog_token }}"
  when: netbox_sot_catalog_writer_enabled | bool
  no_log: true

- name: Set effective NetBox PromSD token
  ansible.builtin.set_fact:
    netbox_sot_promsd_token_effective: "{{ netbox_sot_promsd_token }}"
  when: netbox_sot_promsd_enabled | bool
  no_log: true

- name: Check NetBox API availability
  ansible.builtin.uri:
    url: "{{ netbox_sot_api_base }}/"
    method: GET
    status_code: [200, 502, 503]
  register: netbox_sot_api_check
  until: netbox_sot_api_check.status == 200
  retries: "{{ netbox_sot_api_wait_retries }}"
  delay: "{{ netbox_sot_api_wait_delay }}"
  # 502 Bad Gateway is expected during NetBox startup while Traefik has a route
  # but the backend endpoint is not yet ready after migrations complete.

# ── OpenBao operator session (hoisted: needed by the admin/awx/librenms/catalog
# token reuse gates below as well as the integration-secret persistence further
# down) ─────────────────────────────────────────────────────────────────────
# Establishes a userpass session against the in-cluster OpenBao so already-valid
# service tokens can be read back BEFORE we decide whether to mint. NetBox cannot
# re-derive a token's secret (the DB stores only the key), so reuse MUST come
# from OpenBao — otherwise a standalone 691 re-run rotates the token (delete +
# recreate ORM) and silently invalidates downstream consumers (e.g. the AWX
# inventory-source credential). Only runs on the OpenBao persistence path; the
# ansible-vault file path is unaffected.
- name: Load OpenBao break-glass JSON for NetBox persistence
  ansible.builtin.set_fact:
    _netbox_sot_openbao_breakglass: "{{ lookup('file', netbox_sot_openbao_breakglass_file) | from_json }}"
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true
  when: netbox_sot_persist_to_openbao | bool

- name: Extract OpenBao operator credentials for NetBox persistence
  ansible.builtin.set_fact:
    _netbox_sot_openbao_username: "{{ _netbox_sot_openbao_breakglass.ops_admin_username | default('') }}"
    _netbox_sot_openbao_password: "{{ _netbox_sot_openbao_breakglass.ops_admin_password | default('') }}"
  run_once: true
  no_log: true
  when: netbox_sot_persist_to_openbao | bool

- name: Assert OpenBao operator credentials exist for NetBox persistence
  ansible.builtin.assert:
    that:
      - _netbox_sot_openbao_username | length > 0
      - _netbox_sot_openbao_password | length > 0
    fail_msg: >-
      No operator credentials found in {{ netbox_sot_openbao_breakglass_file }}.
      NetBox SoT token persistence must write to the in-cluster OpenBao.
  run_once: true
  no_log: true
  when: netbox_sot_persist_to_openbao | bool

- name: Discover OpenBao pod for NetBox persistence
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Pod
    namespace: "{{ netbox_sot_openbao_namespace }}"
    label_selectors:
      - "{{ netbox_sot_openbao_pod_label_selector }}"
  register: _netbox_sot_openbao_pod_info
  run_once: true
  when: netbox_sot_persist_to_openbao | bool

- name: Assert OpenBao pod exists for NetBox persistence
  ansible.builtin.assert:
    that:
      - _netbox_sot_openbao_pod_info.resources | length > 0
    fail_msg: >-
      Could not find an OpenBao pod in namespace {{ netbox_sot_openbao_namespace }}
      with selector {{ netbox_sot_openbao_pod_label_selector }}.
  run_once: true
  when: netbox_sot_persist_to_openbao | bool

- name: Set OpenBao pod fact for NetBox persistence
  ansible.builtin.set_fact:
    _netbox_sot_openbao_pod: "{{ _netbox_sot_openbao_pod_info.resources[0].metadata.name }}"
  run_once: true
  when: netbox_sot_persist_to_openbao | bool

- name: Log into OpenBao with operator userpass for NetBox persistence
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_PASSWORD" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ netbox_sot_openbao_namespace }}
      exec -i {{ _netbox_sot_openbao_pod }}
      -- sh -c '
      IFS= read -r P;
      bao write -format=json auth/userpass/login/{{ _netbox_sot_openbao_username }} password="$P"'
  register: _netbox_sot_openbao_login_raw
  changed_when: false
  run_once: true
  no_log: true
  when: netbox_sot_persist_to_openbao | bool
  environment:
    OPENBAO_PASSWORD: "{{ _netbox_sot_openbao_password }}"

- name: Extract OpenBao client token for NetBox persistence
  ansible.builtin.set_fact:
    _netbox_sot_openbao_client_token: "{{ (_netbox_sot_openbao_login_raw.stdout | from_json).auth.client_token }}"
  run_once: true
  no_log: true
  when: netbox_sot_persist_to_openbao | bool

# ── Read persisted NetBox service tokens once (admin/awx/librenms reuse) ─────
# Single read of the runtime secret; the admin/awx/librenms reuse gates each
# consume the matching key. The catalog gate further down keeps its own read.
- name: Read existing NetBox service tokens from OpenBao (reuse gate)
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ netbox_sot_openbao_namespace }}
      exec -i {{ _netbox_sot_openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao kv get -format=json {{ netbox_sot_runtime_secret_path | quote }}'
  register: _netbox_sot_reuse_openbao_raw
  changed_when: false
  failed_when: false
  environment:
    OPENBAO_TOKEN: "{{ _netbox_sot_openbao_client_token }}"
  no_log: true
  when:
    - netbox_sot_persist_to_openbao | bool

- name: Parse persisted NetBox service tokens from OpenBao
  ansible.builtin.set_fact:
    _netbox_sot_persisted_tokens: >-
      {{
        (_netbox_sot_reuse_openbao_raw.stdout | from_json).data.data | default({})
        if (_netbox_sot_reuse_openbao_raw.rc | default(1)) == 0
        and (_netbox_sot_reuse_openbao_raw.stdout | default('') | length) > 0
        else {}
      }}
  no_log: true
  when:
    - netbox_sot_persist_to_openbao | bool

# ── Admin token idempotency gate ────────────────────────────────────────────
# The admin token drives every NetBox API call in this run, so reuse must yield
# a usable token: we only reuse when OpenBao still holds netbox_admin_token AND
# NetBox still has the matching "netbox-sot-admin" token (ORM). Otherwise fall
# through to the mint below (first run, lost OpenBao value, or deleted token).
- name: Build NetBox admin token existence-check command
  ansible.builtin.set_fact:
    netbox_sot_admin_token_check_cmd: |-
      cat > /tmp/nbs-token-admin-check.py << 'PY'
      from users.models import Token, User
      try:
          user = User.objects.get(username="{{ netbox_sot_admin_username | replace('"', '\\"') }}")
          exists = Token.objects.filter(user=user, description="netbox-sot-admin").exists()
      except User.DoesNotExist:
          exists = False
      print("1" if exists else "0")
      PY
      /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell < /tmp/nbs-token-admin-check.py | tail -n 1
  when:
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_admin_token_effective | length == 0
    - (_netbox_sot_persisted_tokens.netbox_admin_token | default('')) | length > 0

- name: Check NetBox for an existing admin token (ORM)
  ansible.builtin.command:
    argv: "{{ netbox_sot_kubectl_cmd + ['-n', netbox_sot_namespace, 'exec', netbox_sot_kubectl_exec_target, '--', '/bin/sh', '-c', netbox_sot_admin_token_check_cmd] }}"
  register: _netbox_sot_admin_nb_token_check
  changed_when: false
  when:
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_admin_token_effective | length == 0
    - (_netbox_sot_persisted_tokens.netbox_admin_token | default('')) | length > 0

- name: Reuse existing admin token from OpenBao (no rotation)
  ansible.builtin.set_fact:
    netbox_sot_admin_token_effective: "{{ _netbox_sot_persisted_tokens.netbox_admin_token }}"
    _netbox_sot_admin_token_reused: true
  no_log: true
  when:
    - netbox_sot_persist_to_openbao | bool
    - netbox_sot_admin_token_effective | length == 0
    - (_netbox_sot_persisted_tokens.netbox_admin_token | default('')) | length > 0
    - (_netbox_sot_admin_nb_token_check.stdout | default('0') | trim) == "1"

- name: Ensure NetBox admin token via NetBox pod
  ansible.builtin.command:
    argv: "{{ netbox_sot_kubectl_cmd + ['-n', netbox_sot_namespace, 'exec', netbox_sot_kubectl_exec_target, '--', '/bin/sh', '-c', netbox_sot_admin_token_cmd] }}"
  register: netbox_sot_admin_token_created
  changed_when: false
  when: netbox_sot_admin_token_effective | length == 0
  no_log: true

- name: Set admin token from pod output
  ansible.builtin.set_fact:
    netbox_sot_admin_token_effective: >-
      {{ ((netbox_sot_admin_token_created | default({})).stdout | default('') | trim) }}
  when: netbox_sot_admin_token_effective | length == 0
  no_log: true

- name: Fail if admin token is still missing
  ansible.builtin.assert:
    that:
      - netbox_sot_admin_token_effective | length > 0
    fail_msg: >-
      NetBox admin token is empty. Check that the NetBox pod is ready and the
      admin user exists.

# ── DMF catalog tag taxonomy (platform-wide invariants) ─────────────────────
# Bootstrap the tags AWX-driven catalog launchers reference (dmf-catalog,
# lifecycle:*, exposure:*). The dmf-runbooks nmos-cpp role auto-creates any
# missing tag on first provision (idempotent), but seeding here makes the
# taxonomy a platform invariant rather than a side effect of the first
# launcher. Slug derivation matches the dmf-born-inventory pattern.
- name: Fetch existing NetBox tags
  ansible.builtin.uri:
    url: "{{ netbox_sot_api_base }}/extras/tags/?limit=200"
    method: GET
    headers:
      Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
    return_content: true
    status_code: 200
  register: netbox_sot_existing_tags
  no_log: true

- name: Compute set of existing tag names
  ansible.builtin.set_fact:
    netbox_sot_existing_tag_names: >-
      {{ netbox_sot_existing_tags.json.results | map(attribute='name') | list }}
  no_log: true

- name: Create missing DMF catalog tags
  ansible.builtin.uri:
    url: "{{ netbox_sot_api_base }}/extras/tags/"
    method: POST
    headers:
      Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
    body_format: json
    body:
      name: "{{ item.name }}"
      slug: "{{ item.name | lower | regex_replace('[^a-z0-9]+', '-') | regex_replace('^-+|-+$', '') }}"
      color: "{{ item.color | default('4caf50') }}"
      description: "{{ item.description | default('DMF catalog tag') }}"
    status_code: 201
  loop: "{{ netbox_sot_catalog_tags }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name not in netbox_sot_existing_tag_names
  no_log: true

- name: Fetch existing NetBox monitoring tags
  ansible.builtin.uri:
    url: "{{ netbox_sot_api_base }}/extras/tags/?limit=200"
    method: GET
    headers:
      Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
    return_content: true
    status_code: 200
  register: netbox_sot_existing_monitoring_tags
  no_log: true

- name: Compute set of existing monitoring tag names
  ansible.builtin.set_fact:
    netbox_sot_existing_monitoring_tag_names: >-
      {{ netbox_sot_existing_monitoring_tags.json.results | map(attribute='name') | list }}
  no_log: true

- name: Create missing NetBox monitoring tags
  ansible.builtin.uri:
    url: "{{ netbox_sot_api_base }}/extras/tags/"
    method: POST
    headers:
      Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
    body_format: json
    body:
      name: "{{ item.name }}"
      slug: "{{ item.name | lower | regex_replace('[^a-z0-9]+', '-') | regex_replace('^-+|-+$', '') }}"
      color: "{{ item.color | default('4caf50') }}"
      description: "{{ item.description | default('DMF monitoring tag') }}"
    status_code: 201
  loop: "{{ netbox_sot_monitoring_tags }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.name not in netbox_sot_existing_monitoring_tag_names
  no_log: true

- name: Ensure NetBox monitoring choice sets exist
  vars:
    _netbox_sot_monitoring_choice_sets: "{{ netbox_sot_monitoring_choice_sets }}"
  block:
    - name: Look up NetBox monitoring choice set {{ item.name }}
      ansible.builtin.uri:
        url: "{{ netbox_sot_api_base }}/extras/custom-field-choice-sets/?name={{ item.name | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
        return_content: true
        status_code: 200
      register: _netbox_sot_monitoring_choice_set_lookup
      loop: "{{ _netbox_sot_monitoring_choice_sets }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Create missing NetBox monitoring choice set {{ item.item.name }}
      ansible.builtin.uri:
        url: "{{ netbox_sot_api_base }}/extras/custom-field-choice-sets/"
        method: POST
        headers:
          Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
        body_format: json
        body:
          name: "{{ item.item.name }}"
          description: "{{ item.item.description }}"
          extra_choices: "{{ item.item.extra_choices }}"
        status_code: 201
      loop: "{{ _netbox_sot_monitoring_choice_set_lookup.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.json.count | int == 0

    - name: Refresh NetBox monitoring choice set lookups
      ansible.builtin.uri:
        url: "{{ netbox_sot_api_base }}/extras/custom-field-choice-sets/?name={{ item.name | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
        return_content: true
        status_code: 200
      register: _netbox_sot_monitoring_choice_set_lookup_after_create
      loop: "{{ _netbox_sot_monitoring_choice_sets }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Reconcile NetBox monitoring choice set extra choices
      ansible.builtin.uri:
        url: "{{ netbox_sot_api_base }}/extras/custom-field-choice-sets/{{ (item.json.results | first).id }}/"
        method: PATCH
        headers:
          Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
        body_format: json
        body:
          extra_choices: "{{ item.item.extra_choices }}"
        status_code: 200
      loop: "{{ _netbox_sot_monitoring_choice_set_lookup_after_create.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when:
        - item.json.count | int > 0
        - (item.json.results | first).extra_choices | default([]) != item.item.extra_choices

    - name: Build NetBox monitoring choice set id map (name -> id)
      ansible.builtin.set_fact:
        netbox_sot_monitoring_choice_set_ids: >-
          {{
            _netbox_sot_monitoring_choice_set_lookup_after_create.results
            | map(attribute='json.results')
            | map('first')
            | list
            | items2dict(key_name='name', value_name='id')
          }}

- name: Ensure NetBox monitoring custom fields exist
  vars:
    _netbox_sot_monitoring_cf_defs: "{{ netbox_sot_monitoring_custom_fields }}"
  block:
    - name: Look up NetBox monitoring custom field {{ item.name }}
      ansible.builtin.uri:
        url: "{{ netbox_sot_api_base }}/extras/custom-fields/?name={{ item.name | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
        return_content: true
        status_code: 200
      register: _netbox_sot_monitoring_cf_lookup
      loop: "{{ _netbox_sot_monitoring_cf_defs }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Create missing NetBox monitoring custom field {{ item.item.name }}
      ansible.builtin.uri:
        url: "{{ netbox_sot_api_base }}/extras/custom-fields/"
        method: POST
        headers:
          Authorization: "Bearer {{ netbox_sot_admin_token_effective }}"
        body_format: json
        body: >-
          {{
            {
              'name': item.item.name,
              'label': item.item.label,
              'description': item.item.description,
              'type': item.item.type,
              'object_types': item.item.object_types,
              'required': item.item.required | bool,
            }
            | combine(
                {'default': item.item.default}
                if (item.item.default | default('') | string | length) > 0 else {}
              )
            | combine(
                {'choice_set': netbox_sot_monitoring_choice_set_ids[item.item.choice_set]}
                if (item.item.choice_set | default('') | string | length) > 0 else {}
              )
          }}
        status_code: 201
      loop: "{{ _netbox_sot_monitoring_cf_lookup.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.json.count | int == 0

    - name: Warn on NetBox monitoring custom-field type drift
      ansible.builtin.debug:
        msg: >-
          NetBox custom field {{ item.item.name }} exists with type
          '{{ (item.json.results | first).type.value | default((item.json.results | first).type) }}'
          but the role wants type '{{ item.item.type }}'. Re-shape manually;
          the role will not PATCH existing custom fields.
      loop: "{{ _netbox_sot_monitoring_cf_lookup.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when:
        - item.json.count | int > 0
        - (item.json.results | first).type.value | default((item.json.results | first).type) != item.item.type

