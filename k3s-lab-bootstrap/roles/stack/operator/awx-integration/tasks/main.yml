---
- name: Set AWX secret persistence mode
  ansible.builtin.set_fact:
    awx_integration_persist_to_openbao: "{{ awx_integration_openbao_breakglass_file | default('', true) | length > 0 }}"

- name: Set effective vault password file
  ansible.builtin.set_fact:
    awx_integration_vault_password_file_effective: "{{ awx_integration_vault_password_file | expanduser }}"
  run_once: true
  delegate_to: localhost
  become: false
  when: not awx_integration_persist_to_openbao | bool

- name: Assert vault password file exists
  ansible.builtin.stat:
    path: "{{ awx_integration_vault_password_file_effective }}"
  register: awx_integration_vault_passfile
  run_once: true
  delegate_to: localhost
  become: false
  when: not awx_integration_persist_to_openbao | bool

- name: Fail if vault password file is missing
  ansible.builtin.assert:
    that:
      - awx_integration_vault_passfile.stat.exists
    fail_msg: >-
      Vault password file not found at {{ awx_integration_vault_password_file_effective }}.
      Create it (e.g. ~/.vault_pass) before running this playbook.
  run_once: true
  delegate_to: localhost
  become: false
  when: not awx_integration_persist_to_openbao | bool

- name: Generate AWX service password if missing
  ansible.builtin.set_fact:
    awx_integration_svc_password_effective: >-
      {{ awx_integration_svc_password
         | default(lookup('community.general.random_string', length=24, special=false), true) }}
  no_log: true

- name: Set AWX service token value
  ansible.builtin.set_fact:
    awx_integration_svc_token_effective: "{{ awx_integration_svc_token }}"
  no_log: true

- name: Load OpenBao break-glass JSON for AWX integration
  ansible.builtin.set_fact:
    _awx_openbao_breakglass: "{{ lookup('file', awx_integration_openbao_breakglass_file) | from_json }}"
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true
  when:
    - awx_integration_openbao_breakglass_file | default('', true) | length > 0
    - awx_integration_persist_to_openbao | bool
      or awx_integration_netbox_token | default('', true) | length == 0
      or awx_integration_forgejo_token | default('', true) | length == 0
      or (awx_integration_netbox_catalog_token | default('', true) | length == 0
          and awx_integration_openbao_breakglass_file | default('', true) | length > 0)

- name: Extract OpenBao credentials for AWX integration
  ansible.builtin.set_fact:
    _awx_openbao_eso_role_id: "{{ _awx_openbao_breakglass.eso_role_id | default('') }}"
    _awx_openbao_eso_secret_id: "{{ _awx_openbao_breakglass.eso_secret_id | default('') }}"
  run_once: true
  no_log: true
  when: _awx_openbao_breakglass is defined

- name: Assert OpenBao AppRole exists for AWX source-token reads
  ansible.builtin.assert:
    that:
      - _awx_openbao_eso_role_id | default('') | length > 0
      - _awx_openbao_eso_secret_id | default('') | length > 0
    fail_msg: >-
      No ESO AppRole credentials found in {{ awx_integration_openbao_breakglass_file }}.
      AWX integration needs them to read NetBox/Forgejo runtime tokens from
      in-cluster OpenBao when vault vars are absent.
  run_once: true
  no_log: true
  when:
    - awx_integration_netbox_token | default('', true) | length == 0
      or awx_integration_forgejo_token | default('', true) | length == 0
      or (awx_integration_netbox_catalog_token | default('', true) | length == 0
          and awx_integration_openbao_breakglass_file | default('', true) | length > 0)

- name: Extract OpenBao operator credentials for AWX persistence
  ansible.builtin.set_fact:
    _awx_openbao_username: "{{ _awx_openbao_breakglass.ops_admin_username | default('') }}"
    _awx_openbao_password: "{{ _awx_openbao_breakglass.ops_admin_password | default('') }}"
  run_once: true
  no_log: true
  when: awx_integration_persist_to_openbao | bool

- name: Assert OpenBao operator credentials exist for AWX persistence
  ansible.builtin.assert:
    that:
      - _awx_openbao_username | default('') | length > 0
      - _awx_openbao_password | default('') | length > 0
    fail_msg: >-
      No operator credentials found in {{ awx_integration_openbao_breakglass_file }}.
      AWX integration token persistence must write to the in-cluster OpenBao.
  run_once: true
  no_log: true
  when: awx_integration_persist_to_openbao | bool

- name: Discover OpenBao pod for AWX integration
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Pod
    namespace: "{{ awx_integration_openbao_namespace }}"
    label_selectors:
      - "{{ awx_integration_openbao_pod_label_selector }}"
  register: _awx_openbao_pod_info
  run_once: true
  when:
    - awx_integration_persist_to_openbao | bool
      or awx_integration_netbox_token | default('', true) | length == 0
      or awx_integration_forgejo_token | default('', true) | length == 0
      or (awx_integration_netbox_catalog_token | default('', true) | length == 0
          and awx_integration_openbao_breakglass_file | default('', true) | length > 0)

- name: Assert OpenBao pod exists for AWX integration
  ansible.builtin.assert:
    that:
      - _awx_openbao_pod_info.resources | length > 0
    fail_msg: >-
      Could not find an OpenBao pod in namespace {{ awx_integration_openbao_namespace }}
      with selector {{ awx_integration_openbao_pod_label_selector }}.
  run_once: true
  when:
    - awx_integration_persist_to_openbao | bool
      or awx_integration_netbox_token | default('', true) | length == 0
      or awx_integration_forgejo_token | default('', true) | length == 0
      or (awx_integration_netbox_catalog_token | default('', true) | length == 0
          and awx_integration_openbao_breakglass_file | default('', true) | length > 0)

- name: Set OpenBao pod fact for AWX integration
  ansible.builtin.set_fact:
    _awx_openbao_pod: "{{ _awx_openbao_pod_info.resources[0].metadata.name }}"
  run_once: true
  when:
    - awx_integration_persist_to_openbao | bool
      or awx_integration_netbox_token | default('', true) | length == 0
      or awx_integration_forgejo_token | default('', true) | length == 0
      or (awx_integration_netbox_catalog_token | default('', true) | length == 0
          and awx_integration_openbao_breakglass_file | default('', true) | length > 0)

- name: Log into OpenBao with operator userpass for AWX persistence
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_PASSWORD" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ awx_integration_openbao_namespace }}
      exec -i {{ _awx_openbao_pod }}
      -- sh -c '
      IFS= read -r P;
      bao write -format=json auth/userpass/login/{{ _awx_openbao_username | quote }} password="$P"'
  register: _awx_openbao_operator_login_raw
  changed_when: false
  run_once: true
  environment:
    OPENBAO_PASSWORD: "{{ _awx_openbao_password }}"
  no_log: true
  when: awx_integration_persist_to_openbao | bool

- name: Extract OpenBao client token for AWX persistence
  ansible.builtin.set_fact:
    _awx_openbao_operator_client_token: "{{ (_awx_openbao_operator_login_raw.stdout | from_json).auth.client_token }}"
  run_once: true
  no_log: true
  when: awx_integration_persist_to_openbao | bool

- name: Log into in-cluster OpenBao for AWX source-token reads
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n%s\n' "$OPENBAO_ROLE_ID" "$OPENBAO_SECRET_ID" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ awx_integration_openbao_namespace }}
      exec -i {{ _awx_openbao_pod }}
      -- sh -c '
      IFS= read -r ROLE_ID;
      IFS= read -r SECRET_ID;
      bao write -format=json auth/approle/login role_id="$ROLE_ID" secret_id="$SECRET_ID"'
  register: _awx_openbao_login_raw
  changed_when: false
  run_once: true
  environment:
    OPENBAO_ROLE_ID: "{{ _awx_openbao_eso_role_id }}"
    OPENBAO_SECRET_ID: "{{ _awx_openbao_eso_secret_id }}"
  no_log: true
  when:
    - awx_integration_netbox_token | default('', true) | length == 0
      or awx_integration_forgejo_token | default('', true) | length == 0
      or (awx_integration_netbox_catalog_token | default('', true) | length == 0
          and awx_integration_openbao_breakglass_file | default('', true) | length > 0)

- name: Extract OpenBao client token for AWX source-token reads
  ansible.builtin.set_fact:
    _awx_openbao_client_token: "{{ (_awx_openbao_login_raw.stdout | from_json).auth.client_token }}"
  run_once: true
  no_log: true
  when:
    - _awx_openbao_login_raw is defined
    - _awx_openbao_login_raw.stdout is defined
    - _awx_openbao_login_raw.stdout | length > 0

- name: Read NetBox runtime token from in-cluster OpenBao
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ awx_integration_openbao_namespace }}
      exec -i {{ _awx_openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao kv get -format=json {{ awx_integration_netbox_runtime_secret_path | quote }}'
  register: _awx_openbao_netbox_raw
  changed_when: false
  run_once: true
  environment:
    OPENBAO_TOKEN: "{{ _awx_openbao_client_token }}"
  no_log: true
  when: >-
    awx_integration_netbox_token | default('', true) | length == 0
    or (awx_integration_netbox_catalog_token | default('', true) | length == 0
        and awx_integration_openbao_breakglass_file | default('', true) | length > 0)

# Set the awx inventory token from OpenBao ONLY when it wasn't already provided
# (vault var / export-vars). The read above may also fire purely to fetch the
# catalog token; in that case we must not clobber a populated awx token.
- name: Set NetBox awx inventory token from in-cluster OpenBao
  ansible.builtin.set_fact:
    awx_integration_netbox_token: >-
      {{
        ((_awx_openbao_netbox_raw.stdout | from_json).data.data.netbox_awx_token | default('', true))
        | default((_awx_openbao_netbox_raw.stdout | from_json).data.data.vault_netbox_awx_token | default('', true), true)
      }}
  run_once: true
  no_log: true
  when:
    - awx_integration_netbox_token | default('', true) | length == 0
    - _awx_openbao_netbox_raw is defined
    - _awx_openbao_netbox_raw.stdout is defined
    - _awx_openbao_netbox_raw.stdout | length > 0

# ADR-0032: catalog-writer token. Always set from the OpenBao read when present —
# it has no other source, and the JT wiring (defaults) feeds it to the launcher.
- name: Set NetBox catalog-writer token from in-cluster OpenBao
  ansible.builtin.set_fact:
    awx_integration_netbox_catalog_token: >-
      {{
        (_awx_openbao_netbox_raw.stdout | from_json).data.data.netbox_catalog_token | default('', true)
      }}
  run_once: true
  no_log: true
  when:
    - _awx_openbao_netbox_raw is defined
    - _awx_openbao_netbox_raw.stdout is defined
    - _awx_openbao_netbox_raw.stdout | length > 0

- name: Read Forgejo runtime token from in-cluster OpenBao
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ awx_integration_openbao_namespace }}
      exec -i {{ _awx_openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao kv get -format=json {{ awx_integration_forgejo_runtime_secret_path | quote }}'
  register: _awx_openbao_forgejo_raw
  changed_when: false
  run_once: true
  environment:
    OPENBAO_TOKEN: "{{ _awx_openbao_client_token }}"
  no_log: true
  when: awx_integration_forgejo_token | default('', true) | length == 0

- name: Set Forgejo token from in-cluster OpenBao
  ansible.builtin.set_fact:
    awx_integration_forgejo_token: >-
      {{
        ((_awx_openbao_forgejo_raw.stdout | from_json).data.data.forgejo_svc_token | default('', true))
        | default((_awx_openbao_forgejo_raw.stdout | from_json).data.data.vault_forgejo_svc_token | default('', true), true)
      }}
  run_once: true
  no_log: true
  when:
    - _awx_openbao_forgejo_raw is defined
    - _awx_openbao_forgejo_raw.stdout is defined
    - _awx_openbao_forgejo_raw.stdout | length > 0

- name: Revoke OpenBao token after AWX source-token reads
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ awx_integration_openbao_namespace }}
      exec -i {{ _awx_openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao token revoke -self'
  changed_when: false
  failed_when: false
  run_once: true
  environment:
    OPENBAO_TOKEN: "{{ _awx_openbao_client_token }}"
  no_log: true
  when: _awx_openbao_client_token is defined

- name: Assert NetBox and Forgejo tokens exist
  ansible.builtin.assert:
    that:
      - awx_integration_netbox_token | length > 0
      - awx_integration_forgejo_token | length > 0
    fail_msg: >-
      Required tokens missing. Ensure NetBox and Forgejo bootstrap playbooks
      have populated in-cluster OpenBao or vault.yml before running this playbook.
  no_log: true

- name: Resolve AWX admin identity from cluster Secret  # ADR-0024
  ansible.builtin.include_role:
    name: common/admin-identity-resolve
  vars:
    admin_resolve_app: awx-integration
    admin_resolve_secret_ns: "{{ awx_integration_admin_password_secret_namespace }}"
    admin_resolve_secret_name: "{{ awx_integration_admin_password_secret_name }}"
    admin_resolve_fallback_username: "{{ awx_integration_admin_user }}"
    admin_resolve_fallback_password: "{{ awx_integration_admin_password }}"
  when: awx_integration_read_admin_password_from_cluster | bool

- name: Apply resolved AWX admin identity  # ADR-0024
  ansible.builtin.set_fact:
    awx_integration_admin_user: "{{ _resolved_admin_user }}"
    awx_integration_admin_password: "{{ _resolved_admin_password }}"
  no_log: true
  when: awx_integration_read_admin_password_from_cluster | bool

- name: Assert AWX admin password is available
  ansible.builtin.assert:
    that:
      - awx_integration_admin_password | length > 0
    fail_msg: >-
      AWX admin password is unavailable. Expected Kubernetes Secret
      {{ awx_integration_admin_password_secret_namespace }}/{{ awx_integration_admin_password_secret_name }}
      or an explicit awx_integration_admin_password.
  no_log: true

- name: Ensure NMOS namespace exists for AWX catalog launcher pods
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: nmos
        labels:
          dmf.layer: "5"
          dmf.function: nmos-cpp

- name: Ensure NMOS AWX launcher service account exists
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: nmos-cpp-launcher
        namespace: nmos
        labels:
          app.kubernetes.io/name: nmos-cpp
          app.kubernetes.io/component: awx-launcher
          dmf.function: nmos-cpp

- name: Ensure NMOS AWX launcher Role exists
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: nmos-cpp-launcher
        namespace: nmos
        labels:
          app.kubernetes.io/name: nmos-cpp
          app.kubernetes.io/component: awx-launcher
          dmf.function: nmos-cpp
      rules:
        - apiGroups: [""]
          resources:
            - configmaps
            - persistentvolumeclaims
            - pods
            - secrets
            - services
          verbs: ["create", "get", "list", "watch", "patch", "update", "delete"]
        - apiGroups: ["apps"]
          resources:
            - deployments
            - statefulsets
          verbs: ["create", "get", "list", "watch", "patch", "update", "delete"]

- name: Ensure NMOS AWX launcher RoleBinding exists
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: nmos-cpp-launcher
        namespace: nmos
        labels:
          app.kubernetes.io/name: nmos-cpp
          app.kubernetes.io/component: awx-launcher
          dmf.function: nmos-cpp
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: Role
        name: nmos-cpp-launcher
      subjects:
        - kind: ServiceAccount
          name: nmos-cpp-launcher
          namespace: nmos

- name: Ensure AWX controller can create EE pods in nmos namespace
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: awx-job-pod-manager
        namespace: nmos
        labels:
          dmf.function: nmos-cpp
          adr: "0025"
      rules:
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["create", "get", "list", "watch", "delete"]
        - apiGroups: [""]
          resources: ["pods/log"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["pods/exec"]
          verbs: ["create"]
        - apiGroups: [""]
          resources: ["pods/attach"]
          verbs: ["create"]

- name: Bind awx controller SA to awx-job-pod-manager role in nmos
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: awx-controller-pod-manager
        namespace: nmos
        labels:
          dmf.function: nmos-cpp
          adr: "0025"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: Role
        name: awx-job-pod-manager
      subjects:
        - kind: ServiceAccount
          name: awx
          namespace: awx

- name: Ingress readiness gate — Traefik + AWX
  ansible.builtin.include_role:
    name: shared/gate-ingress-ready
  vars:
    gate_ingress_probe_url: "{{ awx_integration_api_base }}/ping/"
    gate_app_ready_url: "{{ awx_integration_api_base }}/me/"
    gate_app_ready_url_username: "{{ awx_integration_admin_user }}"
    gate_app_ready_url_password: "{{ awx_integration_admin_password }}"
    gate_app_ready_force_basic_auth: true
    gate_app_ready_validate_certs: "{{ awx_integration_validate_certs | bool }}"

- name: Check AWX API availability
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/ping/"
    method: GET
    status_code: [200, 302, 503]
  register: awx_integration_api_check
  until: awx_integration_api_check.status == 200
  retries: "{{ awx_integration_api_wait_retries }}"
  delay: "{{ awx_integration_api_wait_delay }}"

- name: Wait for AWX admin authentication to work
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/me/"
    method: GET
    url_username: "{{ awx_integration_admin_user }}"
    url_password: "{{ awx_integration_admin_password }}"
    force_basic_auth: true
    status_code: 200
  register: awx_integration_admin_me
  until: awx_integration_admin_me.status == 200
  retries: "{{ awx_integration_auth_wait_retries }}"
  delay: "{{ awx_integration_auth_wait_delay }}"

- name: Set NetBox inventory plugin content
  ansible.builtin.set_fact:
    awx_integration_netbox_inventory_content: |-
      plugin: netbox.netbox.nb_inventory
      api_endpoint: "{{ awx_integration_netbox_url }}"
      token: "{{ awx_integration_netbox_token }}"
      timeout: {{ awx_integration_netbox_timeout }}
      validate_certs: {{ awx_integration_validate_certs | bool | lower }}
      cache: {{ awx_integration_netbox_cache | bool | lower }}
      cache_timeout: {{ awx_integration_netbox_cache_timeout | default(3600) }}
      group_by:
        - sites
        - device_roles
      compose:
        ansible_host: primary_ip4.address
    # NEUTRALIZED for the v0.1 offline sandbox (ADR-0030/0031): the project's
    # collections/requirements.yml must NOT trigger a public galaxy.ansible.com
    # fetch during project_update / inventory sync. netbox.netbox is BAKED into
    # the DMF AWX EE (ee/requirements.yml) and supplied at job runtime. An empty
    # list keeps the file declarative + present (ansible-galaxy is a no-op, no
    # galaxy contact). Permanent fix swaps this to internal Forgejo-git sources
    # (ADR-0034); do NOT reintroduce a galaxy-server-resolved name+version here.
    awx_integration_collections_content: |-
      ---
      # Collections are baked into the DMF AWX EE image (see dmf-infra
      # k3s-lab-bootstrap/ee/requirements.yml). Intentionally empty so
      # project_update performs no public-galaxy fetch (ADR-0030/0031/0034).
      collections: []
  no_log: true

- name: Validate Forgejo token
  ansible.builtin.uri:
    url: "{{ awx_integration_forgejo_api_base }}/user"
    method: GET
    headers:
      Authorization: "token {{ awx_integration_forgejo_token }}"
    status_code: 200
  until: >-
    awx_integration_forgejo_user_check is success
    or (awx_integration_forgejo_user_check.status | default(0) >= 400 and awx_integration_forgejo_user_check.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  register: awx_integration_forgejo_user_check
  no_log: "{{ not awx_integration_debug | bool }}"

- name: Ensure Forgejo repo exists
  ansible.builtin.uri:
    url: "{{ awx_integration_forgejo_api_base }}/repos/{{ awx_integration_forgejo_user }}/{{ awx_integration_project_name }}"
    method: GET
    headers:
      Authorization: "token {{ awx_integration_forgejo_token }}"
    status_code: 200
  until: >-
    awx_integration_forgejo_repo is success
    or (awx_integration_forgejo_repo.status | default(0) >= 400 and awx_integration_forgejo_repo.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  register: awx_integration_forgejo_repo
  no_log: "{{ not awx_integration_debug | bool }}"

- name: Set Forgejo repo branch
  ansible.builtin.set_fact:
    awx_integration_repo_branch: >-
      {{ (awx_integration_forgejo_repo.json.default_branch | default('')) | trim
         | default(awx_integration_project_branch, true) }}

- name: Lookup NetBox inventory file in Forgejo
  ansible.builtin.uri:
    url: "{{ awx_integration_forgejo_api_base }}/repos/{{ awx_integration_forgejo_user }}/{{ awx_integration_project_name }}/contents/{{ awx_integration_inventory_path }}"
