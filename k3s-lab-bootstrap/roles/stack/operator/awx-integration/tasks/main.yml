      job_type: run
      inventory: "{{ awx_integration_inventory_id }}"
      project: "{{ awx_catalog_project_ids[jt_item.project_name] }}"
      playbook: "{{ jt_item.playbook }}"
      execution_environment: "{{ awx_dmf_ee_id }}"
      instance_groups:
        - "{{ awx_dmf_catalog_cg_id }}"
      ask_variables_on_launch: false
      extra_vars: "{{ jt_item.extra_vars | default({}) | to_json }}"
    status_code: 201
  failed_when: false
  until: >-
    awx_catalog_jt_created is success
    or (awx_catalog_jt_created.status | default(0) >= 400 and awx_catalog_jt_created.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  loop: "{{ awx_catalog_job_templates }}"
  loop_control:
    loop_var: jt_item
    label: "{{ jt_item.name }}"
    index_var: loop_index0
  when: >-
    awx_catalog_jt_lookup_ids is defined and
    awx_catalog_jt_lookup_ids.results[loop_index0].json.results
    | default([]) | length == 0
  register: awx_catalog_jt_created
  # no_log hides the task input (admin password in url_password). The
  # registered result IS populated, so the surface task below can show
  # per-JT failure details. failed_when: false lets the loop complete
  # so we see EVERY failing entry, not just the first.
  no_log: true

- name: Surface AWX catalog JT create failures (per-entry response body)
  ansible.builtin.debug:
    msg: |
      {% for r in awx_catalog_jt_created.results %}
      {% if r.skipped | default(false) %}
      JT '{{ r.jt_item.name }}': skipped (already exists)
      {% elif (r.status | default(0)) == 201 %}
      JT '{{ r.jt_item.name }}': created
      {% else %}
      JT '{{ r.jt_item.name }}': FAILED status={{ r.status | default('no-response') }}
        playbook    : {{ r.jt_item.playbook }}
        project     : {{ r.jt_item.project_name }}
        response    : {{ r.json | default(r.content | default('(no body)')) }}
        msg         : {{ r.msg | default('') }}
      {% endif %}
      {% endfor %}
  when: awx_catalog_jt_created is defined

- name: Fail role if any AWX catalog JT create returned non-201
  ansible.builtin.fail:
    msg: >-
      One or more AWX catalog job template creates failed — see the
      per-entry response bodies above. Most common cause: the playbook
      named in awx_catalog_job_templates[].playbook is not present in
      the AWX project's source repo. Fix the playbook reference (or
      add the missing playbook to dmf-runbooks) and re-run.
  when: >-
    awx_catalog_jt_created.results
    | rejectattr('skipped', 'defined')
    | rejectattr('status', 'eq', 201)
    | list | length > 0

- name: Update catalog job templates with execution environment (idempotent)
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/job_templates/{{ (awx_catalog_jt_lookup_ids.results[loop_index0].json.results[0].id) }}/"
    method: PATCH
    url_username: "{{ awx_integration_admin_user }}"
    url_password: "{{ awx_integration_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      execution_environment: "{{ awx_dmf_ee_id }}"
      instance_groups:
        - "{{ awx_dmf_catalog_cg_id }}"
      extra_vars: "{{ jt_item.extra_vars | default({}) | to_json }}"
    status_code: 200
  until: >-
    _gate_uri_result_20 is success
    or (_gate_uri_result_20.status | default(0) >= 400 and _gate_uri_result_20.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  register: _gate_uri_result_20
  loop: "{{ awx_catalog_job_templates }}"
  loop_control:
    loop_var: jt_item
    label: "{{ jt_item.name }}"
    index_var: loop_index0
  run_once: true
  when:
    - awx_catalog_jt_lookup_ids.results is defined
    - awx_catalog_jt_lookup_ids.results[loop_index0].json.results | length > 0
  no_log: true

# ---------------------------------------------------------------------------
# Phase 8a: Bootstrap AWX SSH privkey to OpenBao (ADR-0016)
# Writes the control-node SSH privkey to OpenBao for credential creation.
# This runs as part of the regular bootstrap, before credential creation.
# ---------------------------------------------------------------------------
- name: Read AWX SSH privkey from disk for OpenBao bootstrap
  ansible.builtin.slurp:
    src: "{{ awx_control_node_ssh_privkey_path }}"
  register: _awx_ssh_privkey_slurp
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true
  when:
    - awx_integration_persist_to_openbao | bool
    - awx_control_node_ssh_privkey_path is defined
    - awx_control_node_ssh_privkey_path | length > 0

- name: Bootstrap AWX SSH privkey to OpenBao (write)
  ansible.builtin.shell: |
    printf '%s\n%s\n' "$OPENBAO_TOKEN" "$SSH_KEY_B64" |
    kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml \
    -n {{ awx_integration_openbao_namespace }} \
    exec -i {{ _awx_openbao_pod }} \
    -- sh -c '
    IFS= read -r BAO_TOKEN
    IFS= read -r SSH_KEY_B64
    export BAO_TOKEN
    SSH_KEY_DATA=$(echo "$SSH_KEY_B64" | base64 -d)
    bao kv put secret/apps/awx/control_node_ssh ssh_key_data="$SSH_KEY_DATA"
    '
  register: _awx_ssh_bootstrap_write
  run_once: true
  environment:
    OPENBAO_TOKEN: "{{ _awx_openbao_operator_client_token }}"
    SSH_KEY_B64: "{{ _awx_ssh_privkey_slurp.content }}"
  changed_when: false
  no_log: true
  when:
    - awx_integration_persist_to_openbao | bool
    - _awx_openbao_operator_client_token is defined
    - _awx_ssh_privkey_slurp is defined
    - _awx_ssh_privkey_slurp.content is defined

# ---------------------------------------------------------------------------
# Phase 8: AWX SSH Machine credential for control-node access (ADR-0016)
# Reads privkey from OpenBao and creates the AWX Machine credential.
# ---------------------------------------------------------------------------
- name: Lookup Machine credential type
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/credential_types/?name=Machine"
    method: GET
    url_username: "{{ awx_integration_admin_user }}"
    url_password: "{{ awx_integration_admin_password }}"
    force_basic_auth: true
    status_code: 200
  until: >-
    awx_machine_cred_type_lookup is success
    or (awx_machine_cred_type_lookup.status | default(0) >= 400 and awx_machine_cred_type_lookup.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  register: awx_machine_cred_type_lookup
  run_once: true

- name: Set Machine credential type id
  ansible.builtin.set_fact:
    awx_machine_cred_type_id: "{{ (awx_machine_cred_type_lookup.json.results | first).id }}"
  run_once: true
  when: awx_machine_cred_type_lookup.json.count | int > 0

- name: Lookup existing awx-control-node-ssh credential
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/credentials/?name=awx-control-node-ssh&organization={{ awx_integration_org_id }}"
    method: GET
    url_username: "{{ awx_integration_admin_user }}"
    url_password: "{{ awx_integration_admin_password }}"
    force_basic_auth: true
    status_code: 200
  until: >-
    awx_control_node_ssh_cred_lookup is success
    or (awx_control_node_ssh_cred_lookup.status | default(0) >= 400 and awx_control_node_ssh_cred_lookup.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  register: awx_control_node_ssh_cred_lookup
  run_once: true

- name: Read AWX control-node SSH privkey from OpenBao
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ awx_integration_openbao_namespace }}
      exec -i {{ _awx_openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao kv get -format=json secret/apps/awx/control_node_ssh'
  register: _awx_control_node_ssh_raw
  changed_when: false
  run_once: true
  environment:
    OPENBAO_TOKEN: "{{ _awx_openbao_operator_client_token }}"
  no_log: true
  when:
    - awx_integration_persist_to_openbao | bool
    - _awx_openbao_operator_client_token is defined
  failed_when: false

- name: Extract SSH key data from OpenBao
  ansible.builtin.set_fact:
    _awx_control_node_ssh_key: "{{ (_awx_control_node_ssh_raw.stdout | from_json).data.data.ssh_key_data }}"
  run_once: true
  no_log: true
  when:
    - _awx_control_node_ssh_raw is defined
    - _awx_control_node_ssh_raw.stdout is defined
    - _awx_control_node_ssh_raw.stdout | length > 0

- name: Create AWX control-node SSH Machine credential
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/credentials/"
    method: POST
    url_username: "{{ awx_integration_admin_user }}"
    url_password: "{{ awx_integration_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "awx-control-node-ssh"
      description: "SSH credential for AWX→control-node playbook execution (ADR-0016)"
      organization: "{{ awx_integration_org_id }}"
      credential_type: "{{ awx_machine_cred_type_id }}"
      inputs:
        username: "k3s-admin"
        ssh_key_data: "{{ _awx_control_node_ssh_key }}"
    status_code: 201
  until: >-
    awx_control_node_ssh_cred_created is success
    or (awx_control_node_ssh_cred_created.status | default(0) >= 400 and awx_control_node_ssh_cred_created.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  register: awx_control_node_ssh_cred_created
  run_once: true
  no_log: true
  when:
    - awx_control_node_ssh_cred_lookup.json.count | int == 0
    - _awx_control_node_ssh_key is defined

- name: Update existing AWX control-node SSH credential
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/credentials/{{ (awx_control_node_ssh_cred_lookup.json.results | first).id }}/"
    method: PATCH
    url_username: "{{ awx_integration_admin_user }}"
    url_password: "{{ awx_integration_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      inputs:
        username: "k3s-admin"
        ssh_key_data: "{{ _awx_control_node_ssh_key }}"
    status_code: 200
  until: >-
    awx_control_node_ssh_cred_updated is success
    or (awx_control_node_ssh_cred_updated.status | default(0) >= 400 and awx_control_node_ssh_cred_updated.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  register: awx_control_node_ssh_cred_updated
  run_once: true
  no_log: true
  when:
    - awx_control_node_ssh_cred_lookup.json.count | int > 0
    - _awx_control_node_ssh_key is defined

- name: Set AWX control-node SSH credential id
  ansible.builtin.set_fact:
    awx_control_node_ssh_cred_id: >-
      {{ (awx_control_node_ssh_cred_lookup.json.results | default([]) | first | default({})).id
         | default(awx_control_node_ssh_cred_created.json.id) }}
  run_once: true

- name: Lookup catalog job template IDs by name
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/job_templates/?name={{ jt_item.name | urlencode }}&organization={{ awx_integration_org_id }}"
    method: GET
    url_username: "{{ awx_integration_admin_user }}"
    url_password: "{{ awx_integration_admin_password }}"
    force_basic_auth: true
    status_code: 200
  until: >-
    awx_catalog_jt_lookup is success
    or (awx_catalog_jt_lookup.status | default(0) >= 400 and awx_catalog_jt_lookup.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  loop: "{{ awx_catalog_job_templates }}"
  loop_control:
    loop_var: jt_item
    label: "{{ jt_item.name }}"
  register: awx_catalog_jt_lookup
  run_once: true

- name: Update extra_vars for existing catalog job templates
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/job_templates/{{ jt_id }}/"
    method: PATCH
    url_username: "{{ awx_integration_admin_user }}"
    url_password: "{{ awx_integration_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      extra_vars: "{{ jt_item.extra_vars | default({}) | to_json }}"
    status_code: 200
  until: >-
    _gate_uri_result_21 is success
    or (_gate_uri_result_21.status | default(0) >= 400 and _gate_uri_result_21.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  register: _gate_uri_result_21
  vars:
    jt_id: "{{ (awx_catalog_jt_lookup.results[loop_index0].json.results[0].id) }}"
  loop: "{{ awx_catalog_job_templates }}"
  loop_control:
    loop_var: jt_item
    label: "{{ jt_item.name }}"
    index_var: loop_index0
  run_once: true
  when:
    - awx_catalog_jt_lookup.results is defined
    - awx_catalog_jt_lookup.results[loop_index0].json.results | length > 0
  no_log: true

- name: Attach DMF catalog Container Group to catalog job templates
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/job_templates/{{ jt_id }}/instance_groups/"
    method: POST
    url_username: "{{ awx_integration_admin_user }}"
    url_password: "{{ awx_integration_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      id: "{{ awx_dmf_catalog_cg_id }}"
    status_code: [201, 204, 400]
  until: >-
    _gate_uri_result_22 is success
    or (_gate_uri_result_22.status | default(0) >= 400 and _gate_uri_result_22.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  register: _gate_uri_result_22
  vars:
    jt_id: "{{ (awx_catalog_jt_lookup.results[loop_index0].json.results[0].id) }}"
  loop: "{{ awx_catalog_job_templates }}"
  loop_control:
    loop_var: jt_item
    label: "{{ jt_item.name }}"
    index_var: loop_index0
  run_once: true
  when:
    - awx_catalog_jt_lookup.results is defined
    - awx_catalog_jt_lookup.results[loop_index0].json.results | length > 0
  no_log: true

- name: Attach SSH credential to catalog job templates
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/job_templates/{{ jt_id }}/credentials/"
    method: POST
    url_username: "{{ awx_integration_admin_user }}"
    url_password: "{{ awx_integration_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      id: "{{ awx_control_node_ssh_cred_id }}"
    status_code: [201, 204, 400]
  until: >-
    _gate_uri_result_23 is success
    or (_gate_uri_result_23.status | default(0) >= 400 and _gate_uri_result_23.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  register: _gate_uri_result_23
  vars:
    jt_id: "{{ (awx_catalog_jt_lookup.results[loop_index0].json.results[0].id) }}"
  loop: "{{ awx_catalog_job_templates }}"
  loop_control:
    loop_var: jt_item
    label: "{{ jt_item.name }}"
    index_var: loop_index0
  run_once: true
  when:
    - awx_catalog_jt_lookup.results is defined
    - awx_catalog_jt_lookup.results[loop_index0].json.results | length > 0
