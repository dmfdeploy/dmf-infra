- name: Create temp file for AWX vault edits
  ansible.builtin.tempfile:
    state: file
    suffix: .yml
  register: awx_integration_vault_tmp
  run_once: true
  delegate_to: localhost
  become: false
  when: not awx_integration_persist_to_openbao | bool

- name: Read vault.yml header
  ansible.builtin.slurp:
    path: "{{ awx_integration_vault_path }}"
  register: awx_integration_vault_slurp
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true
  when: not awx_integration_persist_to_openbao | bool

- name: Set vault encrypted flag
  ansible.builtin.set_fact:
    awx_integration_vault_encrypted: "{{ (awx_integration_vault_slurp.content | b64decode).startswith('$ANSIBLE_VAULT') }}"
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true
  when: not awx_integration_persist_to_openbao | bool

- name: Decrypt vault.yml to temp file
  ansible.builtin.command: >
    ansible-vault decrypt --vault-password-file {{ awx_integration_vault_password_file_effective }}
    --output {{ awx_integration_vault_tmp.path }} {{ awx_integration_vault_path }}
  run_once: true
  delegate_to: localhost
  become: false
  when:
    - not awx_integration_persist_to_openbao | bool
    - awx_integration_vault_encrypted
  no_log: true

- name: Copy vault.yml to temp file
  ansible.builtin.copy:
    src: "{{ awx_integration_vault_path }}"
    dest: "{{ awx_integration_vault_tmp.path }}"
    mode: "0600"
  run_once: true
  delegate_to: localhost
  become: false
  when:
    - not awx_integration_persist_to_openbao | bool
    - not awx_integration_vault_encrypted
  no_log: true

- name: Update AWX service credentials in vault
  ansible.builtin.lineinfile:
    path: "{{ awx_integration_vault_tmp.path }}"
    regexp: "^{{ item.key }}:"
    line: "{{ item.key }}: \"{{ item.value }}\""
    create: true
  loop:
    - key: vault_awx_svc_password
      value: "{{ awx_integration_svc_password_effective }}"
    - key: vault_awx_svc_token
      value: "{{ awx_integration_svc_token_effective }}"
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true
  when: not awx_integration_persist_to_openbao | bool

- name: Encrypt updated vault.yml
  ansible.builtin.command: >
    ansible-vault encrypt --vault-password-file {{ awx_integration_vault_password_file_effective }} {{ awx_integration_vault_tmp.path }}
  run_once: true
  delegate_to: localhost
  become: false
  when:
    - not awx_integration_persist_to_openbao | bool
    - awx_integration_vault_encrypted
  no_log: true

- name: Replace vault.yml with updated version
  ansible.builtin.command: >
    cp -f {{ awx_integration_vault_tmp.path }} {{ awx_integration_vault_path }}
  run_once: true
  delegate_to: localhost
  become: false
  no_log: true
  when: not awx_integration_persist_to_openbao | bool

- name: Cleanup temp vault file
  ansible.builtin.file:
    path: "{{ awx_integration_vault_tmp.path }}"
    state: absent
  run_once: true
  delegate_to: localhost
  become: false
  when: not awx_integration_persist_to_openbao | bool

- name: Persist AWX integration secrets to in-cluster OpenBao
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n%s\n%s\n'
      "$OPENBAO_TOKEN"
      "$AWX_SVC_PASSWORD"
      "$AWX_SVC_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ awx_integration_openbao_namespace }}
      exec -i {{ _awx_openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      IFS= read -r SVC_PASSWORD;
      IFS= read -r SVC_TOKEN;
      export BAO_TOKEN;
      bao kv patch {{ awx_integration_runtime_secret_path | quote }}
      awx_svc_password="$SVC_PASSWORD"
      awx_svc_token="$SVC_TOKEN"
      || bao kv put {{ awx_integration_runtime_secret_path | quote }}
      awx_svc_password="$SVC_PASSWORD"
      awx_svc_token="$SVC_TOKEN"'
  run_once: true
  environment:
    OPENBAO_TOKEN: "{{ _awx_openbao_operator_client_token }}"
    AWX_SVC_PASSWORD: "{{ awx_integration_svc_password_effective }}"
    AWX_SVC_TOKEN: "{{ awx_integration_svc_token_effective }}"
  changed_when: false
  no_log: true
  when: awx_integration_persist_to_openbao | bool

