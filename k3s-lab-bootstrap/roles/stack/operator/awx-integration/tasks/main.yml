# AWX binds token ownership to the AUTHENTICATING principal — a token minted as
# admin is admin(break-glass)-owned regardless of the URL user-id. To mint an
# awx-svc-owned token we must authenticate AS awx-svc, which needs a known
# password. PATCH it onto the user (idempotent; covers pre-existing users whose
# random create-time password is unknown). ADR-0028 C3/C4.
- name: Ensure awx-svc password matches the effective value
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/users/{{ awx_integration_svc_user_id }}/"
    method: PATCH
    url_username: "{{ awx_integration_admin_user }}"
    url_password: "{{ awx_integration_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      password: "{{ awx_integration_svc_password_effective }}"
    status_code: 200
  until: >-
    _gate_uri_result_12 is success
    or (_gate_uri_result_12.status | default(0) >= 400 and _gate_uri_result_12.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  register: _gate_uri_result_12
  no_log: true

# Force re-mint if the persisted token is not owned by awx-svc (e.g. a legacy
# break-glass-owned token). Clearing _effective makes the create task below fire
# under awx-svc auth → a self-owned token.
- name: Validate persisted awx-svc token ownership
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/me/"
    method: GET
    headers:
      Authorization: "Bearer {{ awx_integration_svc_token_effective }}"
    status_code: [200, 401, 403]
  failed_when: false
  until: >-
    _awx_integration_svc_token_me is success
    or (_awx_integration_svc_token_me.status | default(0) >= 400 and _awx_integration_svc_token_me.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  register: _awx_integration_svc_token_me
  no_log: true
  when: awx_integration_svc_token_effective | length > 0

- name: Clear persisted token if not owned by awx-svc (force self-owned re-mint)
  ansible.builtin.set_fact:
    awx_integration_svc_token_effective: ""
  when:
    - awx_integration_svc_token_effective | length > 0
    - (_awx_integration_svc_token_me.status | default(0) | int != 200)
      or ((_awx_integration_svc_token_me.json.username | default('')) != awx_integration_svc_user)
  no_log: true

- name: Create AWX service token if missing
  ansible.builtin.uri:
    url: "{{ awx_integration_api_base }}/users/{{ awx_integration_svc_user_id }}/personal_tokens/"
    method: POST
    # Authenticate AS awx-svc so the token is self-owned (NOT admin-owned).
    url_username: "{{ awx_integration_svc_user }}"
    url_password: "{{ awx_integration_svc_password_effective }}"
    force_basic_auth: true
    body_format: json
    body:
      description: "awx-svc-token"
      scope: "write"
    status_code: 201
  until: >-
    awx_integration_svc_token_created is success
    or (awx_integration_svc_token_created.status | default(0) >= 400 and awx_integration_svc_token_created.status | default(0) < 500)
  retries: "{{ _gate_uri_retry | default(6) }}"
  delay: "{{ _gate_uri_delay | default(5) }}"
  register: awx_integration_svc_token_created
  when: awx_integration_svc_token_effective | length == 0
  no_log: true

- name: Set AWX service token from API response
  ansible.builtin.set_fact:
    awx_integration_svc_token_effective: "{{ awx_integration_svc_token_created.json.token | default('') }}"
  when: awx_integration_svc_token_effective | length == 0
  no_log: true

