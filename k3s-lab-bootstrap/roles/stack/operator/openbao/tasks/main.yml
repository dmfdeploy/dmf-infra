      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao write -format=json -force auth/approle/role/{{ openbao_born_inventory_role_name }}/secret-id'
  environment:
    OPENBAO_TOKEN: "{{ openbao_root_token }}"
  register: born_inventory_secret_id_raw
  no_log: true
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

- name: Extract born-inventory role_id and secret_id from init output
  ansible.builtin.set_fact:
    openbao_born_inventory_role_id: "{{ (born_inventory_role_id_raw.stdout | from_json).data.role_id }}"
    openbao_born_inventory_secret_id: "{{ (born_inventory_secret_id_raw.stdout | from_json).data.secret_id }}"
  when:
    - born_inventory_role_id_raw is defined
    - born_inventory_role_id_raw.stdout is defined
    - born_inventory_secret_id_raw is defined
    - born_inventory_secret_id_raw.stdout is defined
  no_log: true

# ---------------------------------------------------------------------------
# Phase 5 — operator userpass retrieval path
# Grants human operators a narrow read on secret/data/apps/*/admin without
# handing them the root token. Password is persisted to the break-glass
# JSON and reused on subsequent runs.
# (Password is preloaded and generated earlier in the role)
# ---------------------------------------------------------------------------

- name: Write app-admin-reader policy HCL in pod
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - -n
      - "{{ openbao_namespace }}"
      - exec
      - "{{ openbao_pod }}"
      - --
      - sh
      - -c
      - |
        cat > /tmp/app-admin-reader-policy.hcl << 'HCL'
        path "secret/data/apps/+/admin" {
          capabilities = ["read"]
        }
        path "secret/metadata/apps/+/admin" {
          capabilities = ["read"]
        }
        path "secret/data/apps/+/breakglass" {
          capabilities = ["read"]
        }
        path "secret/metadata/apps/+/breakglass" {
          capabilities = ["read"]
        }
        path "secret/metadata/apps" {
          capabilities = ["list"]
        }
        path "secret/data/apps/authentik/bootstrap-passkey" {
          capabilities = ["read"]
        }
        HCL
  no_log: true
  when: openbao_is_initialized | bool

- name: Apply app-admin-reader policy
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao policy write {{ openbao_operator_reader_policy_name }} /tmp/app-admin-reader-policy.hcl'
  environment:
    OPENBAO_TOKEN: "{{ _openbao_policy_apply_token }}"
  no_log: true
  when: openbao_is_initialized | bool

- name: Upsert operator userpass user
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n%s\n' "$OPENBAO_TOKEN" "$OPENBAO_OPERATOR_PASSWORD" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      IFS= read -r P;
      export BAO_TOKEN;
      bao write auth/userpass/users/{{ openbao_operator_username }}
      password="$P"
      token_policies={{ openbao_operator_policy_name }},{{ openbao_operator_runtime_policy_name }}
      token_ttl=1h token_max_ttl=4h'
  environment:
    OPENBAO_TOKEN: "{{ openbao_root_token }}"
    OPENBAO_OPERATOR_PASSWORD: "{{ openbao_operator_password }}"
  no_log: true
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

# ---------------------------------------------------------------------------
# Policy reconciliation identity — narrow permissions for reapplying policies
# without the root token on reruns.
# ---------------------------------------------------------------------------

- name: Write policy-writer policy HCL in pod
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - -n
      - "{{ openbao_namespace }}"
      - exec
      - "{{ openbao_pod }}"
      - --
      - sh
      - -c
      - |
        cat > /tmp/policy-writer-policy.hcl << 'HCL'
        path "sys/policies/acl/*" {
          capabilities = ["create", "read", "update", "delete", "list"]
        }
        HCL
  no_log: true
  when: openbao_is_initialized | bool

- name: Apply policy-writer policy
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao policy write {{ openbao_policy_writer_policy_name }} /tmp/policy-writer-policy.hcl'
  environment:
    OPENBAO_TOKEN: "{{ _openbao_policy_apply_token }}"
  no_log: true
  when: openbao_is_initialized | bool

# ---------------------------------------------------------------------------
# AppRole reconciliation identity (ADR-0021)
# Narrow scope: only object-storage AppRole creation + ESO binding writes.
# Explicit per-logical HCL — no mid-path * globs (OpenBao only supports * at end).
# ---------------------------------------------------------------------------

- name: Write approle-reconciler policy HCL in pod
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - -n
      - "{{ openbao_namespace }}"
      - exec
      - "{{ openbao_pod }}"
      - --
      - sh
      - -c
      - |
        cat > /tmp/approle-reconciler-writer-policy.hcl << 'HCL'
        {% for logical in openbao_approle_reconciler_object_storage_logicals %}
        {% set dashed = logical | replace('_', '-') %}
        path "auth/approle/role/object-storage-{{ dashed }}" {
          capabilities = ["create", "read", "update", "delete", "list"]
        }
        path "auth/approle/role/object-storage-{{ dashed }}/role-id" {
          capabilities = ["read"]
        }
        path "auth/approle/role/object-storage-{{ dashed }}/secret-id" {
          capabilities = ["create", "read", "update"]
        }
        path "secret/data/platform/eso-bindings/object-storage-{{ dashed }}" {
          capabilities = ["create", "read", "update", "delete"]
        }
        path "secret/metadata/platform/eso-bindings/object-storage-{{ dashed }}" {
          capabilities = ["read", "list", "delete"]
        }
        {% endfor %}
        HCL
  no_log: true
  when: openbao_is_initialized | bool

- name: Apply approle-reconciler-writer policy
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao policy write {{ openbao_approle_reconciler_policy_name }} /tmp/approle-reconciler-writer-policy.hcl'
  environment:
    OPENBAO_TOKEN: "{{ _openbao_policy_apply_token }}"
  no_log: true
  when: openbao_is_initialized | bool

- name: Upsert policy-reconciler userpass user
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n%s\n' "$OPENBAO_TOKEN" "$OPENBAO_POLICY_RECONCILER_PASSWORD" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      IFS= read -r P;
      export BAO_TOKEN;
      bao write auth/userpass/users/{{ openbao_policy_reconciler_username }}
      password="$P"
      token_policies={{ openbao_policy_writer_policy_name }}
      token_ttl=1h token_max_ttl=4h'
  environment:
    OPENBAO_TOKEN: "{{ openbao_root_token }}"
    OPENBAO_POLICY_RECONCILER_PASSWORD: "{{ openbao_policy_reconciler_password }}"
  no_log: true
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

- name: Upsert approle-reconciler userpass user
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n%s\n' "$OPENBAO_TOKEN" "$OPENBAO_APPROLE_RECONCILER_PASSWORD" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      IFS= read -r P;
      export BAO_TOKEN;
      bao write auth/userpass/users/{{ openbao_approle_reconciler_username }}
      password="$P"
      token_policies={{ openbao_approle_reconciler_policy_name }}
      token_ttl=1h token_max_ttl=4h'
  environment:
    OPENBAO_TOKEN: "{{ openbao_root_token }}"
    OPENBAO_APPROLE_RECONCILER_PASSWORD: "{{ openbao_approle_reconciler_password }}"
  no_log: true
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

# ---------------------------------------------------------------------------
# Save all keys to a local file (Hetzner validation mode)
# ---------------------------------------------------------------------------

- name: Compose break-glass JSON content
  ansible.builtin.set_fact:
    openbao_breakglass_content:
      unseal_keys_hex: "{{ openbao_unseal_keys_hex | default(existing_breakglass.unseal_keys_hex | default([])) }}"
      eso_role_id: "{{ openbao_eso_role_id | default(existing_breakglass.eso_role_id | default('')) }}"
      eso_secret_id: "{{ openbao_eso_secret_id | default(existing_breakglass.eso_secret_id | default('')) }}"
      born_inventory_role_id: "{{ openbao_born_inventory_role_id | default(existing_breakglass.born_inventory_role_id | default('')) }}"
      born_inventory_secret_id: "{{ openbao_born_inventory_secret_id | default(existing_breakglass.born_inventory_secret_id | default('')) }}"
      shamir_threshold: "{{ openbao_shamir_threshold }}"
      shamir_shares: "{{ openbao_shamir_shares }}"
      ops_admin_username: "{{ openbao_operator_username }}"
      ops_admin_password: "{{ openbao_operator_password }}"
      policy_reconciler_username: "{{ openbao_policy_reconciler_username }}"
      policy_reconciler_password: "{{ openbao_policy_reconciler_password }}"
      approle_reconciler_username: "{{ openbao_approle_reconciler_username }}"
      approle_reconciler_password: "{{ openbao_approle_reconciler_password }}"
  no_log: true

- name: Save all OpenBao keys locally
  ansible.builtin.copy:
    content: "{{ openbao_breakglass_content | to_nice_json }}"
    dest: "{{ openbao_key_path }}.json"
    mode: "0600"
  delegate_to: localhost
  become: false
  no_log: true

# ---------------------------------------------------------------------------
# Post-checks — verify ops-admin has correct capabilities
# ---------------------------------------------------------------------------

- name: Log in as ops-admin for capability verification
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_PASSWORD" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r P;
      bao write -format=json auth/userpass/login/{{ openbao_operator_username }} password="$P"'
  register: _openbao_ops_admin_login
  changed_when: false
  environment:
    OPENBAO_PASSWORD: "{{ openbao_operator_password }}"
  no_log: true
  when: openbao_is_initialized | bool

- name: Extract ops-admin token for capability checks
  ansible.builtin.set_fact:
    _openbao_ops_admin_token: "{{ (_openbao_ops_admin_login.stdout | from_json).auth.client_token }}"
  no_log: true
  when: _openbao_ops_admin_login is defined and _openbao_ops_admin_login.stdout | default('') | length > 0

- name: Check ops-admin capabilities on Zot admin data path
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao token capabilities -format=json secret/data/apps/zot/admin'
  register: _openbao_zot_admin_data_caps
  changed_when: false
  environment:
    OPENBAO_TOKEN: "{{ _openbao_ops_admin_token }}"
  no_log: true
  when: _openbao_ops_admin_token is defined

- name: Check ops-admin capabilities on Zot admin metadata path
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao token capabilities -format=json secret/metadata/apps/zot/admin'
  register: _openbao_zot_admin_meta_caps
  changed_when: false
  environment:
    OPENBAO_TOKEN: "{{ _openbao_ops_admin_token }}"
  no_log: true
  when: _openbao_ops_admin_token is defined

- name: Normalize ops-admin Zot admin capabilities
  ansible.builtin.set_fact:
    _openbao_zot_admin_data_capabilities: >-
      {% set parsed = _openbao_zot_admin_data_caps.stdout | from_json %}
      {{ parsed.capabilities if parsed is mapping and parsed.capabilities is defined else parsed }}
    _openbao_zot_admin_meta_capabilities: >-
      {% set parsed = _openbao_zot_admin_meta_caps.stdout | from_json %}
      {{ parsed.capabilities if parsed is mapping and parsed.capabilities is defined else parsed }}
  when:
    - _openbao_zot_admin_data_caps is defined
    - _openbao_zot_admin_data_caps.stdout | default('') | length > 0
    - _openbao_zot_admin_meta_caps is defined
    - _openbao_zot_admin_meta_caps.stdout | default('') | length > 0

- name: Verify ops-admin has read+write on Zot admin path
  ansible.builtin.assert:
    that:
      - "'read' in _openbao_zot_admin_data_capabilities"
      - "'update' in _openbao_zot_admin_data_capabilities or 'write' in _openbao_zot_admin_data_capabilities"
      - "'read' in _openbao_zot_admin_meta_capabilities"
    fail_msg: >-
      OpenBao policy drift: ops-admin cannot access Zot admin secret path.
      Expected read and write capabilities on secret/data/apps/zot/admin,
      but got {{ _openbao_zot_admin_data_capabilities | default([]) }}.
      This usually indicates policy overwrite/clobbering. Verify policy reconciliation
      and rerun OpenBao bootstrap.
  when:
    - _openbao_zot_admin_data_capabilities is defined
    - _openbao_zot_admin_meta_capabilities is defined

- name: Check ops-admin capabilities on Authentik breakglass data path
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao token capabilities -format=json secret/data/apps/authentik/breakglass'
  register: _openbao_authentik_breakglass_data_caps
  changed_when: false
  environment:
    OPENBAO_TOKEN: "{{ _openbao_ops_admin_token }}"
  no_log: true
  when: _openbao_ops_admin_token is defined

- name: Check ops-admin capabilities on Authentik breakglass metadata path
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao token capabilities -format=json secret/metadata/apps/authentik/breakglass'
  register: _openbao_authentik_breakglass_meta_caps
  changed_when: false
  environment:
    OPENBAO_TOKEN: "{{ _openbao_ops_admin_token }}"
  no_log: true
  when: _openbao_ops_admin_token is defined

- name: Normalize ops-admin Authentik breakglass capabilities
  ansible.builtin.set_fact:
    _openbao_authentik_breakglass_data_capabilities: >-
      {% set parsed = _openbao_authentik_breakglass_data_caps.stdout | from_json %}
      {{ parsed.capabilities if parsed is mapping and parsed.capabilities is defined else parsed }}
    _openbao_authentik_breakglass_meta_capabilities: >-
      {% set parsed = _openbao_authentik_breakglass_meta_caps.stdout | from_json %}
      {{ parsed.capabilities if parsed is mapping and parsed.capabilities is defined else parsed }}
  when:
    - _openbao_authentik_breakglass_data_caps is defined
    - _openbao_authentik_breakglass_data_caps.stdout | default('') | length > 0
    - _openbao_authentik_breakglass_meta_caps is defined
    - _openbao_authentik_breakglass_meta_caps.stdout | default('') | length > 0

- name: Verify ops-admin has read+write on Authentik breakglass path
  ansible.builtin.assert:
    that:
      - "'read' in _openbao_authentik_breakglass_data_capabilities"
      - "'update' in _openbao_authentik_breakglass_data_capabilities or 'write' in _openbao_authentik_breakglass_data_capabilities"
      - "'read' in _openbao_authentik_breakglass_meta_capabilities"
    fail_msg: >-
      OpenBao policy drift: ops-admin cannot access Authentik breakglass secret path.
      Expected read and write capabilities on secret/data/apps/authentik/breakglass,
      but got {{ _openbao_authentik_breakglass_data_capabilities | default([]) }}.
      This usually indicates policy overwrite/clobbering. Verify policy reconciliation
      and rerun OpenBao bootstrap.
  when:
    - _openbao_authentik_breakglass_data_capabilities is defined
    - _openbao_authentik_breakglass_meta_capabilities is defined

- name: Check ops-admin capabilities on Authentik bootstrap-passkey data path
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao token capabilities -format=json secret/data/apps/authentik/bootstrap-passkey'
  register: _openbao_authentik_bootstrap_passkey_data_caps
  changed_when: false
  environment:
    OPENBAO_TOKEN: "{{ _openbao_ops_admin_token }}"
  no_log: true
  when: _openbao_ops_admin_token is defined

- name: Check ops-admin capabilities on Authentik bootstrap-passkey metadata path
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao token capabilities -format=json secret/metadata/apps/authentik/bootstrap-passkey'
  register: _openbao_authentik_bootstrap_passkey_meta_caps
  changed_when: false
  environment:
    OPENBAO_TOKEN: "{{ _openbao_ops_admin_token }}"
  no_log: true
  when: _openbao_ops_admin_token is defined

- name: Normalize ops-admin Authentik bootstrap-passkey capabilities
  ansible.builtin.set_fact:
    _openbao_authentik_bootstrap_passkey_data_capabilities: >-
      {% set parsed = _openbao_authentik_bootstrap_passkey_data_caps.stdout | from_json %}
      {{ parsed.capabilities if parsed is mapping and parsed.capabilities is defined else parsed }}
    _openbao_authentik_bootstrap_passkey_meta_capabilities: >-
      {% set parsed = _openbao_authentik_bootstrap_passkey_meta_caps.stdout | from_json %}
      {{ parsed.capabilities if parsed is mapping and parsed.capabilities is defined else parsed }}
  when:
    - _openbao_authentik_bootstrap_passkey_data_caps is defined
    - _openbao_authentik_bootstrap_passkey_data_caps.stdout | default('') | length > 0
    - _openbao_authentik_bootstrap_passkey_meta_caps is defined
    - _openbao_authentik_bootstrap_passkey_meta_caps.stdout | default('') | length > 0

- name: Verify ops-admin has read+write on Authentik bootstrap-passkey path
  ansible.builtin.assert:
    that:
      - "'read' in _openbao_authentik_bootstrap_passkey_data_capabilities"
      - "'update' in _openbao_authentik_bootstrap_passkey_data_capabilities or 'write' in _openbao_authentik_bootstrap_passkey_data_capabilities"
      - "'read' in _openbao_authentik_bootstrap_passkey_meta_capabilities"
    fail_msg: >-
      OpenBao policy drift: ops-admin cannot access Authentik bootstrap-passkey secret path.
      Expected read and write capabilities on secret/data/apps/authentik/bootstrap-passkey,
      but got {{ _openbao_authentik_bootstrap_passkey_data_capabilities | default([]) }}.
      This usually indicates policy overwrite/clobbering. Verify policy reconciliation
      and rerun OpenBao bootstrap.
  when:
    - _openbao_authentik_bootstrap_passkey_data_capabilities is defined
    - _openbao_authentik_bootstrap_passkey_meta_capabilities is defined

# ---------------------------------------------------------------------------
# Dispose root token
# ---------------------------------------------------------------------------

- name: Revoke root token
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao token revoke -self'
  environment:
    OPENBAO_TOKEN: "{{ openbao_root_token }}"
  register: _openbao_root_revoke
  changed_when: _openbao_root_revoke.rc == 0
  failed_when: false
  no_log: true
  when:
    - openbao_dispose_root_token | bool
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

- name: Assert root token revocation succeeded
  ansible.builtin.assert:
    that:
      - _openbao_root_revoke.rc | default(1) == 0
    fail_msg: >-
      Root token revocation did not succeed. Verify OpenBao health and confirm
      the break-glass state before continuing.
  when:
    - openbao_dispose_root_token | bool
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

# ---------------------------------------------------------------------------
# Report
# ---------------------------------------------------------------------------

- name: Report OpenBao deployment summary
  ansible.builtin.debug:
    msg: |
      OpenBao deployed in namespace {{ openbao_namespace }}
      Service: {{ openbao_service_name }}.{{ openbao_namespace }}.svc:{{ openbao_service_port }}
      Shamir: {{ openbao_shamir_threshold }}-of-{{ openbao_shamir_shares }}
      Keys saved to: {{ openbao_key_path }}.json
      Engines enabled: {{ openbao_engines | join(', ') }}
      ESO AppRole: {{ openbao_eso_role_name }}
      Operator userpass: {{ openbao_operator_username }} (policy: {{ openbao_operator_policy_name }})
      Next step: run 24-external-secrets-operator.yml
