  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

- name: Enable PKI secrets engine
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao secrets enable -path={{ openbao_pki_path }} -max-lease-ttl={{ openbao_pki_max_lease_ttl }} -description="PKI engine for internal CA" pki'
  environment:
    OPENBAO_TOKEN: "{{ openbao_root_token }}"
  no_log: true
  register: _enable_pki
  failed_when:
    - _enable_pki.rc != 0
    - "'path is already in use' not in (_enable_pki.stderr | default(''))"
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

# ---------------------------------------------------------------------------
# Configure kubernetes auth backend
# ---------------------------------------------------------------------------

- name: Configure kubernetes auth backend
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao write auth/kubernetes/config
      kubernetes_host=https://kubernetes.default.svc.cluster.local
      kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      token_reviewer_jwt=@/var/run/secrets/kubernetes.io/serviceaccount/token'
  environment:
    OPENBAO_TOKEN: "{{ openbao_root_token }}"
  no_log: true
  register: _config_k8s
  failed_when: false
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

# ---------------------------------------------------------------------------
# Policy apply token selection — fresh init vs rerun
# Fresh init: use root token. Rerun: use policy-reconciler client token.
# ---------------------------------------------------------------------------

- name: Set policy apply token from root token on fresh init
  ansible.builtin.set_fact:
    _openbao_policy_apply_token: "{{ openbao_root_token }}"
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)
  no_log: true

- name: Fail if policy-reconciler credentials missing on rerun
  ansible.builtin.fail:
    msg: >-
      OpenBao is already initialized but policy_reconciler_password is not
      present in break-glass JSON at {{ openbao_key_path }}.json.
      Provide a one-time privileged recovery token via stdin recovery variable
      or rebuild OpenBao from clean bootstrap.
  when:
    - openbao_is_initialized | bool
    - not (openbao_init_raw is defined and openbao_init_raw.changed | default(false))
    - openbao_policy_reconciler_password | default('') | length == 0

- name: Fail if approle-reconciler credentials missing on rerun
  ansible.builtin.fail:
    msg: >-
      OpenBao is already initialized but approle_reconciler_password is not
      present in break-glass JSON at {{ openbao_key_path }}.json. Root is
      intentionally not preserved after first bootstrap. ADR-0021 forbids
      broadening ops-admin or policy-reconciler for AppRole reconciliation.
      Run a Shamir-backed privileged recovery ceremony to create the
      approle-reconciler userpass user and add the password to the break-glass
      JSON, or rebuild OpenBao from clean bootstrap.
  when:
    - openbao_is_initialized | bool
    - not (openbao_init_raw is defined and openbao_init_raw.changed | default(false))
    - openbao_approle_reconciler_password | default('') | length == 0

- name: Log in as policy-reconciler (rerun path)
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_POLICY_RECONCILER_PASSWORD" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r P;
      bao write -format=json auth/userpass/login/{{ openbao_policy_reconciler_username }} password="$P"'
  environment:
    OPENBAO_POLICY_RECONCILER_PASSWORD: "{{ openbao_policy_reconciler_password }}"
  register: _policy_reconciler_login_raw
  changed_when: false
  no_log: true
  when:
    - openbao_is_initialized | bool
    - not (openbao_init_raw is defined and openbao_init_raw.changed | default(false))
    - openbao_policy_reconciler_password | default('') | length > 0

- name: Extract policy-reconciler client token (rerun path)
  ansible.builtin.set_fact:
    _openbao_policy_apply_token: >-
      {{ (_policy_reconciler_login_raw.stdout | from_json).auth.client_token }}
  no_log: true
  when:
    - _policy_reconciler_login_raw is defined
    - _policy_reconciler_login_raw.stdout | default('') | length > 0

- name: Verify approle-reconciler login on rerun path
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_APPROLE_RECONCILER_PASSWORD" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r P;
      bao write -format=json auth/userpass/login/{{ openbao_approle_reconciler_username }} password="$P"'
  environment:
    OPENBAO_APPROLE_RECONCILER_PASSWORD: "{{ openbao_approle_reconciler_password }}"
  register: _approle_reconciler_login_raw
  changed_when: false
  failed_when: _approle_reconciler_login_raw.rc != 0
  no_log: true
  when:
    - openbao_is_initialized | bool
    - not (openbao_init_raw is defined and openbao_init_raw.changed | default(false))
    - openbao_approle_reconciler_password | default('') | length > 0

# ---------------------------------------------------------------------------
# Create ESO reader policy
# ---------------------------------------------------------------------------

- name: Write app-admin-writer policy HCL in pod
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - -n
      - "{{ openbao_namespace }}"
      - exec
      - "{{ openbao_pod }}"
      - --
      - sh
      - -c
      - |
        cat > /tmp/app-admin-writer-policy.hcl << 'HCL'
        path "secret/data/apps/zot/admin" {
          capabilities = ["create", "read", "update", "delete"]
        }
        path "secret/metadata/apps/zot/admin" {
          capabilities = ["read", "list"]
        }
        path "secret/data/apps/+/admin" {
          capabilities = ["create", "read", "update", "delete"]
        }
        path "secret/metadata/apps/+/admin" {
          capabilities = ["read", "list"]
        }
        path "secret/data/apps/+/breakglass" {
          capabilities = ["create", "read", "update", "delete"]
        }
        path "secret/metadata/apps/+/breakglass" {
          capabilities = ["read", "list"]
        }
        # ADR-0033: scoped machine-write service accounts (e.g. zot-svc at
        # secret/apps/zot/service). Operator can read/rotate them via break-glass,
        # symmetric with +/admin and +/breakglass. Routine seeding uses the
        # temp-root path in bootstrap-secrets.sh, not this policy.
        path "secret/data/apps/+/service" {
          capabilities = ["create", "read", "update", "delete"]
        }
        path "secret/metadata/apps/+/service" {
          capabilities = ["read", "list"]
        }
        path "secret/data/apps/authentik/bootstrap-passkey" {
          capabilities = ["create", "read", "update", "delete"]
        }
        path "secret/metadata/apps/authentik/bootstrap-passkey" {
          capabilities = ["read", "list"]
        }
        path "secret/data/apps/awx/control_node_ssh" {
          capabilities = ["create", "read", "update", "delete"]
        }
        path "secret/metadata/apps/awx/control_node_ssh" {
          capabilities = ["read", "list"]
        }
        path "secret/metadata/apps" {
          capabilities = ["list"]
        }
        # Existence-only check on the two seed-bao platform paths so the
        # post-seed guard in bootstrap-provision-post-seed.yml can verify
        # the bundle has been seeded without exposing secret values.
        # `metadata` returns version + timestamps only; no secret data.
        path "secret/metadata/platform/bootstrap_admin" {
          capabilities = ["read"]
        }
        path "secret/metadata/platform/k3s/cluster" {
          capabilities = ["read"]
        }
        HCL
  no_log: true
  when: openbao_is_initialized | bool

- name: Apply app-admin-writer policy
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao policy write {{ openbao_operator_policy_name }} /tmp/app-admin-writer-policy.hcl'
  environment:
    OPENBAO_TOKEN: "{{ _openbao_policy_apply_token }}"
  no_log: true
  when: openbao_is_initialized | bool

- name: Write app-runtime-writer policy HCL in pod
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - -n
      - "{{ openbao_namespace }}"
      - exec
      - "{{ openbao_pod }}"
      - --
      - sh
      - -c
      - |
        cat > /tmp/app-runtime-writer-policy.hcl << 'HCL'
        path "secret/data/apps/+/runtime" {
          capabilities = ["create", "read", "update", "delete"]
        }
        path "secret/metadata/apps/+/runtime" {
          capabilities = ["read", "list"]
        }
        path "auth/approle/role/{{ openbao_eso_role_name }}/secret-id" {
          capabilities = ["create", "read", "update"]
        }
        HCL
  no_log: true
  when: openbao_is_initialized | bool

- name: Apply app-runtime-writer policy
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao policy write {{ openbao_operator_runtime_policy_name }} /tmp/app-runtime-writer-policy.hcl'
  environment:
    OPENBAO_TOKEN: "{{ _openbao_policy_apply_token }}"
  no_log: true
  when: openbao_is_initialized | bool

# ---------------------------------------------------------------------------
# Create eso-reader policy — allows ESO to read app-admin and bootstrap secrets
# ---------------------------------------------------------------------------

- name: Write eso-reader policy HCL in pod
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - -n
      - "{{ openbao_namespace }}"
      - exec
      - "{{ openbao_pod }}"
      - --
      - sh
      - -c
      - |
        cat > /tmp/eso-reader-policy.hcl << 'HCL'
        path "secret/data/apps/+/admin" {
          capabilities = ["read"]
        }
        path "secret/metadata/apps/+/admin" {
          capabilities = ["read", "list"]
        }
        path "secret/data/apps/+/breakglass" {
          capabilities = ["read"]
        }
        path "secret/metadata/apps/+/breakglass" {
          capabilities = ["read", "list"]
        }
        # ADR-0033: scoped machine-write service accounts (e.g. zot-svc at
        # secret/apps/zot/service). ESO mounts these for the cron/seed paths
        # that must NOT use the break-glass admin. Mirrors the +/admin glob.
        path "secret/data/apps/+/service" {
          capabilities = ["read"]
        }
        path "secret/metadata/apps/+/service" {
          capabilities = ["read", "list"]
        }
        path "secret/data/apps/+/runtime" {
          capabilities = ["read"]
        }
        path "secret/metadata/apps/+/runtime" {
          capabilities = ["read", "list"]
        }
        path "secret/data/apps/authentik/bootstrap-passkey" {
          capabilities = ["read"]
        }
        path "secret/metadata/apps" {
          capabilities = ["list"]
        }
        path "{{ openbao_pki_path }}/issue/internal-ca" {
          capabilities = ["create", "update"]
        }
        path "{{ openbao_pki_path }}/cert/ca" {
          capabilities = ["read"]
        }
        HCL
  no_log: true
  when: openbao_is_initialized | bool

- name: Apply eso-reader policy
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao policy write {{ openbao_eso_policy_name }} /tmp/eso-reader-policy.hcl'
  environment:
    OPENBAO_TOKEN: "{{ _openbao_policy_apply_token }}"
  no_log: true
  when: openbao_is_initialized | bool

# ---------------------------------------------------------------------------
# Create AppRole for ESO
# ---------------------------------------------------------------------------

- name: Create ESO AppRole
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao write auth/approle/role/{{ openbao_eso_role_name }}
      token_policies=eso-reader
      secret_id_ttl={{ openbao_eso_approle_secret_id_ttl }}
      token_ttl=1h token_max_ttl=4h'
  environment:
    OPENBAO_TOKEN: "{{ openbao_root_token }}"
  no_log: true
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

- name: Read ESO AppRole role_id
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao read -format=json auth/approle/role/{{ openbao_eso_role_name }}/role-id'
  environment:
    OPENBAO_TOKEN: "{{ openbao_root_token }}"
  register: eso_role_id_raw
  no_log: true
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

- name: Generate ESO AppRole secret_id
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao write -format=json -force auth/approle/role/{{ openbao_eso_role_name }}/secret-id'
  environment:
    OPENBAO_TOKEN: "{{ openbao_root_token }}"
  register: eso_secret_id_raw
  no_log: true
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

- name: Extract ESO role_id and secret_id from init output
  ansible.builtin.set_fact:
    openbao_eso_role_id: "{{ (eso_role_id_raw.stdout | from_json).data.role_id }}"
    openbao_eso_secret_id: "{{ (eso_secret_id_raw.stdout | from_json).data.secret_id }}"
  when:
    - eso_role_id_raw is defined
    - eso_role_id_raw.stdout is defined
    - eso_secret_id_raw is defined
    - eso_secret_id_raw.stdout is defined
  no_log: true

- name: Assert ESO AppRole credentials were extracted
  ansible.builtin.assert:
    that:
      - openbao_eso_role_id | default('') | length > 0
      - openbao_eso_secret_id | default('') | length > 0
    fail_msg: >-
      ESO AppRole credentials could not be extracted from OpenBao.
      This usually means the AppRole was not created during init.
      Check: 1) OpenBao pod logs (kubectl logs -n openbao deploy/openbao)
             2) Root token is valid and has sys/auth/* permissions
             3) AppRole auth method is enabled
      On rerun, provide break-glass JSON with eso_role_id/eso_secret_id
      or rebuild OpenBao cluster from scratch.
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

