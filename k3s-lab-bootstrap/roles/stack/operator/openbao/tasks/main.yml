  no_log: true
  register: _enable_k8s
  failed_when:
    - _enable_k8s.rc != 0
    - "'path is already in use' not in (_enable_k8s.stderr | default(''))"
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

- name: Enable userpass auth method
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
