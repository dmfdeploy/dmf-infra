---
# ---------------------------------------------------------------------------
# OpenBao — deploy, init, enable engines, create ESO and born-inventory
# AppRoles
# ---------------------------------------------------------------------------
# Conventions:
#   - kubernetes.core.k8s for K8s objects (raw definitions)
#   - ansible.builtin.command with kubectl exec for bao CLI calls inside the pod
#   - kubeconfig: /etc/rancher/k3s/k3s.yaml for all k8s modules
# ---------------------------------------------------------------------------

- name: Create OpenBao namespace
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ openbao_namespace }}"

- name: Create OpenBao config ConfigMap
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: openbao-config
        namespace: "{{ openbao_namespace }}"
      data:
        config.hcl: |
          storage "raft" {
            path    = "/openbao/data"
            node_id = "{{ openbao_raft_node_id }}"
          }

          listener "tcp" {
            address         = "0.0.0.0:8200"
            cluster_address = "0.0.0.0:8201"
            tls_disable     = 0
            tls_cert_file   = "/openbao/config/tls/tls.crt"
            tls_key_file    = "/openbao/config/tls/tls.key"
          }

          api_addr      = "https://{{ openbao_service_name }}.{{ openbao_namespace }}.svc.cluster.local:8200"
          cluster_addr  = "https://{{ openbao_service_name }}.{{ openbao_namespace }}.svc.cluster.local:8201"
          disable_mlock = true
          ui            = true

- name: Wait for OpenBao TLS secret to be present
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Secret
    name: "{{ openbao_tls_secret_name }}"
    namespace: "{{ openbao_namespace }}"
  register: openbao_tls_secret
  until:
    - openbao_tls_secret.resources | length > 0
    - openbao_tls_secret.resources[0].data['tls.crt'] is defined
    - openbao_tls_secret.resources[0].data['tls.key'] is defined
  retries: 60
  delay: 5

- name: Create OpenBao StatefulSet
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: openbao
        namespace: "{{ openbao_namespace }}"
        labels:
          app.kubernetes.io/name: openbao
      spec:
        serviceName: openbao
        replicas: 1
        selector:
          matchLabels:
            app.kubernetes.io/name: openbao
        template:
          metadata:
            labels:
              app.kubernetes.io/name: openbao
          spec:
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
            containers:
              - name: openbao
                image: "{{ openbao_image }}"
                imagePullPolicy: IfNotPresent
                command:
                  - bao
                args:
                  - server
                  - -config=/etc/openbao/config.hcl
                ports:
                  - name: api
                    containerPort: 8200
                  - name: cluster
                    containerPort: 8201
                env:
                  - name: BAO_ADDR
                    value: "https://127.0.0.1:8200"
                  - name: BAO_CACERT
                    value: "/openbao/config/tls/tls.crt"
                  - name: BAO_LOCAL_ADDRESS
                    value: "127.0.0.1"
                volumeMounts:
                  - name: config
                    mountPath: /etc/openbao
                  - name: tls
                    mountPath: /openbao/config/tls
                    readOnly: true
                  - name: data
                    mountPath: /openbao/data
                readinessProbe:
                  tcpSocket:
                    port: 8200
                  initialDelaySeconds: 5
                  periodSeconds: 10
                livenessProbe:
                  tcpSocket:
                    port: 8200
                  initialDelaySeconds: 30
                  periodSeconds: 30
                resources: "{{ openbao_resources }}"
            volumes:
              - name: config
                configMap:
                  name: openbao-config
              - name: tls
                secret:
                  secretName: "{{ openbao_tls_secret_name }}"
        volumeClaimTemplates:
          - metadata:
              name: data
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: "{{ openbao_storage_class }}"
              resources:
                requests:
                  storage: "{{ openbao_storage_size }}"

- name: Create OpenBao Service
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ openbao_service_name }}"
        namespace: "{{ openbao_namespace }}"
        labels:
          app.kubernetes.io/name: openbao
      spec:
        selector:
          app.kubernetes.io/name: openbao
        ports:
          - name: api
            port: "{{ openbao_service_port }}"
            targetPort: 8200
          - name: cluster
            port: 8201
            targetPort: 8201

- name: Wait for OpenBao StatefulSet to be ready
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: apps/v1
    kind: StatefulSet
    name: openbao
    namespace: "{{ openbao_namespace }}"
  register: openbao_sts
  until:
    - openbao_sts.resources | length > 0
    - openbao_sts.resources[0].status.readyReplicas | default(0) | int >= 1
  retries: 60
  delay: 5

# ---------------------------------------------------------------------------
# Discover the pod name for exec calls
# ---------------------------------------------------------------------------

- name: Get OpenBao pod name
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Pod
    namespace: "{{ openbao_namespace }}"
    label_selectors:
      - "app.kubernetes.io/name=openbao"
  register: openbao_pod_info

- name: Set OpenBao pod name fact
  ansible.builtin.set_fact:
    openbao_pod: "{{ openbao_pod_info.resources[0].metadata.name }}"

# ---------------------------------------------------------------------------
# Check if already initialized — before password generation to gate fresh-init-only credentials
# ---------------------------------------------------------------------------

- name: Check OpenBao init status
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - -n
      - "{{ openbao_namespace }}"
      - exec
      - "{{ openbao_pod }}"
      - --
      - bao
      - status
      - -format=json
  register: openbao_status_cmd
  changed_when: false
  failed_when: false

- name: Parse OpenBao status
  ansible.builtin.set_fact:
    openbao_is_initialized: >-
      {{ (openbao_status_cmd.stdout | from_json).initialized | default(false) }}
  when:
    - openbao_status_cmd.stdout | default('') | length > 0
    - openbao_status_cmd.stdout | default('') | from_json is mapping

- name: Default init status if status check failed
  ansible.builtin.set_fact:
    openbao_is_initialized: false
  when: openbao_is_initialized is not defined

# ---------------------------------------------------------------------------
# Load existing break-glass JSON if present — rerun idempotency path.
# Preserves unseal keys and the operator userpass password when init won't run
# this pass. Root token is intentionally not retained.
# ---------------------------------------------------------------------------

- name: Slurp existing break-glass JSON (localhost)
  ansible.builtin.slurp:
    src: "{{ openbao_key_path }}.json"
  register: existing_breakglass_slurp
  delegate_to: localhost
  become: false
  failed_when: false
  no_log: true

- name: Parse existing break-glass JSON
  ansible.builtin.set_fact:
    existing_breakglass: >-
      {{ (existing_breakglass_slurp.content | b64decode | from_json)
         if (existing_breakglass_slurp.content is defined)
         else {} }}
  no_log: true

- name: Preload unseal keys from existing break-glass JSON (rerun path)
  ansible.builtin.set_fact:
    openbao_unseal_keys_hex: "{{ existing_breakglass.unseal_keys_hex | default([]) }}"
  no_log: true

- name: Preload operator credentials from existing break-glass JSON (rerun path)
  ansible.builtin.set_fact:
    openbao_operator_password: "{{ existing_breakglass.ops_admin_password | default('') }}"
    openbao_policy_reconciler_password: "{{ existing_breakglass.policy_reconciler_password | default('') }}"
    openbao_approle_reconciler_password: "{{ existing_breakglass.approle_reconciler_password | default('') }}"
  no_log: true

- name: Generate operator password if not yet available
  ansible.builtin.set_fact:
    openbao_operator_password: >-
      {{ lookup('password', '/dev/null length=' ~ openbao_operator_password_length ~ ' chars=ascii_letters,digits') }}
  when: openbao_operator_password | default('') | length == 0
  no_log: true

- name: Generate policy-reconciler password only on fresh init
  ansible.builtin.set_fact:
    openbao_policy_reconciler_password: >-
      {{ lookup('password', '/dev/null length=' ~ openbao_policy_reconciler_password_length ~ ' chars=ascii_letters,digits') }}
  when:
    - openbao_policy_reconciler_password | default('') | length == 0
    - not openbao_is_initialized | bool
  no_log: true

- name: Generate approle-reconciler password only on fresh init
  ansible.builtin.set_fact:
    openbao_approle_reconciler_password: >-
      {{ lookup('password', '/dev/null length=' ~ openbao_approle_reconciler_password_length ~ ' chars=ascii_letters,digits') }}
  when:
    - openbao_approle_reconciler_password | default('') | length == 0
    - not openbao_is_initialized | bool
  no_log: true

- name: Preload AppRole credentials from break-glass (rerun path)
  ansible.builtin.set_fact:
    openbao_eso_role_id: "{{ existing_breakglass.get('eso_role_id') }}"
    openbao_eso_secret_id: "{{ existing_breakglass.get('eso_secret_id') }}"
    openbao_born_inventory_role_id: "{{ existing_breakglass.get('born_inventory_role_id') }}"
    openbao_born_inventory_secret_id: "{{ existing_breakglass.get('born_inventory_secret_id') }}"
  when:
    - existing_breakglass.get('eso_role_id') is not none
  no_log: true

# ---------------------------------------------------------------------------
# Shamir init (only if not yet initialized)
# ---------------------------------------------------------------------------

# Guard against a footgun: disabling break-glass distribution means the local
# automation file becomes the ONLY key custody, so the posture must be
# self-contained (no orphaned DR shares, quorum fits the automation copy).
- name: Assert a self-contained Shamir posture when break-glass distribution is disabled
  ansible.builtin.assert:
    that:
      - openbao_shamir_shares | int == openbao_shamir_threshold | int
      - openbao_shamir_threshold | int <= 3
    fail_msg: >-
      openbao_breakglass_distribution_enabled is false but the Shamir posture is
      {{ openbao_shamir_shares }}-of-{{ openbao_shamir_threshold }}. With
      distribution disabled the local automation file is the only key custody,
      so set shares == threshold (no orphaned shares) and threshold <= 3 (the
      automation copy holds up to a 3-key quorum) — e.g. 1/1 for a sandbox — or
      re-enable distribution to keep the 3-of-5 break-glass recovery model.
  when: not (openbao_breakglass_distribution_enabled | bool)

- name: Run Shamir init
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - -n
      - "{{ openbao_namespace }}"
      - exec
      - "{{ openbao_pod }}"
      - --
      - bao
      - operator
      - init
      - -key-shares={{ openbao_shamir_shares }}
      - -key-threshold={{ openbao_shamir_threshold }}
      - -format=json
  register: openbao_init_raw
  when: not openbao_is_initialized | bool
  no_log: true

- name: Parse init output — root token and unseal keys
  ansible.builtin.set_fact:
    openbao_root_token: "{{ (openbao_init_raw.stdout | from_json).root_token }}"
    openbao_unseal_keys_hex: "{{ (openbao_init_raw.stdout | from_json).unseal_keys_hex }}"
    openbao_unseal_keys_b64: "{{ (openbao_init_raw.stdout | from_json).unseal_keys_b64 }}"
  when: openbao_init_raw is defined and openbao_init_raw.changed | default(false)
  no_log: true

- name: Ensure OpenBao automation key directory exists
  ansible.builtin.file:
    path: "{{ openbao_key_path | dirname }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  when: openbao_init_raw is defined and openbao_init_raw.changed | default(false)
  no_log: true

- name: Save Shamir keys to local file
  ansible.builtin.copy:
    content: "{{ openbao_init_raw.stdout }}"
    dest: "{{ openbao_key_path }}.json"
    mode: "0600"
  delegate_to: localhost
  become: false
  when: openbao_init_raw is defined and openbao_init_raw.changed | default(false)
  no_log: true

# ---------------------------------------------------------------------------
# Write Shamir shares to 5 separate custody locations at init time.
# Shares 1, 2 → JuiceFS ({{ openbao_juicefs_mount_path }}/…)
# Share 3    → macOS Keychain
# Shares 4, 5 → USB OPENBAO_A ({{ openbao_usb_dir }}/…)
# Automation file retains a quorum of 3 shares for unattended unseal.
# ---------------------------------------------------------------------------

- name: Assert OPENBAO_A USB is mounted (holds recovery shares 4+5)
  ansible.builtin.stat:
    path: /Volumes/OPENBAO_A
  register: _usb_stat
  delegate_to: localhost
  become: false
  when: openbao_breakglass_distribution_enabled | bool and openbao_init_raw is defined and openbao_init_raw.changed | default(false)

- name: Fail if OPENBAO_A USB is missing
  ansible.builtin.assert:
    that: _usb_stat.stat.exists and _usb_stat.stat.isdir
    fail_msg: >-
      USB 'OPENBAO_A' is not mounted at /Volumes/OPENBAO_A. Plug it in
      and re-run. OpenBao init writes shares 4 and 5 to this USB.
  when:
    - openbao_breakglass_distribution_enabled | bool
    - openbao_init_raw is defined and openbao_init_raw.changed | default(false)
    - _usb_stat is defined

- name: Assert JuiceFS mount is available (holds recovery shares 1+2)
  ansible.builtin.stat:
    path: "{{ openbao_juicefs_mount_path }}"
  register: _juicefs_stat
  delegate_to: localhost
  become: false
  when: openbao_breakglass_distribution_enabled | bool and openbao_init_raw is defined and openbao_init_raw.changed | default(false)

- name: Fail if JuiceFS mount is missing
  ansible.builtin.assert:
    that: _juicefs_stat.stat.exists and _juicefs_stat.stat.isdir
    fail_msg: >-
      JuiceFS mount {{ openbao_juicefs_mount_path }} is not available.
      Mount the share first — OpenBao init writes shares 1 and 2 there.
  when:
    - openbao_breakglass_distribution_enabled | bool
    - openbao_init_raw is defined and openbao_init_raw.changed | default(false)
    - _juicefs_stat is defined

# Keychain writes from this automation context are not reliably authorized via
# direct `security add-generic-password`, but the same write succeeds through
# `osascript`/SecurityAgent in the logged-in macOS session. Keep share 3 in the
# login Keychain per the custody plan, using osascript as the write path.
- name: Preflight — verify login Keychain accepts share-3 writes
  ansible.builtin.command:
    argv:
      - osascript
      - -e
      - on run argv
      - -e
      - >-
        do shell script "security add-generic-password -s " & quoted form of
        item 1 of argv & " -a " & quoted form of item 2 of argv & " -w " &
        quoted form of item 3 of argv & " -U"
      - -e
      - end run
      - "{{ openbao_keychain_share3_service }}-write-test"
      - share
      - openbao-keychain-write-test
  register: _share3_keychain_preflight
  delegate_to: localhost
  become: false
  changed_when: false
  failed_when: false
  when: openbao_breakglass_distribution_enabled | bool and openbao_init_raw is defined and openbao_init_raw.changed | default(false)
  no_log: true

- name: Cleanup share-3 Keychain smoke-test item
  ansible.builtin.command:
    argv:
      - osascript
      - -e
      - on run argv
      - -e
      - >-
        do shell script "security delete-generic-password -s " & quoted form
        of item 1 of argv & " -a " & quoted form of item 2 of argv
      - -e
      - end run
      - "{{ openbao_keychain_share3_service }}-write-test"
      - share
  delegate_to: localhost
  become: false
  changed_when: false
  failed_when: false
  when: openbao_breakglass_distribution_enabled | bool and openbao_init_raw is defined and openbao_init_raw.changed | default(false)
  no_log: true

- name: Fail if login Keychain is not write-authorized for share 3
  ansible.builtin.assert:
    that:
      - _share3_keychain_preflight.rc | default(1) == 0
    fail_msg: >-
      macOS login Keychain is not write-authorized for share 3. This run
      follows the original custody plan and stores share 3 in service
      '{{ openbao_keychain_share3_service }}'. Unlock or authorize the login
      keychain in an interactive session, then re-run.
  when: openbao_breakglass_distribution_enabled | bool and openbao_init_raw is defined and openbao_init_raw.changed | default(false)

- name: Ensure environment break-glass directory on JuiceFS exists
  ansible.builtin.file:
    path: "{{ openbao_breakglass_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  when: openbao_breakglass_distribution_enabled | bool and openbao_init_raw is defined and openbao_init_raw.changed | default(false)
  no_log: true

- name: Write share 1 to JuiceFS
  ansible.builtin.copy:
    dest: "{{ openbao_breakglass_dir }}/share-1.json"
    mode: "0600"
    content: "{{ {
        'share_index': 1,
        'key': openbao_unseal_keys_b64[0],
        '_notes': 'OpenBao Shamir share 1 of 5. Need any 3 of 5 to unseal. Other shares: share 2 here on JuiceFS, share 3 in macOS Keychain (service: ' ~ openbao_keychain_share3_service ~ '), shares 4+5 on USB OPENBAO_A. See Breakglass Runbook for DR.'
      } | to_nice_json }}"
  delegate_to: localhost
  become: false
  when: openbao_breakglass_distribution_enabled | bool and openbao_init_raw is defined and openbao_init_raw.changed | default(false)
  no_log: true

- name: Write share 2 to JuiceFS
  ansible.builtin.copy:
    dest: "{{ openbao_breakglass_dir }}/share-2.json"
    mode: "0600"
    content: "{{ {
        'share_index': 2,
        'key': openbao_unseal_keys_b64[1],
        '_notes': 'See share-1.json for DR context.'
      } | to_nice_json }}"
  delegate_to: localhost
  become: false
  when: openbao_breakglass_distribution_enabled | bool and openbao_init_raw is defined and openbao_init_raw.changed | default(false)
  no_log: true

- name: Write share 3 to macOS Keychain
  ansible.builtin.command:
    argv:
      - osascript
      - -e
      - on run argv
      - -e
      - >-
        do shell script "security add-generic-password -s " & quoted form of
        item 1 of argv & " -a " & quoted form of item 2 of argv & " -w " &
        quoted form of item 3 of argv & " -U"
      - -e
      - end run
      - "{{ openbao_keychain_share3_service }}"
      - share
      - "{{ openbao_unseal_keys_b64[2] }}"
  register: _share3_keychain_write
  delegate_to: localhost
  become: false
  changed_when: false
  failed_when: false
  when: openbao_breakglass_distribution_enabled | bool and openbao_init_raw is defined and openbao_init_raw.changed | default(false)
  no_log: true

- name: Fail if share 3 could not be written to macOS Keychain
  ansible.builtin.assert:
    that:
      - _share3_keychain_write.rc | default(1) == 0
    fail_msg: >-
      Failed to write share 3 to macOS Keychain service
      '{{ openbao_keychain_share3_service }}'. Unlock or authorize the login
      keychain in an interactive session, then re-run.
  when: openbao_breakglass_distribution_enabled | bool and openbao_init_raw is defined and openbao_init_raw.changed | default(false)

- name: Ensure environment USB share directory exists on OPENBAO_A
  ansible.builtin.file:
    path: "{{ openbao_usb_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  when: openbao_breakglass_distribution_enabled | bool and openbao_init_raw is defined and openbao_init_raw.changed | default(false)

- name: Write share 4 to USB OPENBAO_A
  ansible.builtin.copy:
    dest: "{{ openbao_usb_dir }}/share-4.json"
    mode: "0600"
    content: "{{ {
        'share_index': 4,
        'key': openbao_unseal_keys_b64[3],
        '_notes': 'Share 4 of 5. Keep USB unplugged except during ceremony. See Breakglass Runbook.'
      } | to_nice_json }}"
  delegate_to: localhost
  become: false
  when: openbao_breakglass_distribution_enabled | bool and openbao_init_raw is defined and openbao_init_raw.changed | default(false)
  no_log: true

- name: Write share 5 to USB OPENBAO_A
  ansible.builtin.copy:
    dest: "{{ openbao_usb_dir }}/share-5.json"
    mode: "0600"
    content: "{{ {
        'share_index': 5,
        'key': openbao_unseal_keys_b64[4],
        '_notes': 'Share 5 of 5.'
      } | to_nice_json }}"
  delegate_to: localhost
  become: false
  when: openbao_breakglass_distribution_enabled | bool and openbao_init_raw is defined and openbao_init_raw.changed | default(false)
  no_log: true

- name: Write automation file (shares 1+2+3 and operator creds)
  ansible.builtin.copy:
    dest: "{{ openbao_key_path }}.json"
    mode: "0600"
    content: "{{ {
        'unseal_keys_b64': openbao_unseal_keys_b64[0:3],
        'ops_admin_username': openbao_operator_username,
        'ops_admin_password': openbao_operator_password,
        '_notes': (openbao_breakglass_distribution_enabled | bool) | ternary('Automation copy. Holds a quorum of 3 Shamir shares for unattended unseal. If this file is lost, reassemble from any 3 of: JuiceFS share-1, JuiceFS share-2, Keychain share-3, USB share-4, USB share-5.', 'Automation copy and SOLE key custody for this self-recovering (no-distribution) profile: holds the full ' ~ (openbao_shamir_shares | int) ~ '-of-' ~ (openbao_shamir_threshold | int) ~ ' unseal key set. There is no break-glass distribution — if this file is lost, re-init is required.')
      } | to_nice_json }}"
  delegate_to: localhost
  become: false
  when: openbao_init_raw is defined and openbao_init_raw.changed | default(false)
  no_log: true

# ---------------------------------------------------------------------------
# Unseal (needs 3 of 5 shares)
# ---------------------------------------------------------------------------

- name: Unseal OpenBao — share 1
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - -n
      - "{{ openbao_namespace }}"
      - exec
      - "{{ openbao_pod }}"
      - --
      - bao
      - operator
      - unseal
      - "{{ openbao_unseal_keys_hex[0] }}"
  no_log: true
  when: openbao_unseal_keys_hex is defined

- name: Unseal OpenBao — share 2
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - -n
      - "{{ openbao_namespace }}"
      - exec
      - "{{ openbao_pod }}"
      - --
      - bao
      - operator
      - unseal
      - "{{ openbao_unseal_keys_hex[1] }}"
  no_log: true
  when: openbao_unseal_keys_hex | default([]) | length > 1

- name: Unseal OpenBao — share 3
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - -n
      - "{{ openbao_namespace }}"
      - exec
      - "{{ openbao_pod }}"
      - --
      - bao
      - operator
      - unseal
      - "{{ openbao_unseal_keys_hex[2] }}"
  no_log: true
  when: openbao_unseal_keys_hex | default([]) | length > 2

# ---------------------------------------------------------------------------
# Mark OpenBao as initialized and unsealed after successful fresh init
# ---------------------------------------------------------------------------

- name: Mark OpenBao as initialized and unsealed
  ansible.builtin.set_fact:
    openbao_is_initialized: true
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

# ---------------------------------------------------------------------------
# Bootstrap-only tasks below need the root token and only run on init.
# ---------------------------------------------------------------------------

- name: Enable kv-v2 secrets engine
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao secrets enable -path=secret -version=2 -description="KV v2 for static secrets" kv'
  environment:
    OPENBAO_TOKEN: "{{ openbao_root_token }}"
  no_log: true
  register: _enable_kv
  failed_when:
    - _enable_kv.rc != 0
    - "'path is already in use' not in (_enable_kv.stderr | default(''))"
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

- name: Enable approle auth method
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ openbao_namespace }}
      exec -i {{ openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao auth enable -description="AppRole authentication" approle'
  environment:
    OPENBAO_TOKEN: "{{ openbao_root_token }}"
  no_log: true
  register: _enable_approle
  failed_when:
    - _enable_approle.rc != 0
    - "'path is already in use' not in (_enable_approle.stderr | default(''))"
  when:
    - openbao_init_raw is defined
    - openbao_init_raw.changed | default(false)

- name: Enable kubernetes auth method
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
