---
# k3s audit logging and runtime hardening helpers.
#
# Note: the containerd-registries.yml task file is intentionally NOT
# imported here. It is included separately from playbooks/300-k3s.yml
# (a dedicated play that targets all k3s nodes), because the role's
# main entry point is invoked only against k3s_control for audit
# logging — while containerd certs.d must be applied to every node.

- name: Ensure k3s audit policy directory exists
  ansible.builtin.file:
    path: /etc/k3s
    state: directory
    mode: "0755"

- name: Ensure k3s audit log directory exists
  ansible.builtin.file:
    path: /var/log/kubernetes
    state: directory
    mode: "0755"

- name: Ensure k3s systemd drop-in directory exists
  ansible.builtin.file:
    path: "{{ k3s_audit_service_dropin_dir }}"
    state: directory
    mode: "0755"

- name: Deploy k3s audit policy
  ansible.builtin.template:
    src: audit-policy.yaml.j2
    dest: "{{ k3s_audit_policy_path }}"
    mode: "0600"
  notify:
    - Restart k3s

- name: Deploy k3s audit logging drop-in
  ansible.builtin.template:
    src: k3s-audit-logging.conf.j2
    dest: "{{ k3s_audit_service_dropin_path }}"
    mode: "0644"
  notify:
    - Reload systemd
    - Restart k3s

# ── Constrained-node Tier 1 (#114): protect sshd (system.slice sibling) ──────
# Raising only k3s.service's weight would starve sshd, its system.slice sibling
# (the SSH-refusal symptom from #106). Apply via `systemctl set-property`, which
# writes to the running cgroup immediately AND persists — with NO ssh restart
# (a restart would drop this very ansible connection). Idempotent: only set when
# the current CPUWeight differs.
- name: "Read current sshd CPUWeight + IOWeight (constrained node)"
  ansible.builtin.command:
    argv: ["systemctl", "show", "{{ k3s_ssh_unit_name }}", "--property=CPUWeight", "--property=IOWeight", "--value"]
  register: _k3s_ssh_weights
  changed_when: false
  failed_when: false
  when: k3s_constrained_node | default(false) | bool

- name: "Give sshd CPU/IO priority via set-property (no restart)"
  ansible.builtin.command:
    argv:
      - "systemctl"
      - "set-property"
      - "{{ k3s_ssh_unit_name }}"
      - "CPUWeight={{ k3s_constrained_cpu_weight }}"
      - "IOWeight={{ k3s_constrained_io_weight }}"
  changed_when: true
  # --value prints CPUWeight then IOWeight on two lines; set only when EITHER drifts.
  when:
    - k3s_constrained_node | default(false) | bool
    - (_k3s_ssh_weights.stdout_lines | default([]) | map('trim') | list)
      != [k3s_constrained_cpu_weight | string, k3s_constrained_io_weight | string]

# ── Constrained-node Tier 1b (#114): containerd image-pull throttle ──────────
# This role entry is invoked against k3s_control (audit logging); the
# constrained profile is single-node, so the control node IS the only node.
# The throttle shares the Restart k3s handler with the audit drop-in, so one
# restart applies both. Gated + self-validating inside the task file.
- name: Apply constrained-node containerd image-pull throttle (Tier 1b)
  ansible.builtin.import_tasks: containerd-throttle.yml
