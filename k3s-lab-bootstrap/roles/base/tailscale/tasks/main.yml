---
# Install Tailscale client on a node and join a Headscale tailnet.
#
# This role installs the upstream Tailscale packages (not the snap) and
# joins the node to the configured Headscale server with an auth key.
# The node becomes reachable on the tailnet for operator access.

- name: Assert required Tailscale inputs are present
  ansible.builtin.assert:
    that:
      - tailscale_authkey is defined
      - tailscale_authkey | default('') | length > 0
      - tailscale_headscale_url is defined
      - tailscale_headscale_url | default('') | length > 0
      - tailscale_hostname is defined
      - tailscale_hostname | default('') | length > 0
    fail_msg: >-
      Required Tailscale inputs missing. Set tailscale_authkey,
      tailscale_headscale_url, and tailscale_hostname in inventory or via
      -e. The wrapper bin/export-openbao-vars.sh is expected to inject
      tailscale_authkey from the operator's secret store.
    quiet: true

- name: Assert managed DNS inputs are valid
  ansible.builtin.assert:
    that:
      - tailscale_system_dns_backend == 'netplan'
      - tailscale_system_dns_interface | default('') | length > 0
      - tailscale_system_dns_servers | default([]) | length > 0
    fail_msg: >-
      tailscale_manage_system_dns is enabled, but the DNS backend,
      interface, or server list is invalid.
    quiet: true
  when: tailscale_manage_system_dns | bool

- name: Ensure netplan directory exists for managed DNS
  ansible.builtin.file:
    path: /etc/netplan
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: tailscale_manage_system_dns | bool

- name: Configure public DNS for the Tailscale host link
  ansible.builtin.copy:
    dest: /etc/netplan/60-dmf-public-dns.yaml
    owner: root
    group: root
    mode: "0600"
    content: |
      # Managed by Ansible: roles/base/tailscale
      network:
        version: 2
        ethernets:
          {{ tailscale_system_dns_interface }}:
            dhcp4-overrides:
              use-dns: false
            nameservers:
              addresses:
      {% for dns_server in tailscale_system_dns_servers %}
                - {{ dns_server }}
      {% endfor %}
  register: _tailscale_netplan_dns
  when: tailscale_manage_system_dns | bool

- name: Validate managed DNS netplan configuration
  ansible.builtin.command: netplan generate
  changed_when: false
  when:
    - tailscale_manage_system_dns | bool
    - _tailscale_netplan_dns.changed

- name: Apply managed DNS netplan configuration
  ansible.builtin.command: netplan apply
  changed_when: true
  when:
    - tailscale_manage_system_dns | bool
    - _tailscale_netplan_dns.changed

- name: Apply managed DNS servers to the active resolved link
  ansible.builtin.command: "resolvectl dns {{ tailscale_system_dns_interface }} {{ tailscale_system_dns_servers | join(' ') }}"
  changed_when: false
  when: tailscale_manage_system_dns | bool

- name: Keep managed DNS on the default resolved route
  ansible.builtin.command: "resolvectl default-route {{ tailscale_system_dns_interface }} true"
  changed_when: false
  when: tailscale_manage_system_dns | bool

- name: Flush resolved cache after managed DNS update
  ansible.builtin.command: resolvectl flush-caches
  changed_when: false
  failed_when: false
  when: tailscale_manage_system_dns | bool

- name: Verify managed DNS resolution
  ansible.builtin.command: "resolvectl query {{ tailscale_system_dns_probe_name }}"
  register: _tailscale_dns_probe
  changed_when: false
  retries: 6
  delay: 3
  until: _tailscale_dns_probe.rc == 0
  when: tailscale_manage_system_dns | bool

- name: Install prerequisites for Tailscale
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - iptables
      - nftables
    state: present
    update_cache: "{{ tailscale_update_apt_cache | bool }}"

- name: Check if tailscale is already installed
  ansible.builtin.command: which tailscale
  changed_when: false
  failed_when: false
  register: _tailscale_check

- name: Install Tailscale from upstream script
  ansible.builtin.shell: |
    curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale
  when: _tailscale_check.rc != 0

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
  when: _tailscale_check.rc != 0

- name: Enable IPv4 forwarding (required for Tailscale routing)
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-tailscale.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      net.ipv4.ip_forward = 1
  notify: Reload sysctl

# Stage the auth key in a root-only file and pass --auth-key=file:<path>
# to keep the key out of /proc/<pid>/cmdline, `ps` output, and verbose
# Ansible logs. Upstream tailscale CLI dropped --authkey-file; the current
# flag is --auth-key with a "file:" prefix.
- name: Stage Tailscale auth key file
  ansible.builtin.copy:
    dest: /run/tailscale-authkey
    owner: root
    group: root
    mode: "0600"
    content: "{{ tailscale_authkey }}"
  no_log: true

- name: Build Tailscale up command arguments
  ansible.builtin.set_fact:
    _tailscale_up_args: >-
      --login-server={{ tailscale_headscale_url }}
      --auth-key=file:/run/tailscale-authkey
      --hostname={{ tailscale_hostname }}
      --accept-routes={{ tailscale_accept_routes | bool | lower }}
      {% if tailscale_advertise_exit_node %}--advertise-exit-node{% endif %}
      {% for route in tailscale_advertise_routes %}--advertise-routes={{ route }}{% endfor %}

- name: Join Tailscale tailnet
  # tailscale_extra_up_args lets a provider opt out of tailscale's nft management
  # (e.g. Aliyun: --netfilter-mode=off — see aliyun-media group_vars). Default empty.
  ansible.builtin.command: "tailscale up {{ _tailscale_up_args }} --accept-dns=false {{ tailscale_extra_up_args | default('') }}"
  register: _tailscale_up
  changed_when: "'Already running' not in (_tailscale_up.stdout | default(''))"
  failed_when: >
    _tailscale_up.rc != 0 and
    'already running' not in (_tailscale_up.stderr | default('')) | lower

- name: Remove staged Tailscale auth key file
  ansible.builtin.file:
    path: /run/tailscale-authkey
    state: absent

- name: Wait for Tailscale IP assignment
  ansible.builtin.command: tailscale ip -4
  register: _tailscale_ip
  until: _tailscale_ip.stdout | length > 0
  retries: 12
  delay: 5
  changed_when: false

- name: Set Tailscale IP fact
  ansible.builtin.set_fact:
    tailscale_ip: "{{ _tailscale_ip.stdout | trim | split('\n') | first | trim }}"

- name: Report Tailscale connection
  ansible.builtin.debug:
    msg: "Tailscale joined — hostname: {{ tailscale_hostname }}, IP: {{ tailscale_ip }}"

# ──────────────────────────────────────────────────────────────
# Port forwarding: tailscale0:443 → private Traefik NodePort
# Uses socat (userspace) instead of iptables DNAT to avoid
# conflicts with kube-proxy's own nat/PREROUTING chain.
# ──────────────────────────────────────────────────────────────

- name: Assert Tailscale IP fact is set before binding socat
  ansible.builtin.assert:
    that:
      - tailscale_ip is defined
      - tailscale_ip | default('') | length > 0
    fail_msg: >-
      tailscale_ip fact is empty — the earlier `tailscale ip -4` task did
      not return an address. Refusing to render the socat systemd unit
      with an unknown bind address. Investigate tailscaled / Headscale
      registration before re-running.
    quiet: true

- name: Install socat for port forwarding
  ansible.builtin.apt:
    name: socat
    state: present
    update_cache: false

- name: Check if socat forwarder is already running
  ansible.builtin.command: pgrep -f "socat.*{{ tailscale_private_nodeport }}"
  changed_when: false
  failed_when: false
  register: _socat_check

- name: Stop stale socat forwarder
  ansible.builtin.command: pkill -f "socat.*{{ tailscale_private_nodeport }}"
  changed_when: true
  failed_when: false
  when: _socat_check.rc == 0

- name: Install socat systemd service for port forwarding
  ansible.builtin.copy:
    dest: /etc/systemd/system/traefik-private-forwarder.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Forward tailscale0:443 to private Traefik NodePort {{ tailscale_private_nodeport }}
      After=tailscaled.service
      Wants=tailscaled.service

      [Service]
      Type=simple
      ExecStart=/usr/bin/socat TCP4-LISTEN:443,bind={{ tailscale_ip }},reuseaddr,fork TCP4:127.0.0.1:{{ tailscale_private_nodeport }}
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

- name: Enable and start port forwarder
  ansible.builtin.systemd:
    name: traefik-private-forwarder
    enabled: true
    state: restarted
    daemon_reload: true

- name: Report port forwarding status
  ansible.builtin.debug:
    msg: "Port forwarding active — tailscale0:443 → 127.0.0.1:{{ tailscale_private_nodeport }}. Apps reachable at https://<app>.{{ cert_manager_cluster_domain }} (no port)"
