---
- name: Create default-deny ingress policy for OpenBao
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: openbao-default-deny-ingress
        namespace: "{{ network_policies_openbao_namespace }}"
      spec:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: "{{ network_policies_openbao_service_name }}"
        policyTypes:
          - Ingress

- name: Create allow ingress policy for OpenBao peers and ESO
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: openbao-allow-from-eso-and-peers
        namespace: "{{ network_policies_openbao_namespace }}"
      spec:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: "{{ network_policies_openbao_service_name }}"
        policyTypes:
          - Ingress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: "{{ network_policies_openbao_allow_cluster_peer_namespace }}"
            ports:
              - protocol: TCP
                port: 8200
              - protocol: TCP
                port: 8201
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: "{{ network_policies_openbao_allow_eso_namespace }}"
            ports:
              - protocol: TCP
                port: 8200
