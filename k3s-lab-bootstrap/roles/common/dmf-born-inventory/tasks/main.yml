    url: "{{ dmf_born_inventory_netbox_api_base }}/dcim/device-types/?slug={{ dmf_born_inventory_load_balancer_device_type_name | lower | regex_replace('[^a-z0-9]+', '-') | regex_replace('^-+|-+$', '') | urlencode }}"
    method: GET
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    return_content: true
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  register: dmf_born_inventory_load_balancer_device_type_lookup_after_create

- name: Set load balancer device type id
  ansible.builtin.set_fact:
    dmf_born_inventory_load_balancer_device_type_id: >-
      {{
        (
          dmf_born_inventory_load_balancer_device_type_lookup_after_create.json.results
          | default(dmf_born_inventory_load_balancer_device_type_lookup.json.results)
          | default([])
          | first
          | default({})
        ).id
      }}

- name: Read Traefik load balancer service status
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Service
    name: "{{ dmf_born_inventory_traefik_service_name }}"
    namespace: "{{ dmf_born_inventory_traefik_service_namespace }}"
  register: dmf_born_inventory_traefik_service

- name: Set Traefik load balancer address
  ansible.builtin.set_fact:
    dmf_born_inventory_load_balancer_ip: >-
      {{
        '' if dmf_born_inventory_provider == 'sandbox' else
        (
        (
          dmf_born_inventory_traefik_service.resources[0].status.loadBalancer.ingress
          | default([])
          | first
          | default({})
        ).ip
        | default(
            (
              dmf_born_inventory_traefik_service.resources[0].status.loadBalancer.ingress
              | default([])
              | first
              | default({})
            ).hostname | default('')
          )
        )
      }}

- name: Look up load balancer device
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/dcim/devices/?name={{ dmf_born_inventory_load_balancer_name | urlencode }}"
    method: GET
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    return_content: true
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  register: dmf_born_inventory_load_balancer_lookup

- name: Create load balancer device
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/dcim/devices/"
    method: POST
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    body_format: json
    body:
      name: "{{ dmf_born_inventory_load_balancer_name }}"
      device_type: "{{ dmf_born_inventory_load_balancer_device_type_id }}"
      role: "{{ dmf_born_inventory_load_balancer_role_id }}"
      site: "{{ dmf_born_inventory_site_id }}"
      status: active
      tenant: "{{ dmf_born_inventory_tenant_id }}"
      comments: >-
        Hetzner cloud load balancer for {{ dmf_born_inventory_env_name }}.
        Traefik service address: {{ dmf_born_inventory_load_balancer_ip | default('unknown') }}.
      tags:
        - "{{ dmf_born_inventory_tag_id }}"
    status_code: 201
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  when: dmf_born_inventory_load_balancer_lookup.json.count | int == 0
  register: dmf_born_inventory_load_balancer_created

- name: Refresh load balancer lookup after create
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/dcim/devices/?name={{ dmf_born_inventory_load_balancer_name | urlencode }}"
    method: GET
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    return_content: true
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  register: dmf_born_inventory_load_balancer_lookup_after_create

- name: Set load balancer id
  ansible.builtin.set_fact:
    dmf_born_inventory_load_balancer_id: >-
      {{
        (
          dmf_born_inventory_load_balancer_lookup_after_create.json.results
          | default(dmf_born_inventory_load_balancer_lookup.json.results)
          | default([])
          | first
          | default({})
        ).id
      }}

- name: Clear sandbox load balancer primary IP
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/dcim/devices/{{ dmf_born_inventory_load_balancer_id }}/"
    method: PATCH
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    body_format: json
    body:
      primary_ip4: null
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  when: dmf_born_inventory_provider == 'sandbox'

- name: Ensure load balancer interface exists
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/dcim/interfaces/?device_id={{ dmf_born_inventory_load_balancer_id }}&name={{ dmf_born_inventory_load_balancer_interface_name | urlencode }}"
    method: GET
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    return_content: true
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  register: dmf_born_inventory_load_balancer_iface_lookup

- name: Create load balancer interface
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/dcim/interfaces/"
    method: POST
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    body_format: json
    body:
      device: "{{ dmf_born_inventory_load_balancer_id }}"
      name: "{{ dmf_born_inventory_load_balancer_interface_name }}"
      type: virtual
      enabled: true
    status_code: 201
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  when: dmf_born_inventory_load_balancer_iface_lookup.json.count | int == 0
  register: dmf_born_inventory_load_balancer_iface_created

- name: Refresh load balancer interface lookup after create
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/dcim/interfaces/?device_id={{ dmf_born_inventory_load_balancer_id }}&name={{ dmf_born_inventory_load_balancer_interface_name | urlencode }}"
    method: GET
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    return_content: true
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  register: dmf_born_inventory_load_balancer_iface_lookup_after_create

- name: Set load balancer interface id
  ansible.builtin.set_fact:
    dmf_born_inventory_load_balancer_iface_id: >-
      {{
        (
          dmf_born_inventory_load_balancer_iface_lookup_after_create.json.results
          | default(dmf_born_inventory_load_balancer_iface_lookup.json.results)
          | default([])
          | first
          | default({})
        ).id
      }}

- name: Ensure load balancer public IP object exists
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/ipam/ip-addresses/?address={{ (dmf_born_inventory_load_balancer_ip ~ '/32') | urlencode }}"
    method: GET
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    return_content: true
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  register: dmf_born_inventory_load_balancer_ip_lookup
  when: dmf_born_inventory_load_balancer_ip | length > 0

- name: Create load balancer public IP object
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/ipam/ip-addresses/"
    method: POST
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    body_format: json
    body:
      address: "{{ dmf_born_inventory_load_balancer_ip }}/32"
      status: active
      tenant: "{{ dmf_born_inventory_tenant_id }}"
      description: "Public load balancer VIP for {{ dmf_born_inventory_load_balancer_name }}"
      assigned_object_type: dcim.interface
      assigned_object_id: "{{ dmf_born_inventory_load_balancer_iface_id }}"
      tags:
        - "{{ dmf_born_inventory_tag_id }}"
    status_code: 201
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  when:
    - dmf_born_inventory_load_balancer_ip | length > 0
    - dmf_born_inventory_load_balancer_ip_lookup.json.count | int == 0
  register: dmf_born_inventory_load_balancer_ip_created

- name: Refresh load balancer IP lookup after create
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/ipam/ip-addresses/?address={{ (dmf_born_inventory_load_balancer_ip ~ '/32') | urlencode }}"
    method: GET
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    return_content: true
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  register: dmf_born_inventory_load_balancer_ip_lookup_after_create
  when: dmf_born_inventory_load_balancer_ip | length > 0

- name: Set load balancer IP id
  ansible.builtin.set_fact:
    dmf_born_inventory_load_balancer_ip_id: >-
      {{
        (
          dmf_born_inventory_load_balancer_ip_lookup_after_create.json.results
          | default(dmf_born_inventory_load_balancer_ip_lookup.json.results)
          | default([])
          | first
          | default({})
        ).id
      }}
  when: dmf_born_inventory_load_balancer_ip | length > 0

- name: Patch load balancer primary IP
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/dcim/devices/{{ dmf_born_inventory_load_balancer_id }}/"
    method: PATCH
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    body_format: json
    body:
      primary_ip4: "{{ dmf_born_inventory_load_balancer_ip_id }}"
      comments: >-
        Hetzner cloud load balancer for {{ dmf_born_inventory_env_name }}.
        Public address: {{ dmf_born_inventory_load_balancer_ip | default('unknown') }}.
        Service: {{ dmf_born_inventory_traefik_service_name }}.
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  when: dmf_born_inventory_load_balancer_ip | length > 0

- name: Upsert VM inventory for each k3s node
  ansible.builtin.include_tasks: node.yml
  loop: "{{ dmf_born_inventory_nodes }}"
  loop_control:
    loop_var: dmf_node_record
  vars:
    dmf_node_role_id: "{{ dmf_born_inventory_control_role_id if dmf_node_record.is_control_plane else dmf_born_inventory_worker_role_id }}"
    dmf_node_vm_comments: >-
      Day-0 DMF node {{ dmf_node_record.name }}.
      Public IP: {{ dmf_node_record.public_ip }}.
      Private IP: {{ dmf_node_record.private_ip }}.
      Tailscale IP: {{ dmf_node_record.tailscale_ip | default('n/a') }}.
      OS: {{ dmf_node_record.os_release }}.
      Kernel: {{ dmf_node_record.kernel }}.
      CPU: {{ dmf_node_record.cpu_cores }} vCPU.
      RAM: {{ dmf_node_record.memory_mb }} MiB.
      Disk: {{ dmf_node_record.disk_gb }} GiB.
      Private iface: {{ dmf_node_record.private_iface }}.

# ---------------------------------------------------------------------------
# L6 app registration as ipam.Service objects
# ---------------------------------------------------------------------------
- name: Register L6 apps as ipam.Service
  ansible.builtin.include_tasks: app-service.yml
  loop: "{{ dmf_born_inventory_apps }}"
  loop_control:
    loop_var: dmf_app_entry
  vars:
    dmf_app_service_key: "{{ dmf_app_entry.key }}"
    dmf_app_service_display: "{{ dmf_app_entry.display_name }}"
    dmf_app_service_exposure: "{{ dmf_app_entry.exposure }}"
    dmf_app_service_oidc_client: "{{ dmf_app_entry.oidc_client_id }}"
    dmf_app_service_hostname: >-
      {{
        (vars[dmf_app_entry.key ~ '_host'] | default('', true))
        or (dmf_app_entry.key ~ '.' ~ (cert_manager_cluster_domain | default('dmf.example.com')))
      }}

# ---------------------------------------------------------------------------
# forgejo-svc NetBox service user (parallels awx-netbox, librenms-netbox)
# ---------------------------------------------------------------------------
- name: Lookup forgejo-svc user in NetBox
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/users/users/?username={{ 'forgejo-svc' | urlencode }}"
    method: GET
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    return_content: true
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  register: dmf_born_inventory_forgejo_svc_user_lookup

- name: Create forgejo-svc user in NetBox
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/users/users/"
    method: POST
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    body_format: json
    body:
      username: forgejo-svc
      is_active: true
      password: "{{ lookup('community.general.random_string', length=24, special=false) }}"
    status_code: 201
  when: dmf_born_inventory_forgejo_svc_user_lookup.json.count | int == 0
  no_log: true
  register: dmf_born_inventory_forgejo_svc_user_created

- name: Set forgejo-svc user id
  ansible.builtin.set_fact:
    dmf_born_inventory_forgejo_svc_user_id: >-
      {{
        (dmf_born_inventory_forgejo_svc_user_lookup.json.results
         | default([]) | first | default({})).id
         | default(dmf_born_inventory_forgejo_svc_user_created.json.id)
      }}

# ---------------------------------------------------------------------------
# Build born-inventory summary
# ---------------------------------------------------------------------------
- name: Build born-inventory summary
  ansible.builtin.set_fact:
    dmf_born_inventory_report:
      environment: "{{ dmf_born_inventory_env_name }}"
      site: "{{ dmf_born_inventory_site_name }}"
      cluster: "{{ dmf_born_inventory_cluster_name }}"
      nodes: "{{ dmf_born_inventory_nodes }}"
      netbox_api_base: "{{ dmf_born_inventory_netbox_api_base }}"
      tag: "{{ dmf_born_inventory_tag_name }}"
      day0_boundary:
        day0: true
        media_environments_separate: true
  changed_when: false

- name: Write born-inventory report locally
  ansible.builtin.copy:
    dest: "{{ dmf_born_inventory_report_path }}"
    content: "{{ dmf_born_inventory_report | to_nice_json }}"
    mode: "0644"
  delegate_to: localhost
  become: false
  run_once: true
