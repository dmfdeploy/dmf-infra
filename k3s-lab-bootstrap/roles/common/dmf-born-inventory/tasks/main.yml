---
- name: Validate born-inventory inputs
  ansible.builtin.assert:
    that:
      - dmf_born_inventory_enabled | bool
      - groups['k3s'] | default([]) | length > 0
      - dmf_born_inventory_netbox_api_base | length > 0
      - >-
        (dmf_born_inventory_netbox_admin_token | default('') | length > 0)
        or
        (dmf_born_inventory_openbao_breakglass_file | default('') | length > 0)
    fail_msg: >-
      born-inventory needs k3s hosts and a NetBox API base. Provide either a
      direct NetBox admin token or an OpenBao break-glass file with the
      born-inventory AppRole credentials. Run the NetBox SoT bootstrap stage
      first so it can seed the NetBox admin token into the in-cluster OpenBao
      runtime secret.

- name: Check OpenBao break-glass JSON exists on operator host
  ansible.builtin.stat:
    path: "{{ dmf_born_inventory_openbao_breakglass_file }}"
  register: _dmf_born_inventory_breakglass_stat
  delegate_to: localhost
  become: false
  when: dmf_born_inventory_netbox_admin_token | default('') | length == 0

- name: Assert OpenBao break-glass JSON exists for AppRole login
  ansible.builtin.assert:
    that:
      - _dmf_born_inventory_breakglass_stat.stat.exists | default(false)
    fail_msg: >-
      Missing OpenBao break-glass JSON at
      {{ dmf_born_inventory_openbao_breakglass_file }}. The born-inventory
      AppRole credentials are stored there by the OpenBao bootstrap role.
  when: dmf_born_inventory_netbox_admin_token | default('') | length == 0

- name: Load OpenBao break-glass JSON from operator host
  ansible.builtin.set_fact:
    _dmf_born_inventory_breakglass: "{{ lookup('file', dmf_born_inventory_openbao_breakglass_file) | from_json }}"
  delegate_to: localhost
  become: false
  no_log: true
  when: dmf_born_inventory_netbox_admin_token | default('') | length == 0

- name: Extract OpenBao AppRole credentials for born-inventory reads
  ansible.builtin.set_fact:
    _dmf_born_inventory_openbao_role_id: >-
      {{
        _dmf_born_inventory_breakglass[dmf_born_inventory_openbao_approle_role_id_key]
        | default('')
      }}
    _dmf_born_inventory_openbao_secret_id: >-
      {{
        _dmf_born_inventory_breakglass[dmf_born_inventory_openbao_approle_secret_id_key]
        | default('')
      }}
  no_log: true
  when: dmf_born_inventory_netbox_admin_token | default('') | length == 0

- name: Assert OpenBao AppRole credentials are available for born-inventory
  ansible.builtin.assert:
    that:
      - _dmf_born_inventory_openbao_role_id | length > 0
      - _dmf_born_inventory_openbao_secret_id | length > 0
    fail_msg: >-
      No AppRole credentials found in {{ dmf_born_inventory_openbao_breakglass_file }}.
      born-inventory now uses a dedicated OpenBao AppRole with a narrow
      read-only policy on the NetBox runtime secret.
  no_log: true
  when: dmf_born_inventory_netbox_admin_token | default('') | length == 0

- name: Discover OpenBao pod for born-inventory reads
  kubernetes.core.k8s_info:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Pod
    namespace: "{{ dmf_born_inventory_openbao_namespace }}"
    label_selectors:
      - "{{ dmf_born_inventory_openbao_pod_label_selector }}"
  register: _dmf_born_inventory_openbao_pod_info
  when: dmf_born_inventory_netbox_admin_token | default('') | length == 0

- name: Assert OpenBao pod exists for born-inventory
  ansible.builtin.assert:
    that:
      - _dmf_born_inventory_openbao_pod_info.resources | length > 0
    fail_msg: >-
      Could not find an OpenBao pod in namespace
      {{ dmf_born_inventory_openbao_namespace }} with selector
      {{ dmf_born_inventory_openbao_pod_label_selector }}.
  when: dmf_born_inventory_netbox_admin_token | default('') | length == 0

- name: Set OpenBao pod fact for born-inventory
  ansible.builtin.set_fact:
    _dmf_born_inventory_openbao_pod: "{{ _dmf_born_inventory_openbao_pod_info.resources[0].metadata.name }}"
  when: dmf_born_inventory_netbox_admin_token | default('') | length == 0

- name: Log into OpenBao with born-inventory AppRole
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - -n
      - "{{ dmf_born_inventory_openbao_namespace }}"
      - exec
      - "{{ _dmf_born_inventory_openbao_pod }}"
      - --
      - sh
      - -c
      - >-
        bao write -format=json auth/approle/login
        role_id=$OPENBAO_ROLE_ID
        secret_id=$OPENBAO_SECRET_ID
  register: _dmf_born_inventory_openbao_login_raw
  changed_when: false
  environment:
    BAO_ADDR: https://127.0.0.1:8200
    OPENBAO_ROLE_ID: "{{ _dmf_born_inventory_openbao_role_id }}"
    OPENBAO_SECRET_ID: "{{ _dmf_born_inventory_openbao_secret_id }}"
  no_log: true
  when: dmf_born_inventory_netbox_admin_token | default('') | length == 0

- name: Extract OpenBao client token for born-inventory
  ansible.builtin.set_fact:
    _dmf_born_inventory_openbao_client_token: "{{ (_dmf_born_inventory_openbao_login_raw.stdout | from_json).auth.client_token }}"
  no_log: true
  when: dmf_born_inventory_netbox_admin_token | default('') | length == 0

- name: Read NetBox runtime secret from OpenBao
  ansible.builtin.shell:
    cmd: >-
      printf '%s\n' "$OPENBAO_TOKEN" |
      kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml
      -n {{ dmf_born_inventory_openbao_namespace }}
      exec -i {{ _dmf_born_inventory_openbao_pod }}
      -- sh -c '
      IFS= read -r BAO_TOKEN;
      export BAO_TOKEN;
      bao read -format=json secret/data/apps/netbox/runtime'
  register: _dmf_born_inventory_runtime_secret_raw
  changed_when: false
  failed_when: false
  environment:
    BAO_ADDR: https://127.0.0.1:8200
    OPENBAO_TOKEN: "{{ _dmf_born_inventory_openbao_client_token }}"
  no_log: true
  when: dmf_born_inventory_netbox_admin_token | default('') | length == 0

- name: Log NetBox admin token read result
  ansible.builtin.debug:
    msg: "NetBox admin token read: rc={{ _dmf_born_inventory_runtime_secret_raw.rc }}, has_output={{ (_dmf_born_inventory_runtime_secret_raw.stdout | default('') | length) > 0 }}"
  when: _dmf_born_inventory_runtime_secret_raw is defined

- name: Parse NetBox admin token from OpenBao
  ansible.builtin.set_fact:
    _dmf_born_inventory_netbox_admin_token_from_openbao: >-
      {{ (_dmf_born_inventory_runtime_secret_raw.stdout | default('{}') | from_json).data.data.netbox_admin_token | default('') | trim }}
  when:
    - dmf_born_inventory_netbox_admin_token | default('') | length == 0
    - _dmf_born_inventory_runtime_secret_raw.rc == 0
    - _dmf_born_inventory_runtime_secret_raw.stdout | default('') | length > 0
  no_log: true

- name: Default NetBox runtime secret for born-inventory
  ansible.builtin.set_fact:
    _dmf_born_inventory_netbox_admin_token_from_openbao: ""
  when:
    - dmf_born_inventory_netbox_admin_token | default('') | length == 0
    - _dmf_born_inventory_netbox_admin_token_from_openbao is not defined
  no_log: true

- name: Collect Tailscale IPs from k3s nodes
  ansible.builtin.command:
    argv:
      - tailscale
      - ip
      - -4
  delegate_to: "{{ dmf_node_name }}"
  loop: "{{ groups['k3s'] | default([]) }}"
  loop_control:
    loop_var: dmf_node_name
  register: _dmf_born_inventory_tailscale_ip_results
  changed_when: false
  failed_when: false

- name: Build Tailscale IP lookup map
  ansible.builtin.set_fact:
    dmf_born_inventory_tailscale_ips: >-
      {{
        dmf_born_inventory_tailscale_ips | default({})
        | combine({ item.dmf_node_name: (item.stdout | default('') | trim) })
      }}
  loop: "{{ _dmf_born_inventory_tailscale_ip_results.results | default([]) }}"
  loop_control:
    label: "{{ item.dmf_node_name }}"
  changed_when: false

- name: Assert every node has a Tailscale IP when private lane is enabled
  ansible.builtin.assert:
    that:
      - dmf_born_inventory_tailscale_ips | dict2items | map(attribute='value') | map('length') | min > 0
    fail_msg: >-
      Every k3s node should have a Tailscale IP. Check the base/tailscale role
      and Headscale registration.
  when: tailscale_headscale_url | default('') | length > 0
  changed_when: false

- name: Set effective NetBox admin token for born-inventory
  ansible.builtin.set_fact:
    dmf_born_inventory_netbox_admin_token_effective: >-
      {{
        dmf_born_inventory_netbox_admin_token
        | default(_dmf_born_inventory_netbox_admin_token_from_openbao | default('', true), true)
      }}
  no_log: true

- name: Check NetBox admin token availability
  ansible.builtin.set_fact:
    _dmf_born_inventory_netbox_token_available: "{{ dmf_born_inventory_netbox_admin_token_effective | default('') | length > 0 }}"
  no_log: true

- name: Warn if NetBox admin token is missing
  ansible.builtin.debug:
    msg: >-
      NetBox admin token not found in OpenBao at
      {{ dmf_born_inventory_netbox_runtime_secret_path }}.
      Born-inventory registration will be skipped.
      Run playbook 691-netbox-sot.yml first to seed the token.
  when: not _dmf_born_inventory_netbox_token_available | bool

- name: Skip born-inventory when NetBox token unavailable
  ansible.builtin.meta: end_role
  when: not _dmf_born_inventory_netbox_token_available | bool

- name: Assert NetBox admin token is available in OpenBao
  ansible.builtin.assert:
    that:
      - dmf_born_inventory_netbox_admin_token_effective | length > 0
    fail_msg: >-
      NetBox admin token is missing from the direct override and from
      {{ dmf_born_inventory_netbox_runtime_secret_path }} in OpenBao.
      Run the NetBox SoT bootstrap stage first so it can seed the token into
      the shared runtime secret.
  no_log: true

- name: Set NetBox auth headers
  ansible.builtin.set_fact:
    dmf_born_inventory_netbox_headers:
      Authorization: "Bearer {{ dmf_born_inventory_netbox_admin_token_effective }}"
  no_log: true

- name: Gather CPU core count from each node
  ansible.builtin.command: nproc
  delegate_to: "{{ dmf_node_name }}"
  loop: "{{ groups['k3s'] | default([]) }}"
  loop_control:
    loop_var: dmf_node_name
  register: _dmf_nproc_results
  changed_when: false

- name: Build CPU core count lookup map
  ansible.builtin.set_fact:
    dmf_born_inventory_cpu_cores: >-
      {{
        dmf_born_inventory_cpu_cores | default({})
        | combine({ item.dmf_node_name: (item.stdout | default('0') | int) })
      }}
  loop: "{{ _dmf_nproc_results.results | default([]) }}"
  loop_control:
    label: "{{ item.dmf_node_name }}"
  changed_when: false

- name: Build live node survey records from gathered facts
  ansible.builtin.set_fact:
    dmf_born_inventory_nodes: "{{ dmf_born_inventory_nodes | default([]) + [ _dmf_node_record ] }}"
  loop: "{{ groups['k3s'] | default([]) }}"
  loop_control:
    loop_var: dmf_node_name
  vars:
    dmf_node_host: "{{ hostvars[dmf_node_name] }}"
    dmf_node_public_ip: >-
      {{
        dmf_node_host.ansible_default_ipv4.address
        | default(dmf_node_host.ansible_host, true)
      }}
    dmf_node_public_iface: >-
      {{
        dmf_node_host.ansible_default_ipv4.interface
        | default('eth0', true)
      }}
    dmf_node_cpu_cores: >-
      {{
        dmf_born_inventory_cpu_cores.get(dmf_node_name, 0)
        | default(
            dmf_node_host.ansible_processor_vcpus
            | default(dmf_node_host.ansible_processor_count | default(1), true),
            true
          )
      }}
    dmf_node_memory_mb: "{{ dmf_node_host.ansible_memtotal_mb | default(0) }}"
    dmf_node_root_mount: >-
      {{
        (
          dmf_node_host.ansible_mounts | default([])
          | selectattr('mount', 'equalto', '/')
          | list
          | first
          | default({})
        )
      }}
    dmf_node_boot_disk_bytes: "{{ dmf_node_root_mount.size_total | default(0) }}"
    dmf_node_boot_disk_mb: >-
      {{
        (
          dmf_node_boot_disk_bytes | float / 1024 / 1024
        ) | round(0, 'floor') | int
      }}
    dmf_node_boot_disk_gb: >-
      {{
        (
          dmf_node_boot_disk_bytes | float / 1024 / 1024 / 1024
        ) | round(0, 'floor') | int
      }}
    _dmf_node_record:
      name: "{{ dmf_node_name }}"
      public_ip: "{{ dmf_node_public_ip }}"
      public_iface: "{{ dmf_node_public_iface }}"
      private_ip: "{{ dmf_node_host.k3s_node_ip | default('') }}"
      private_iface: "{{ k3s_private_interface }}"
      tailscale_ip: "{{ dmf_born_inventory_tailscale_ips[dmf_node_name] | default('') }}"
      tailscale_iface: "{{ dmf_born_inventory_tailscale_interface_name }}"
      os_release: >-
        {{ dmf_node_host.ansible_distribution | default('Debian') }}
        {{ dmf_node_host.ansible_distribution_version | default('12') }}
      kernel: "{{ dmf_node_host.ansible_kernel | default('unknown') }}"
      cpu_cores: "{{ dmf_node_cpu_cores }}"
      memory_mb: "{{ dmf_node_memory_mb }}"
      disk_mb: "{{ dmf_node_boot_disk_mb }}"
      disk_gb: "{{ dmf_node_boot_disk_gb }}"
      is_control_plane: "{{ dmf_node_name in (groups['k3s_control'] | default([])) }}"
  changed_when: false

- name: Normalize survey summary values
  ansible.builtin.set_fact:
    dmf_born_inventory_cluster_comments: >-
      Day-0 DMF cluster {{ dmf_born_inventory_env_name }}.
      Nodes: {{ dmf_born_inventory_nodes | map(attribute='name') | list | join(', ') }}.
      Hostnames: {{ [authentik_host, forgejo_host, grafana_host, netbox_host, awx_host, librenms_host | default(''), registry_host, dmf_cms_host | default('')] | reject('equalto', '') | list | join(', ') }}.
      Ingress: {{ cluster_ingress_mode | default('unknown') }}.
      Tailscale: {{ tailscale_headscale_url | default('n/a') }}.
      Load balancer: {{ dmf_born_inventory_load_balancer_name }}.
    dmf_born_inventory_site_comments: >-
      Day-0 operator platform for DMF.
      Provider: {{ dmf_born_inventory_manufacturer_name }}.
      Architecture: {{ dmf_born_inventory_architecture | default('unknown', true) }}.
      Env id: {{ dmf_born_inventory_env_id }}.
      Cluster domain: {{ cert_manager_cluster_domain | default('dmf.example.com') }}.
      The detailed service footprint is retained in playbook output and NetBox
      object comments; media environments must live in separate inventory planes.
  changed_when: false

- name: Assert every node has a private cluster IP
  ansible.builtin.assert:
    that:
      - dmf_born_inventory_nodes | map(attribute='private_ip') | map('length') | min > 0
    fail_msg: >-
      Every k3s node needs a private cluster IP so NetBox can record the full
      day-0 inventory. Check k3s_node_ip in the environment inventory.
  changed_when: false

- name: Check NetBox API availability
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/"
    method: GET
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    status_code: [200, 503]
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  register: dmf_born_inventory_netbox_api_check
  until: dmf_born_inventory_netbox_api_check.status == 200
  retries: 30
  delay: 10

- name: Look up DMF tag
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/extras/tags/?slug={{ dmf_born_inventory_tag_name | urlencode }}"
    method: GET
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    return_content: true
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  register: dmf_born_inventory_tag_lookup

- name: Create DMF tag
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/extras/tags/"
    method: POST
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    body_format: json
    body:
      name: "{{ dmf_born_inventory_tag_name }}"
      slug: "{{ dmf_born_inventory_tag_name | lower | regex_replace('[^a-z0-9]+', '-') | regex_replace('^-+|-+$', '') }}"
      color: "4caf50"
      description: "Day-0 DMF inventory marker"
    status_code: 201
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  when: dmf_born_inventory_tag_lookup.json.count | int == 0
  register: dmf_born_inventory_tag_created

- name: Refresh DMF tag lookup after create
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/extras/tags/?slug={{ dmf_born_inventory_tag_name | urlencode }}"
    method: GET
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    return_content: true
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  register: dmf_born_inventory_tag_lookup_after_create

- name: Set DMF tag id
  ansible.builtin.set_fact:
    dmf_born_inventory_tag_id: >-
      {{
        (
          dmf_born_inventory_tag_lookup_after_create.json.results
          | default(dmf_born_inventory_tag_lookup.json.results)
          | default([])
          | first
          | default({})
        ).id
      }}

- name: Look up DMF tenant
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/tenancy/tenants/?slug={{ dmf_born_inventory_tenant_slug | urlencode }}"
    method: GET
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    return_content: true
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  register: dmf_born_inventory_tenant_lookup

- name: Create DMF tenant
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/tenancy/tenants/"
    method: POST
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    body_format: json
    body:
      name: "{{ dmf_born_inventory_tenant_name }}"
      slug: "{{ dmf_born_inventory_tenant_slug }}"
      description: "DMF day-0 operator environment"
    status_code: 201
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  when: dmf_born_inventory_tenant_lookup.json.count | int == 0
  register: dmf_born_inventory_tenant_created

- name: Refresh DMF tenant lookup after create
  ansible.builtin.uri:
    url: "{{ dmf_born_inventory_netbox_api_base }}/tenancy/tenants/?slug={{ dmf_born_inventory_tenant_slug | urlencode }}"
    method: GET
    headers: "{{ dmf_born_inventory_netbox_headers }}"
    return_content: true
    status_code: 200
    validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
  register: dmf_born_inventory_tenant_lookup_after_create

- name: Set DMF tenant id
  ansible.builtin.set_fact:
    dmf_born_inventory_tenant_id: >-
      {{
        (
          dmf_born_inventory_tenant_lookup_after_create.json.results
          | default(dmf_born_inventory_tenant_lookup.json.results)
          | default([])
          | first
          | default({})
        ).id
      }}

# ---------------------------------------------------------------------------
# DMF env-schema custom fields (init-wizard 2026-05-19 schema)
# Four orthogonal fields on Site + Cluster:
#   dmf_env_id        — opaque slug identifier            (type: text)
#   dmf_env_label     — optional human-readable label     (type: text)
#   dmf_provider      — hetzner | aliyun | aws            (type: select)
#   dmf_architecture  — arm64   | amd64                   (type: select)
# Provider + architecture use NetBox 4.x choice sets so filtering works
# and values are enforced server-side. dmf_env_id / dmf_env_label stay as
# free text. Legacy envs leave these empty; the PATCH below skips them.
# Drift reconciliation (PATCH if existing field type differs) is NOT
# implemented — operators can re-shape manually if a prior text version
# was created. See follow-up note in the plan.
# ---------------------------------------------------------------------------
- name: Ensure DMF custom-field choice sets exist in NetBox
  vars:
    _dmf_choice_sets:
      - name: dmf-provider
        description: "DMF cloud provider"
        extra_choices:
          - [hetzner, Hetzner]
          - [aliyun, Aliyun]
          - [aws, AWS]
          - [sandbox, Sandbox]
      - name: dmf-architecture
        description: "DMF CPU architecture"
        extra_choices:
          - [arm64, arm64]
          - [amd64, amd64]
  block:
    - name: Look up DMF choice set {{ item.name }}
      ansible.builtin.uri:
        url: "{{ dmf_born_inventory_netbox_api_base }}/extras/custom-field-choice-sets/?name={{ item.name | urlencode }}"
        method: GET
        headers: "{{ dmf_born_inventory_netbox_headers }}"
        return_content: true
        status_code: 200
        validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
      register: _dmf_choice_set_lookup
      loop: "{{ _dmf_choice_sets }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Create missing DMF choice set {{ item.item.name }}
      ansible.builtin.uri:
        url: "{{ dmf_born_inventory_netbox_api_base }}/extras/custom-field-choice-sets/"
        method: POST
        headers: "{{ dmf_born_inventory_netbox_headers }}"
        body_format: json
        body:
          name: "{{ item.item.name }}"
          description: "{{ item.item.description }}"
          extra_choices: "{{ item.item.extra_choices }}"
        status_code: 201
        validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
      loop: "{{ _dmf_choice_set_lookup.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.json.count | int == 0

    - name: Refresh DMF choice set lookups
      ansible.builtin.uri:
        url: "{{ dmf_born_inventory_netbox_api_base }}/extras/custom-field-choice-sets/?name={{ item.name | urlencode }}"
        method: GET
        headers: "{{ dmf_born_inventory_netbox_headers }}"
        return_content: true
        status_code: 200
        validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
      register: _dmf_choice_set_lookup_after_create
      loop: "{{ _dmf_choice_sets }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Reconcile DMF choice set extra choices
      ansible.builtin.uri:
        url: "{{ dmf_born_inventory_netbox_api_base }}/extras/custom-field-choice-sets/{{ (item.json.results | first).id }}/"
        method: PATCH
        headers: "{{ dmf_born_inventory_netbox_headers }}"
        body_format: json
        body:
          extra_choices: "{{ item.item.extra_choices }}"
        status_code: 200
        validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
      loop: "{{ _dmf_choice_set_lookup_after_create.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when:
        - item.json.count | int > 0
        - (item.json.results | first).extra_choices | default([]) != item.item.extra_choices

    - name: Build DMF choice set id map (name -> id)
      ansible.builtin.set_fact:
        dmf_born_inventory_choice_set_ids: >-
          {{
            _dmf_choice_set_lookup_after_create.results
            | map(attribute='json.results')
            | map('first')
            | list
            | items2dict(key_name='name', value_name='id')
          }}

- name: Ensure DMF env-schema custom fields exist in NetBox
  vars:
    _dmf_cf_defs:
      - {name: dmf_env_id,       label: "DMF Env ID",       description: "Opaque per-env slug identifier (auto-generated).",  type: text,   choice_set: ""}
      - {name: dmf_env_label,    label: "DMF Env Label",    description: "Optional human-readable label for this env.",      type: text,   choice_set: ""}
      - {name: dmf_provider,     label: "DMF Provider",     description: "Cloud provider.",                                   type: select, choice_set: "dmf-provider"}
      - {name: dmf_architecture, label: "DMF Architecture", description: "CPU architecture.",                                 type: select, choice_set: "dmf-architecture"}
  block:
    - name: Look up DMF custom field {{ item.name }}
      ansible.builtin.uri:
        url: "{{ dmf_born_inventory_netbox_api_base }}/extras/custom-fields/?name={{ item.name | urlencode }}"
        method: GET
        headers: "{{ dmf_born_inventory_netbox_headers }}"
        return_content: true
        status_code: 200
        validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
      register: _dmf_cf_lookup
      loop: "{{ _dmf_cf_defs }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Create missing DMF custom field {{ item.item.name }}
      ansible.builtin.uri:
        url: "{{ dmf_born_inventory_netbox_api_base }}/extras/custom-fields/"
        method: POST
        headers: "{{ dmf_born_inventory_netbox_headers }}"
        body_format: json
        body: >-
          {{
            {
              'name': item.item.name,
              'label': item.item.label,
              'description': item.item.description,
              'type': item.item.type,
              'object_types': ['dcim.site', 'virtualization.cluster'],
              'required': false,
            }
            | combine(
                {'choice_set': dmf_born_inventory_choice_set_ids[item.item.choice_set]}
                if item.item.choice_set else {}
              )
          }}
        status_code: 201
        validate_certs: "{{ dmf_born_inventory_netbox_validate_certs | bool }}"
      loop: "{{ _dmf_cf_lookup.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.json.count | int == 0

    - name: Warn on DMF custom-field type drift
      ansible.builtin.debug:
        msg: >-
          NetBox custom field {{ item.item.name }} exists with type
          '{{ (item.json.results | first).type.value | default((item.json.results | first).type) }}'
          but the role wants type '{{ item.item.type }}'. Re-shape manually
          if you want choice-set enforcement; the PATCH at site/cluster
          level still works either way.
      loop: "{{ _dmf_cf_lookup.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when:
        - item.json.count | int > 0
        - (item.json.results | first).type.value | default((item.json.results | first).type) != item.item.type

