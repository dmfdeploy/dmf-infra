---
# Discrimination test for common/authentik-oauth-credentials sentinel parse
# (umbrella issue dmfdeploy/dmfdeploy#88).
#
# The role reads an Authentik OAuth2Provider's client_id/client_secret by
# `kubectl exec ... ak shell`, whose stdout interleaves arbitrary `ak` log
# lines with the credential payload. The OLD consumer roles parsed that with
# `stdout_lines | last | from_json`, which breaks the moment any log line
# trails the JSON. The role replaces that with a sentinel-delimited capture:
# the python wraps the JSON in `__AK_JSON__...__AK_JSON__` and we extract it
# with regex_search, so interleaved log noise can never corrupt the parse.
#
# This is a DISCRIMINATING test: against the same noisy fixture stdout it
# asserts BOTH
#   (a) the NEW sentinel parse yields the correct credentials  (PASS on new), and
#   (b) the OLD `stdout_lines | last | from_json` parse FAILS    (FAIL on old).
# (b) is what makes it discriminate — it fails on the pre-fix expression and
# passes only once the sentinel parse is in place.
#
# Cluster-free: the kubectl exec is not run; we feed a hand-built stdout that
# reproduces a real `ak shell` flap (log lines, then the payload, then a
# shutdown log line landing last). The parse Jinja below is duplicated verbatim
# from roles/common/authentik-oauth-credentials/tasks/main.yml — if that
# expression changes, this file must change in lockstep; that lockstep is the test.
#
# Run locally:
#   ansible-playbook tests/test-authentik-oauth-credentials-parse.yml

- name: Discrimination test — authentik-oauth-credentials sentinel parse
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    # A realistic noisy `ak shell` stdout: structured log lines around the
    # sentinel-wrapped payload, with a NON-JSON shutdown line landing LAST so
    # the old `| last | from_json` cannot accidentally succeed.
    fixture_stdout: |-
      {"event": "Loading configuration", "level": "info", "logger": "authentik.lib.config"}
      {"event": "Booting authentik", "level": "info", "logger": "authentik.root"}
      __AK_JSON__{"client_id": "forgejo-abc123", "client_secret": "s3cr3t-value-xyz"}__AK_JSON__
      [worker] received SIGTERM, draining; shutting down in 0.0s

    expected_client_id: "forgejo-abc123"
    expected_client_secret: "s3cr3t-value-xyz"

  tasks:
    # (a) NEW sentinel parse — duplicated verbatim from the role's parse task.
    - name: NEW parse — sentinel regex_search + from_json
      ansible.builtin.set_fact:
        new_creds: >-
          {{ (fixture_stdout
              | regex_search('__AK_JSON__(.*?)__AK_JSON__', '\1') | first)
             | from_json }}

    - name: Assert NEW parse recovered the exact credentials from noisy stdout
      ansible.builtin.assert:
        that:
          - new_creds.client_id == expected_client_id
          - new_creds.client_secret == expected_client_secret
        success_msg: "NEW sentinel parse extracted credentials despite trailing log noise."
        fail_msg: "NEW sentinel parse did not recover credentials — sentinel capture is broken."

    # (b) OLD parse — `stdout_lines | last | from_json`. On this fixture the last
    # line is a non-JSON shutdown log, so from_json must raise. We rescue the
    # failure and record it; a PASS here means the old expression is genuinely
    # broken on noisy output (the bug this change fixes).
    - name: OLD parse — prove stdout_lines | last | from_json FAILS on noisy stdout
      block:
        - name: OLD parse attempt (expected to fail)
          ansible.builtin.set_fact:
            old_creds: "{{ fixture_stdout.splitlines() | last | from_json }}"
          register: _old_parse
        - name: Record that OLD parse did NOT fail (discrimination lost)
          ansible.builtin.set_fact:
            old_parse_failed: false
      rescue:
        - name: Record that OLD parse failed as expected
          ansible.builtin.set_fact:
            old_parse_failed: true

    - name: Assert OLD parse FAILS on the same input (discrimination holds)
      ansible.builtin.assert:
        that:
          - old_parse_failed | bool
        success_msg: >-
          OLD `stdout_lines | last | from_json` failed on noisy stdout, as expected —
          the sentinel parse is a real fix, not a no-op.
        fail_msg: >-
          OLD parse did NOT fail on noisy stdout — this test no longer discriminates
          old vs new behaviour; revisit the fixture.
