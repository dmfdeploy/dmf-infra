[defaults]
# Include dmf-media roles (Layer 4/5 — media functions) alongside
# the infra-lab roles so lifecycle-provision/import playbooks resolve
# cross-repo role references. Path is relative to k3s-lab-bootstrap/
# and assumes dmf-infra and dmf-media are sibling clones under the
# umbrella workspace (the standard layout).
roles_path = ./roles:../../dmf-media/roles

[ssh_connection]
# Disable pipelining — long-running k8s/Helm tasks with large JSON responses
# can deadlock pipelining buffers on this Hetzner ARM64 control node.
pipelining = False
# retries: Ansible reopens the SSH connection on a 255 error (incl. "Connection
# refused"). Bumped 2 → 4 because, under the AWX-wake RAM/load spike on a
# constrained node, the node briefly REJECTs new connections (kube-proxy
# iptables churn / momentary saturation — sshd stays up); a long k8s_info wait
# poll that lands in that window was aborting the whole run as UNREACHABLE
# (observed 2026-06-21, awx-presence awake readyReplicas wait). Pairs with
# ConnectionAttempts below so a few-second blip is absorbed instead of fatal.
retries = 4

# Disable SSH ControlPersist — kubernetes.core and command modules can deadlock
# through multiplexed SSH control sockets on this control node. Slightly slower
# (new SSH connection per task) but reliable.
#
# ServerAliveInterval/CountMax + TCPKeepAlive: provider NAT can silently drop
# idle TCP flows after a few minutes without RST. Long-running tasks then wedge
# the controller side waiting for output that will never arrive. 30s x 3 gives
# roughly 90s of dead air before Ansible surfaces a real error.
# ConnectionAttempts=10: ssh retries the connect itself ~1/sec on failure
# (including ECONNREFUSED), so a transient refusal during an AWX-wake load spike
# is absorbed within a single Ansible task attempt rather than surfacing as an
# UNREACHABLE abort. Compounds with retries=4 above for a longer blip.
ssh_args = -o ControlMaster=no -o ConnectTimeout=10 -o ConnectionAttempts=10 -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o TCPKeepAlive=yes

# Avoid forced -tt allocation. Passwordless sudo does not require a TTY here,
# and PTY sessions were observed to remain open after the remote module exited.
usetty = False
