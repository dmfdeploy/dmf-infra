---
# DMF bootstrap: Provision — Pre-seed (EBU white paper §Provision stage).
# Installs platform capabilities up to and including OpenBao + ESO readiness.
# Stops before the local seed boundary (dmf-env bootstrap-secrets.sh seed-bao).
#
# After this wrapper completes:
#   1. k3s is running, ingress + cert-manager + Longhorn are deployed
#   2. OpenBao is initialized, unsealed, policy-ready
#   3. ESO is deployed with ClusterSecretStore
#   4. Base network policies are in place
#
# Next step: dmf-env/bin/bootstrap-secrets.sh seed-bao <env>
# Then: bootstrap-provision-post-seed.yml

# ── Layer 2xx — Host Platform (preflight + baseline + hardening) ─────────────
- import_playbook: playbooks/219-host-verify.yml
  tags: [bootstrap-preflight, layer2, host-platform, verify]
- import_playbook: playbooks/200-baseline.yml
  tags: [layer2, host-platform, baseline]
- import_playbook: playbooks/205-chrony.yml
  tags: [layer2, host-platform, security, time-sync, chrony]
- import_playbook: playbooks/210-harden.yml
  tags: [layer2, host-platform, security]
- import_playbook: playbooks/211-kernel-cve-mitigations.yml
  tags: [layer2, host-platform, security, kernel-cve-mitigations]

# ── Layer 3xx — Container Platform ───────────────────────────────────────────
- import_playbook: playbooks/300-k3s.yml
  tags: [layer3, container-platform, k3s]
- import_playbook: playbooks/301-k3s-verify.yml
  tags: [layer3, container-platform, k3s, verify]
# 302-k3s-audit-archival moved to post-seed (vertical-monitoring section).
# At pre-seed time there are no S3 credentials available yet — ESO does not
# exist and the inventory-supplied AWS keys are templated into
# /etc/dmf/audit-archive.env by the audit-log-archival role itself, which
# requires the seed bundle to be applied first. See bootstrap-provision-
# post-seed.yml for the active import.
- import_playbook: playbooks/310-ingress-public.yml
  tags: [layer3, container-platform, ingress, public-lane]
- import_playbook: playbooks/311-ingress-private.yml
  tags: [layer3, container-platform, ingress, private-lane]
- import_playbook: playbooks/320-cert-manager.yml
  tags: [layer3, container-platform, tls]
- import_playbook: playbooks/321-tailscale.yml
  tags: [layer3, container-platform, networking, tailscale]
- import_playbook: playbooks/330-longhorn.yml
  tags: [layer3, container-platform, storage]
- import_playbook: playbooks/331-registry-zot.yml
  tags: [layer3, container-platform, registry]
- import_playbook: playbooks/339-container-platform-verify.yml
  tags: [layer3, container-platform, verify]

